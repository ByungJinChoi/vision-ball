<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>색상 뭉치(Blob) 외곽선 표시 테스트</title>

  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{ font-weight:900; letter-spacing:.2px; }
    header .spacer{ flex:1 1 auto; }

    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      background:#2563eb;
      color:white;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:#ef4444; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.25);
      font: 800 13px/1 system-ui;
    }
    .pill .muted{ color:var(--muted); font-weight:700; }

    main{
      height: calc(100vh - 64px);
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }
    .stage{
      flex:1 1 auto;
      min-height: 260px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit: contain;
      background:#000;
    }
    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
      white-space:pre-wrap;
    }
    code{
      color:#d1fae5;
      background: rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:800;
    }
  </style>

  <script>
    let cvReady = false;
    function setStatus(msg){
      const el = document.getElementById('statusText');
      if(el) el.textContent = msg;
    }
    function onOpenCvScriptLoaded(){
      if(typeof cv === 'undefined'){
        setStatus('OpenCV 로딩 실패(네트워크/차단 확인)');
        return;
      }
      cv['onRuntimeInitialized'] = () => {
        cvReady = true;
        setStatus('OpenCV 준비완료');
      };
      setStatus('OpenCV 런타임 초기화중...');
    }
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvScriptLoaded()"></script>
</head>

<body>
  <header>
    <div class="title">🎥 색상 뭉치(Blob) 외곽선 표시 테스트</div>
    <div class="spacer"></div>
    <button id="camBtn" class="btn">캠 켜기</button>
    <span class="pill"><span class="muted">상태</span> <span id="statusText">OpenCV 로딩중...</span></span>
    <span class="pill"><span class="muted">외곽선</span> <span id="countText">—</span></span>
  </header>

  <main>
    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">
        목표: “같은 계열 색상 덩어리”를 찾아 외곽선으로 표시 (여러 개면 여러 개 전부 표시)
        • 색상 분할: HSV (Hue 8분할 + 무채색(흰/회색) 그룹)
        • 조명 그라데이션(밝기 변화)은 허용: 색상 계열(Hue/Sat) 중심
        • 처리 주기: <code>0.25초</code> (원하면 DETECT_MS 조절 가능)
      </div>
      <div class="small" id="debugText"></div>
    </div>
  </main>

<script>
(() => {
  // === 사용자가 바꿔가며 보기 좋은 값들 ===
  const DETECT_MS = 250;          // 처리 주기 (ms)
  const PROC_W = 360;             // 처리 해상도(가로). 낮출수록 빠름
  const HUE_BINS = 8;             // 색상 계열(빨/주/노/초/청/파/보 등) 분할 개수
  const SAT_MIN_COLOR = 45;       // 이 값보다 채도가 낮으면 “무채색(흰/회색)”으로 취급
  const VAL_MIN = 35;             // 너무 어두운 픽셀 제외(노이즈 감소)
  const MIN_AREA_PX = 120;        // 너무 작은 blob 제외 (필요시 60~200 사이로 조절)

  // 마스크 정리(노이즈 제거/구멍 메움)
  const MORPH_OPEN = 1;           // 1이면 열기 적용
  const MORPH_CLOSE = 1;          // 1이면 닫기 적용
  const KERNEL_SIZE = 3;          // 3 또는 5 추천

  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');
  const countText = document.getElementById('countText');
  const debugText = document.getElementById('debugText');

  let stream = null;
  let camOn = false;
  let busy = false;
  let lastTs = 0;
  let rafId = 0;

  // 처리용 캔버스(축소)
  const proc = document.createElement('canvas');
  const pctx = proc.getContext('2d', { willReadFrequently:true });
  proc.width = PROC_W;
  proc.height = Math.round(PROC_W * 3/4);

  // OpenCV overlay를 그릴 캔버스(숨김)
  const visCanvas = document.createElement('canvas');
  const visCtx = visCanvas.getContext('2d');

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr,0,0,dpr,0,0);
  }

  // object-fit: contain 에 맞춰 오버레이 정렬
  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0) return {left:0, top:0, width:ww, height:wh};

    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;
    return {left, top, width:dw, height:dh};
  }

  function hsvHueColor(binIndex){
    // binIndex(0..HUE_BINS-1)을 HSV 색으로 매핑해 외곽선 색상용 RGB를 만듦
    // (색이 뒤바뀌어도 기능에는 문제 없음. 구분만 되면 됨)
    const hue = (binIndex / HUE_BINS) * 360; // 0..360
    const s = 0.95, v = 1.0;
    const c = v * s;
    const x = c * (1 - Math.abs((hue/60) % 2 - 1));
    const m = v - c;
    let r=0,g=0,b=0;
    if(hue<60){ r=c; g=x; b=0; }
    else if(hue<120){ r=x; g=c; b=0; }
    else if(hue<180){ r=0; g=c; b=x; }
    else if(hue<240){ r=0; g=x; b=c; }
    else if(hue<300){ r=x; g=0; b=c; }
    else { r=c; g=0; b=x; }
    return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255), 255];
  }

  function drawVisToOverlay(){
    resizeOverlay();
    octx.clearRect(0,0, overlay.width, overlay.height);
    const rect = getDisplayRect();
    // visCanvas를 영상 영역에 맞춰 그리기
    octx.drawImage(visCanvas, rect.left, rect.top, rect.width, rect.height);
  }

  function buildHueMask(hsv, h0, h1, sMin, vMin){
    // OpenCV HSV: H=0..179, S=0..255, V=0..255
    // h0~h1 범위를 mask로 만들되, wrap-around 처리
    const mask = new cv.Mat();
    if(h0 <= h1){
      const low  = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [h0, sMin, vMin, 0]);
      const high = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [h1, 255, 255, 255]);
      cv.inRange(hsv, low, high, mask);
      low.delete(); high.delete();
    }else{
      // wrap: [h0..179] U [0..h1]
      const maskA = new cv.Mat();
      const maskB = new cv.Mat();
      {
        const low  = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [h0, sMin, vMin, 0]);
        const high = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [179, 255, 255, 255]);
        cv.inRange(hsv, low, high, maskA);
        low.delete(); high.delete();
      }
      {
        const low  = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, sMin, vMin, 0]);
        const high = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [h1, 255, 255, 255]);
        cv.inRange(hsv, low, high, maskB);
        low.delete(); high.delete();
      }
      cv.bitwise_or(maskA, maskB, mask);
      maskA.delete(); maskB.delete();
    }
    return mask;
  }

  function cleanMask(mask, kernel){
    if(MORPH_OPEN){
      cv.morphologyEx(mask, mask, cv.MORPH_OPEN, kernel);
    }
    if(MORPH_CLOSE){
      cv.morphologyEx(mask, mask, cv.MORPH_CLOSE, kernel);
    }
  }

  function addContoursFromMask(mask, vis, color, thickness, minAreaPx){
    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat();
    cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let kept = 0;
    for(let i=0;i<contours.size();i++){
      const cnt = contours.get(i);
      const area = cv.contourArea(cnt, false);
      if(area >= minAreaPx){
        cv.drawContours(vis, contours, i, color, thickness);
        kept++;
      }
      cnt.delete();
    }

    contours.delete();
    hierarchy.delete();
    return kept;
  }

  async function detectOnce(){
    if(!camOn) return;
    if(typeof cv === 'undefined' || !cv || !cvReady) return;
    if(video.readyState < 2) return;
    if(busy) return;

    busy = true;
    try{
      // proc 해상도 세팅(영상 비율 유지)
      const vw = video.videoWidth || 640;
      const vh = video.videoHeight || 480;
      const h = Math.max(220, Math.round(PROC_W * (vh / vw)));
      if(proc.height !== h){
        proc.height = h;
      }

      // 현재 프레임 축소 복사
      pctx.drawImage(video, 0, 0, proc.width, proc.height);

      // OpenCV 읽기
      const src = cv.imread(proc); // RGBA
      const hsv = new cv.Mat();
      cv.cvtColor(src, hsv, cv.COLOR_RGBA2HSV);

      // 결과 그릴 투명 캔버스(mat)
      const vis = new cv.Mat.zeros(hsv.rows, hsv.cols, cv.CV_8UC4);

      // 마스크 정리 커널
      const k = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(KERNEL_SIZE, KERNEL_SIZE));

      let totalKept = 0;
      let neutralKept = 0;
      let colorKeptSum = 0;

      // 1) 무채색(흰/회색/검정 계열) 그룹: S 낮은 영역
      //    (밝기 그라데이션 허용: Hue는 무시, 채도 낮음만 보되 너무 어두운 건 제외)
      {
        const low  = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 0, VAL_MIN, 0]);
        const high = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [179, SAT_MIN_COLOR, 255, 255]);
        const neutralMask = new cv.Mat();
        cv.inRange(hsv, low, high, neutralMask);
        low.delete(); high.delete();

        cleanMask(neutralMask, k);

        // 무채색은 흰색 외곽선
        const kept = addContoursFromMask(neutralMask, vis, new cv.Scalar(255,255,255,255), 2, MIN_AREA_PX);
        neutralKept += kept;
        totalKept += kept;

        neutralMask.delete();
      }

      // 2) 색상 계열 그룹: Hue를 HUE_BINS개로 분할 (S는 충분히 있어야 색으로 봄)
      const binSize = Math.floor(180 / HUE_BINS);
      for(let b=0; b<HUE_BINS; b++){
        const h0 = b * binSize;
        const h1 = (b === HUE_BINS-1) ? 179 : (h0 + binSize - 1);

        // 색 영역 마스크 만들기
        const mask = buildHueMask(hsv, h0, h1, SAT_MIN_COLOR+1, VAL_MIN);
        cleanMask(mask, k);

        // bin별 외곽선 색상(구분용) — 싫으면 흰색으로 바꿔도 됩니다.
        const rgba = hsvHueColor(b);
        const color = new cv.Scalar(rgba[0], rgba[1], rgba[2], 255);

        const kept = addContoursFromMask(mask, vis, color, 2, MIN_AREA_PX);
        colorKeptSum += kept;
        totalKept += kept;

        mask.delete();
      }

      // vis를 캔버스로 표시
      visCanvas.width = vis.cols;
      visCanvas.height = vis.rows;
      cv.imshow(visCanvas, vis);

      // cleanup
      k.delete();
      vis.delete();
      hsv.delete();
      src.delete();

      drawVisToOverlay();

      countText.textContent = totalKept ? `${totalKept}개` : '0개';
      debugText.textContent =
        `proc ${proc.width}x${proc.height} / hueBins=${HUE_BINS}\n` +
        `neutral=${neutralKept}, color=${colorKeptSum}, total=${totalKept}\n` +
        `SAT_MIN_COLOR=${SAT_MIN_COLOR}, VAL_MIN=${VAL_MIN}, MIN_AREA_PX=${MIN_AREA_PX}`;

    }catch(e){
      console.error(e);
      debugText.textContent = '오류: ' + e;
    }finally{
      busy = false;
    }
  }

  function loop(ts){
    if(!camOn){
      rafId = requestAnimationFrame(loop);
      return;
    }
    if((ts - lastTs) >= DETECT_MS){
      lastTs = ts;
      detectOnce();
    }
    rafId = requestAnimationFrame(loop);
  }

  async function startCam(){
    if(camOn) return;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 640 },
          height:{ ideal: 480 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');

      lastTs = 0;
      resizeOverlay();
      drawVisToOverlay();
    }catch(e){
      setStatus('카메라 실패: ' + e);
    }
  }

  function stopCam(){
    if(!camOn) return;
    try{
      if(video.srcObject){
        try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(_e){}
        video.srcObject = null;
      }
      stream = null;
      camOn = false;

      camBtn.textContent = '캠 켜기';
      camBtn.classList.remove('off');

      countText.textContent = '—';
      debugText.textContent = '';

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
    }catch(_e){}
  }

  camBtn.addEventListener('click', () => {
    if(camOn) stopCam();
    else startCam();
  });

  window.addEventListener('resize', () => {
    resizeOverlay();
    if(camOn) drawVisToOverlay();
  });

  resizeOverlay();
  rafId = requestAnimationFrame(loop);
})();
</script>

</body>
</html>
