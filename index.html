<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>AI 공(sports ball) 탐지 테스트 (COCO-SSD + 밝기/그림자)</title>

  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
      --blue:#2563eb;
      --red:#ef4444;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{ font-weight:900; letter-spacing:.2px; }
    header .spacer{ flex:1 1 auto; }

    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      background:var(--blue);
      color:white;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:var(--red); }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.25);
      font: 800 13px/1 system-ui;
      white-space:nowrap;
    }
    .pill .muted{ color:var(--muted); font-weight:700; }

    main{
      height: calc(100vh - 64px);
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }

    .stage{
      flex:1 1 auto;
      min-height: 260px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit: contain;
      background:#000;
    }
    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      white-space:pre-wrap;
    }
    code{
      color:#d1fae5;
      background: rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:900;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    input[type="range"]{ width: 180px; }
    label{ font-size:12px; color:var(--muted); font-weight:800; }
  </style>

  <!-- TensorFlow.js + COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd/dist/coco-ssd.min.js"></script>
</head>

<body>
  <header>
    <div class="title">🎥 AI 공(sports ball) 탐지 테스트 (COCO-SSD)</div>
    <div class="spacer"></div>

    <button id="camBtn" class="btn">캠 켜기</button>

    <span class="pill"><span class="muted">모델</span> <span id="modelStatus">로딩중…</span></span>
    <span class="pill"><span class="muted">탐지</span> <span id="detCount">—</span></span>
    <span class="pill"><span class="muted">위치</span> <span id="zoneText">—</span></span>
    <span class="pill"><span class="muted">밝기</span> <span id="lightText">—</span></span>
  </header>

  <main>
    <div class="row">
      <label>탐지 주기(ms)</label>
      <input id="period" type="range" min="150" max="1200" step="50" value="450">
      <code id="periodVal">450</code>

      <label>최소 신뢰도</label>
      <input id="thr" type="range" min="0.15" max="0.75" step="0.05" value="0.35">
      <code id="thrVal">0.35</code>
    </div>

    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">
- 라이브러리: <code>TensorFlow.js + COCO-SSD</code> (class: <code>sports ball</code>)
- 장점: 패턴 배경에서도 “원처럼 보이는 무늬”에 덜 속음
- 밝기/그림자: 공 ROI 평균 밝기 + 주변 배경 대비로 <code>밝음/보통/어두움</code> 표시
      </div>
      <div class="small" id="debug"></div>
    </div>
  </main>

<script>
(() => {
  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');
  const modelStatus = document.getElementById('modelStatus');
  const detCount = document.getElementById('detCount');
  const zoneText = document.getElementById('zoneText');
  const lightText = document.getElementById('lightText');
  const debug = document.getElementById('debug');

  const period = document.getElementById('period');
  const periodVal = document.getElementById('periodVal');
  const thr = document.getElementById('thr');
  const thrVal = document.getElementById('thrVal');

  period.addEventListener('input', ()=> periodVal.textContent = period.value);
  thr.addEventListener('input', ()=> thrVal.textContent = Number(thr.value).toFixed(2));

  let stream = null;
  let camOn = false;

  let model = null;
  let busy = false;
  let lastDetectAt = 0;

  // 밝기 측정용 캔버스(작게)
  const snap = document.createElement('canvas');
  const sctx = snap.getContext('2d', { willReadFrequently:true });

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr,0,0,dpr,0,0);
  }

  // object-fit: contain 에 맞춘 video 표시 영역
  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0) return {left:0, top:0, width:ww, height:wh, scaleX:1, scaleY:1};

    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;
    return {left, top, width:dw, height:dh, scaleX:s, scaleY:s};
  }

  function zoneFromPoint(cx, cy, vw, vh){
    const cw = vw / 3;
    const ch = vh / 3;
    let col = Math.floor(cx / cw);
    let row = Math.floor(cy / ch);
    col = clamp(col, 0, 2);
    row = clamp(row, 0, 2);
    return row * 3 + col + 1;
  }

  function drawGrid(rect){
    const x0 = rect.left, y0 = rect.top, w = rect.width, h = rect.height;

    octx.strokeStyle = 'rgba(255,255,255,0.9)';
    octx.lineWidth = 1;
    octx.beginPath();
    octx.moveTo(x0 + w/3, y0);      octx.lineTo(x0 + w/3, y0 + h);
    octx.moveTo(x0 + 2*w/3, y0);    octx.lineTo(x0 + 2*w/3, y0 + h);
    octx.moveTo(x0, y0 + h/3);      octx.lineTo(x0 + w, y0 + h/3);
    octx.moveTo(x0, y0 + 2*h/3);    octx.lineTo(x0 + w, y0 + 2*h/3);
    octx.stroke();

    octx.font = '900 16px system-ui';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const n = r*3 + c + 1;
        const cx = x0 + (c+0.5)*(w/3);
        const cy = y0 + (r+0.5)*(h/3);
        octx.fillStyle = 'rgba(0,0,0,0.28)';
        octx.strokeStyle = 'rgba(255,255,255,0.22)';
        octx.lineWidth = 1;
        octx.beginPath();
        octx.arc(cx, cy, 14, 0, Math.PI*2);
        octx.fill();
        octx.stroke();
        octx.fillStyle = 'rgba(255,255,255,0.95)';
        octx.fillText(String(n), cx, cy);
      }
    }
  }

  function drawZoneHighlight(rect, zone){
    if(!zone) return;
    const z = zone - 1;
    const row = Math.floor(z / 3);
    const col = z % 3;

    const x0 = rect.left + col*(rect.width/3);
    const y0 = rect.top  + row*(rect.height/3);
    const w = rect.width/3;
    const h = rect.height/3;

    octx.fillStyle = 'rgba(255,255,255,0.08)';
    octx.strokeStyle = 'rgba(255,255,255,0.35)';
    octx.lineWidth = 2;
    octx.fillRect(x0, y0, w, h);
    octx.strokeRect(x0, y0, w, h);
  }

  function drawBox(rect, bbox, style, label){
    const [x,y,w,h] = bbox;
    const rx = rect.left + x * rect.scaleX;
    const ry = rect.top  + y * rect.scaleY;
    const rw = w * rect.scaleX;
    const rh = h * rect.scaleY;

    octx.strokeStyle = style.stroke;
    octx.lineWidth = style.lineWidth;
    octx.strokeRect(rx, ry, rw, rh);

    if(label){
      octx.font = '800 12px system-ui';
      octx.textAlign = 'left';
      octx.textBaseline = 'top';
      const pad = 4;
      const tw = octx.measureText(label).width;
      octx.fillStyle = style.bg;
      octx.fillRect(rx, ry, tw + pad*2, 16 + pad);
      octx.fillStyle = style.fg;
      octx.fillText(label, rx + pad, ry + 2);
    }
  }

  function meanLuma(imageData){
    const d = imageData.data;
    let sum = 0;
    const n = d.length / 4;
    for(let i=0;i<d.length;i+=4){
      const r=d[i], g=d[i+1], b=d[i+2];
      sum += (0.299*r + 0.587*g + 0.114*b);
    }
    return n ? (sum / n) : 0;
  }

  function brightnessLabel(roiMean, bgMean){
    const diff = roiMean - bgMean;
    // diff 기반이 제일 직관적 (주변 대비)
    if(diff > 18) return {label:'밝음', diff};
    if(diff < -18) return {label:'어두움', diff};
    return {label:'보통', diff};
  }

  function computeBrightnessForBox(vw, vh, bbox){
    // snap 캔버스 크기 설정(가볍게)
    const targetW = 320;
    const scale = targetW / Math.max(1, vw);
    const targetH = Math.max(1, Math.round(vh * scale));
    if(snap.width !== targetW || snap.height !== targetH){
      snap.width = targetW;
      snap.height = targetH;
    }
    sctx.drawImage(video, 0, 0, targetW, targetH);

    // bbox -> snap 좌표
    const [x,y,w,h] = bbox;
    const sx = clamp(Math.round(x * scale), 0, targetW-1);
    const sy = clamp(Math.round(y * scale), 0, targetH-1);
    const sw = clamp(Math.round(w * scale), 1, targetW - sx);
    const sh = clamp(Math.round(h * scale), 1, targetH - sy);

    // ROI
    const roi = sctx.getImageData(sx, sy, sw, sh);
    const roiMean = meanLuma(roi);

    // 주변 배경(확장 박스)
    const ex = clamp(Math.round(sx - sw*0.18), 0, targetW-1);
    const ey = clamp(Math.round(sy - sh*0.18), 0, targetH-1);
    const ew = clamp(Math.round(sw*1.36), 1, targetW - ex);
    const eh = clamp(Math.round(sh*1.36), 1, targetH - ey);

    const bg = sctx.getImageData(ex, ey, ew, eh);
    const bgMeanAll = meanLuma(bg);

    // 배경 평균을 “확장영역 평균”으로 쓰면 ROI가 섞이긴 하지만,
    // 테스트 목적에는 충분히 잘 동작합니다(속도/단순성 우선).
    // 좀 더 정확하게 하려면 ROI 제외 계산을 추가하면 됩니다.
    const label = brightnessLabel(roiMean, bgMeanAll);

    return {
      roiMean, bgMean: bgMeanAll,
      diff: label.diff,
      label: label.label
    };
  }

  async function loadModel(){
    try{
      modelStatus.textContent = 'TF 준비중…';
      // webgl 우선
      try{
        await tf.setBackend('webgl');
      }catch(_e){}
      await tf.ready();

      modelStatus.textContent = '모델 로딩중…';
      // lite_mobilenet_v2: 모바일에서 좀 더 빠름
      model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });

      const backend = tf.getBackend ? tf.getBackend() : 'unknown';
      modelStatus.textContent = `준비완료(${backend})`;
    }catch(e){
      console.error(e);
      modelStatus.textContent = '로딩 실패';
      debug.textContent = '모델 로딩 오류: ' + e;
    }
  }

  async function detectOnce(){
    if(!camOn || !model) return;
    if(video.readyState < 2) return;
    if(busy) return;

    busy = true;
    const t0 = performance.now();
    try{
      const vw = video.videoWidth || 0;
      const vh = video.videoHeight || 0;
      if(vw<=0 || vh<=0) return;

      const minScore = Number(thr.value);

      // detect(video) 결과 bbox는 video 픽셀 좌표 기준
      const preds = await model.detect(video, 20);

      // sports ball만
      const balls = preds
        .filter(p => p && p.class === 'sports ball' && (p.score || 0) >= minScore)
        .map(p => ({
          score: p.score || 0,
          bbox: p.bbox, // [x,y,w,h]
        }))
        .sort((a,b)=>b.score-a.score);

      // 렌더
      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
      const rect = getDisplayRect();
      drawGrid(rect);

      detCount.textContent = balls.length ? `${balls.length}개` : '0개';

      let bestZone = null;
      let bestLight = null;

      // 여러 개 표시
      for(let i=0;i<balls.length;i++){
        const b = balls[i];
        const [x,y,w,h] = b.bbox;
        const cx = x + w/2;
        const cy = y + h/2;
        const z = zoneFromPoint(cx, cy, vw, vh);

        const isBest = (i===0);
        const label = `ball ${(b.score*100).toFixed(0)}% · ${z}번`;

        drawBox(rect, b.bbox, {
          stroke: isBest ? 'rgba(0,255,220,0.95)' : 'rgba(255,255,255,0.65)',
          lineWidth: isBest ? 3 : 2,
          bg: isBest ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.35)',
          fg: 'rgba(255,255,255,0.95)'
        }, label);

        if(isBest){
          bestZone = z;
          drawZoneHighlight(rect, bestZone);

          // 밝기/그림자 판단
          bestLight = computeBrightnessForBox(vw, vh, b.bbox);

          // 중심 표시
          const px = rect.left + cx*rect.scaleX;
          const py = rect.top  + cy*rect.scaleY;
          octx.strokeStyle = 'rgba(0,255,220,0.95)';
          octx.lineWidth = 2;
          octx.beginPath();
          octx.moveTo(px-10, py); octx.lineTo(px+10, py);
          octx.moveTo(px, py-10); octx.lineTo(px, py+10);
          octx.stroke();
        }
      }

      zoneText.textContent = bestZone ? `${bestZone}번` : '—';
      if(bestLight){
        lightText.textContent = `${bestLight.label} (Δ${bestLight.diff.toFixed(0)})`;
      }else{
        lightText.textContent = '—';
      }

      const t1 = performance.now();
      debug.textContent =
        `detect ${(t1-t0).toFixed(0)}ms · period ${period.value}ms · thr ${Number(thr.value).toFixed(2)}\n` +
        (bestLight
          ? `ROI 밝기 ${bestLight.roiMean.toFixed(0)} / 주변 ${bestLight.bgMean.toFixed(0)} / Δ${bestLight.diff.toFixed(0)}`
          : `공(sports ball) 탐지 없음 (공이 작거나 시야에 없거나, 모델이 인식 못할 수 있음)`);

    }catch(e){
      console.error(e);
      debug.textContent = '오류: ' + e;
    }finally{
      busy = false;
    }
  }

  function loop(ts){
    if(!camOn){
      requestAnimationFrame(loop);
      return;
    }
    const p = Number(period.value);
    if(ts - lastDetectAt >= p){
      lastDetectAt = ts;
      detectOnce();
    }
    requestAnimationFrame(loop);
  }

  async function startCam(){
    if(camOn) return;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height:{ ideal: 720 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');

      lastDetectAt = 0;
      resizeOverlay();
    }catch(e){
      debug.textContent = '카메라 실패: ' + e;
    }
  }

  function stopCam(){
    if(!camOn) return;
    try{
      if(video.srcObject){
        try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(_e){}
        video.srcObject = null;
      }
      stream = null;
      camOn = false;

      camBtn.textContent = '캠 켜기';
      camBtn.classList.remove('off');

      detCount.textContent = '—';
      zoneText.textContent = '—';
      lightText.textContent = '—';
      debug.textContent = '';

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
    }catch(_e){}
  }

  camBtn.addEventListener('click', () => camOn ? stopCam() : startCam());
  window.addEventListener('resize', resizeOverlay);

  // 시작: 모델 로딩
  loadModel();
  resizeOverlay();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
