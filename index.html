<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>9분할 동그라미(원) 위치 인식 테스트 v2 (ColorFilter v5)</title>

  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{
      font-weight:900;
      letter-spacing:.2px;
    }
    header .spacer{ flex:1 1 auto; }
    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      background:#2563eb;
      color:white;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:#ef4444; }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.25);
      font: 800 13px/1 system-ui;
    }
    .pill .muted{ color:var(--muted); font-weight:700; }

    main{
      height: calc(100vh - 64px);
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }

    .stage{
      flex:1 1 auto;
      min-height: 260px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit: contain;
      background:#000;
    }
    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }
    code{
      color:#d1fae5;
      background: rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:800;
    }
  </style>

  <script>
    let cvReady = false;
    function setStatus(msg){
      const el = document.getElementById('statusText');
      if(el) el.textContent = msg;
    }
    function onOpenCvScriptLoaded(){
      if(typeof cv === 'undefined'){
        setStatus('OpenCV 로딩 실패(네트워크/차단 확인)');
        return;
      }
      cv['onRuntimeInitialized'] = () => {
        cvReady = true;
        setStatus('OpenCV 준비완료');
      };
      setStatus('OpenCV 런타임 초기화중...');
    }
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvScriptLoaded()"></script>
</head>

<body>
  <header>
    <div class="title">🎥 9분할 동그라미(원) 위치 인식 테스트 v2 (ColorFilter v5)</div>
    <div class="spacer"></div>
    <button id="camBtn" class="btn">캠 켜기</button>
    <span class="pill"><span class="muted">상태</span> <span id="statusText">OpenCV 로딩중...</span></span>
    <span class="pill"><span class="muted">인식</span> <span id="resultText">—</span></span>
  </header>

  <main>
    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">
        인식 주기: <code>0.5초</code> / v2 원 검출 유지 + 추가: <code>다색 패턴만 강하게 억제</code><br/>
        (밝기 그라데이션은 허용: RGB 비율(Chromaticity) 기반)
      </div>
      <div class="small" id="debugText"></div>
    </div>
  </main>

<script>
(() => {
  const DETECT_MS = 500;

  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');
  const resultText = document.getElementById('resultText');
  const debugText = document.getElementById('debugText');

  let stream = null;
  let camOn = false;

  const proc = document.createElement('canvas');
  const pctx = proc.getContext('2d', { willReadFrequently:true });
  let procW = 360, procH = 240;

  let stableZone = null;
  let pendingZone = null;
  let pendingCount = 0;

  let lastCircle = null; // {x,y,r}

  let busy = false;
  let timer = null;

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr,0,0,dpr,0,0);
  }

  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0) return {left:0, top:0, width:ww, height:wh, scale:1};

    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;
    return {left, top, width:dw, height:dh, scale:s};
  }

  function ensureProcSize(){
    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 480;

    let w = 360;
    let h = Math.round(w * (vh / vw));

    w = Math.max(300, w);
    h = Math.max(220, h);

    w = w - (w % 3);
    h = h - (h % 3);

    if(procW !== w || procH !== h){
      procW = w; procH = h;
      proc.width = procW;
      proc.height = procH;
    }
  }

  function zoneFromPoint(x, y){
    const cw = procW / 3;
    const ch = procH / 3;
    let col = Math.floor(x / cw);
    let row = Math.floor(y / ch);
    col = clamp(col, 0, 2);
    row = clamp(row, 0, 2);
    const zone = row * 3 + col + 1;
    return {zone, row, col};
  }

  function drawGridAndNumbers(rect){
    const x0 = rect.left, y0 = rect.top, w = rect.width, h = rect.height;

    octx.strokeStyle = 'rgba(255,255,255,0.9)';
    octx.lineWidth = 1;
    octx.beginPath();
    octx.moveTo(x0 + w/3, y0);      octx.lineTo(x0 + w/3, y0 + h);
    octx.moveTo(x0 + 2*w/3, y0);    octx.lineTo(x0 + 2*w/3, y0 + h);
    octx.moveTo(x0, y0 + h/3);      octx.lineTo(x0 + w, y0 + h/3);
    octx.moveTo(x0, y0 + 2*h/3);    octx.lineTo(x0 + w, y0 + 2*h/3);
    octx.stroke();

    octx.font = '900 16px system-ui';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const n = r*3 + c + 1;
        const cx = x0 + (c+0.5)*(w/3);
        const cy = y0 + (r+0.5)*(h/3);

        octx.fillStyle = 'rgba(0,0,0,0.28)';
        octx.strokeStyle = 'rgba(255,255,255,0.22)';
        octx.lineWidth = 1;
        octx.beginPath();
        octx.arc(cx, cy, 14, 0, Math.PI*2);
        octx.fill();
        octx.stroke();

        octx.fillStyle = 'rgba(255,255,255,0.95)';
        octx.fillText(String(n), cx, cy);
      }
    }
  }

  function drawZoneHighlight(rect, zone){
    if(!zone) return;
    const z = zone - 1;
    const row = Math.floor(z / 3);
    const col = z % 3;

    const x0 = rect.left + col*(rect.width/3);
    const y0 = rect.top  + row*(rect.height/3);
    const w = rect.width/3;
    const h = rect.height/3;

    octx.fillStyle = 'rgba(255,255,255,0.08)';
    octx.strokeStyle = 'rgba(255,255,255,0.35)';
    octx.lineWidth = 2;
    octx.fillRect(x0, y0, w, h);
    octx.strokeRect(x0, y0, w, h);
  }

  function drawCircle(rect, circle){
    if(!circle) return;
    const sx = rect.width / procW;
    const sy = rect.height / procH;

    const cx = rect.left + circle.x * sx;
    const cy = rect.top  + circle.y * sy;
    const r  = Math.max(2, circle.r * ((sx+sy)*0.5));

    octx.strokeStyle = 'rgba(0,255,220,0.95)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.arc(cx, cy, r, 0, Math.PI*2);
    octx.stroke();

    octx.strokeStyle = 'rgba(0,255,220,0.85)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.moveTo(cx-8, cy); octx.lineTo(cx+8, cy);
    octx.moveTo(cx, cy-8); octx.lineTo(cx, cy+8);
    octx.stroke();
  }

  function render(circle, zone, debugLine){
    resizeOverlay();
    octx.clearRect(0,0, overlay.width, overlay.height);

    const rect = getDisplayRect();
    drawGridAndNumbers(rect);
    drawZoneHighlight(rect, zone);
    drawCircle(rect, circle);

    resultText.textContent = zone ? `${zone}번` : '—';
    debugText.textContent = debugLine || '';
  }

  // ---- v2 링 점수 (원형도/방향일치/반지름일관성) ----
  function scoreCircleByRing(gx, gy, mag, blurGray, x, y, r, magThr){
    const w = mag.cols, h = mag.rows;
    const gxD = gx.data32F, gyD = gy.data32F, mD = mag.data32F;
    const gD  = blurGray.data;

    const N = 96;
    const band = 2;

    let hits = 0;
    let alignSum = 0;

    let radSum = 0;
    let radSum2 = 0;

    const innerR = Math.max(2, r*0.70);
    const outerR = r*1.15;

    let inSum=0, inCnt=0, outSum=0, outCnt=0;

    for(let i=0;i<N;i++){
      const a = (i / N) * Math.PI * 2;
      const ux = Math.cos(a), uy = Math.sin(a);

      let bestM = 0;
      let bestPx = -1, bestPy = -1;
      let bestRR = r;

      for(let dt=-band; dt<=band; dt++){
        const rr = r + dt;
        const px = Math.round(x + rr * ux);
        const py = Math.round(y + rr * uy);
        if(px<0||py<0||px>=w||py>=h) continue;
        const mv = mD[py*w + px];
        if(mv > bestM){
          bestM = mv;
          bestPx = px;
          bestPy = py;
          bestRR = rr;
        }
      }

      {
        const ix = Math.round(x + innerR * ux);
        const iy = Math.round(y + innerR * uy);
        if(ix>=0&&iy>=0&&ix<w&&iy<h){ inSum += gD[iy*w + ix]; inCnt++; }

        const ox = Math.round(x + outerR * ux);
        const oy = Math.round(y + outerR * uy);
        if(ox>=0&&oy>=0&&ox<w&&oy<h){ outSum += gD[oy*w + ox]; outCnt++; }
      }

      if(bestPx < 0) continue;
      if(bestM < magThr) continue;

      hits++;

      radSum += bestRR;
      radSum2 += bestRR*bestRR;

      const gxx = gxD[bestPy*w + bestPx];
      const gyy = gyD[bestPy*w + bestPx];
      const gn = Math.hypot(gxx, gyy) || 1e-6;
      const dot = (gxx*ux + gyy*uy) / gn;
      alignSum += Math.abs(dot);
    }

    const hitRatio = hits / N;
    if(hitRatio < 0.28) return null; // v2(0.33)보다 약간 완화

    const alignAvg = alignSum / Math.max(1, hits);

    const radMean = radSum / Math.max(1, hits);
    const radVar = (radSum2 / Math.max(1, hits)) - radMean*radMean;
    const radStd = Math.sqrt(Math.max(0, radVar));
    const consScore = clamp(1 - (radStd / Math.max(1, r*0.12)), 0, 1);

    let contrastScore = 0;
    let brightBonus = 0;
    if(inCnt>12 && outCnt>12){
      const inMean = inSum/inCnt;
      const outMean = outSum/outCnt;
      const diff = inMean - outMean;
      contrastScore = clamp(Math.abs(diff) / 80, 0, 1);
      brightBonus = clamp((diff - 6) / 70, 0, 1);
    }

    const alignScore = clamp((alignAvg - 0.42) / 0.58, 0, 1); // v2(0.45)보다 약간 완화

    let score =
      0.52*hitRatio +
      0.26*alignScore +
      0.18*consScore +
      0.04*contrastScore +
      0.10*brightBonus;

    const margin = Math.max(3, r*0.12);
    if(x < margin || y < margin || x > (w-margin) || y > (h-margin)){
      score *= 0.90;
    }

    return { score, hitRatio, alignAvg, consScore, contrastScore, brightBonus };
  }

  function mergeCircleList(out, mat, dupDist=8, dupRad=8){
    if(!mat || mat.cols<=0) return;
    for(let i=0;i<mat.cols;i++){
      const x = mat.data32F[i*3 + 0];
      const y = mat.data32F[i*3 + 1];
      const r = mat.data32F[i*3 + 2];
      if(!isFinite(x)||!isFinite(y)||!isFinite(r)) continue;

      const minDim = Math.min(procW, procH);
      const minR = Math.max(10, Math.round(minDim*0.03));
      const maxR = Math.round(minDim*0.48);
      if(r < minR || r > maxR) continue;

      let dup = false;
      for(const c of out){
        const dx = c.x-x, dy=c.y-y;
        if((dx*dx+dy*dy) < dupDist*dupDist && Math.abs(c.r-r) < dupRad){
          dup = true; break;
        }
      }
      if(!dup) out.push({x,y,r});
    }
  }

  /* =========================================================
     ✅ 다색 패턴 필터 (OpenCV 색변환 없이 RGBA에서 직접)
     - 밝기 그라데이션은 허용
     - RGB 비율(Chromaticity) 변동이 크면 "다색"으로 판단
     ========================================================= */

  const COLOR_FILTER = {
    enabled: true,
    bins: 8,                 // chroma bin grid (8x8 = 64)
    minSumRGB: 25,           // 너무 어두운 픽셀 제외(노이즈)
    minSamples: 40,

    // "강하게 다색"일 때만 reject (이게 핵심: 공이 안 막히게)
    strongRejectUniqueBins: 26,
    strongRejectChromaStd:  0.11,

    // 약한 페널티/보너스 계산용(여긴 통과/탈락이 아니라 점수 조정)
    softUniqueRef: 18,
    softStdRef:    0.085,

    // 내부 vs 내부테두리 색비율 차이가 너무 크면 패턴/혼합 가능성
    maxInnerEdgeDelta: 0.14
  };

  function sampleChromaStatsRGBA(rgba, w, h, cx, cy, radii, angles){
    const bins = COLOR_FILTER.bins;
    const seen = new Uint8Array(bins*bins);
    let unique = 0;

    let sumCr=0, sumCg=0, sumCr2=0, sumCg2=0, cnt=0;

    const TWO_PI = Math.PI*2;
    for(let ri=0; ri<radii.length; ri++){
      const rr = radii[ri];
      for(let i=0;i<angles;i++){
        const a = (i/angles)*TWO_PI;
        const px = Math.round(cx + rr*Math.cos(a));
        const py = Math.round(cy + rr*Math.sin(a));
        if(px<0||py<0||px>=w||py>=h) continue;

        const idx = (py*w + px) * 4;
        const r = rgba[idx];
        const g = rgba[idx+1];
        const b = rgba[idx+2];

        const s = r + g + b;
        if(s < COLOR_FILTER.minSumRGB) continue;

        const cr = r / s;
        const cg = g / s;

        sumCr += cr; sumCg += cg;
        sumCr2 += cr*cr; sumCg2 += cg*cg;
        cnt++;

        const br = Math.min(bins-1, Math.max(0, (cr*bins) | 0));
        const bg = Math.min(bins-1, Math.max(0, (cg*bins) | 0));
        const key = br*bins + bg;
        if(seen[key] === 0){
          seen[key] = 1;
          unique++;
        }
      }
    }

    if(cnt <= 0) return null;

    const meanCr = sumCr/cnt;
    const meanCg = sumCg/cnt;
    const varCr = sumCr2/cnt - meanCr*meanCr;
    const varCg = sumCg2/cnt - meanCg*meanCg;
    const stdCr = Math.sqrt(Math.max(0,varCr));
    const stdCg = Math.sqrt(Math.max(0,varCg));
    const chromaStd = Math.sqrt(stdCr*stdCr + stdCg*stdCg);

    return {cnt, meanCr, meanCg, stdCr, stdCg, chromaStd, uniqueBins: unique};
  }

  function colorFilterForCircle(rgba, w, h, x, y, r){
    if(!COLOR_FILTER.enabled) return {reject:false, boost:0, note:'off'};

    if(r < 12) return {reject:false, boost:0.00, note:'small'};

    const innerR = Math.max(2, r*0.60);
    const inner = sampleChromaStatsRGBA(rgba, w, h, x, y, [r*0.15, r*0.30, r*0.45, innerR], 24);

    const edge = sampleChromaStatsRGBA(rgba, w, h, x, y, [r*0.82, r*0.90, r*0.95], 24);

    if(!inner || !edge) return {reject:false, boost:0, note:'no-sample'};

    if(inner.cnt < COLOR_FILTER.minSamples){
      return {reject:false, boost:0.0, note:'few-samples', inner, edge};
    }

    const delta = Math.hypot(inner.meanCr - edge.meanCr, inner.meanCg - edge.meanCg);

    // ✅ “강하게 다색”일 때만 reject (공이 안 막히도록)
    const strongReject =
      (inner.uniqueBins >= COLOR_FILTER.strongRejectUniqueBins) &&
      (inner.chromaStd  >= COLOR_FILTER.strongRejectChromaStd);

    // 경계 혼합이 심하고, 동시에 색 다양성이 크면 reject
    const edgeMixReject =
      (delta > COLOR_FILTER.maxInnerEdgeDelta) &&
      (inner.uniqueBins >= COLOR_FILTER.strongRejectUniqueBins);

    if(strongReject || edgeMixReject){
      return {
        reject:true,
        boost:0,
        note: strongReject ? 'reject:multi-color' : 'reject:edge-mix',
        inner, edge, delta
      };
    }

    // ✅ 통과한 후보 중에서 “단색에 가까울수록” 약간 점수 보너스
    const uScore = clamp(1 - (inner.uniqueBins / COLOR_FILTER.softUniqueRef), 0, 1);
    const sScore = clamp(1 - (inner.chromaStd  / COLOR_FILTER.softStdRef),   0, 1);
    const dScore = clamp(1 - (delta / COLOR_FILTER.maxInnerEdgeDelta),       0, 1);

    const uniformScore = 0.45*uScore + 0.45*sScore + 0.10*dScore;

    // 보너스는 너무 크면 오검출 고착 → 최대 +0.06 정도만
    const boost = 0.06 * uniformScore;

    return {reject:false, boost, note:'ok', inner, edge, delta, uniformScore};
  }

  async function detectOnce(){
    if(!camOn) return;
    if(!cvReady) { render(null, stableZone, 'OpenCV 준비중...'); return; }
    if(video.readyState < 2) return;
    if(busy) return;

    busy = true;
    try{
      ensureProcSize();
      pctx.drawImage(video, 0, 0, procW, procH);

      const src = cv.imread(proc); // RGBA
      const rgba = src.data;       // ✅ 색 필터는 여기서 직접 사용(색변환 없음)

      const gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      const blur = new cv.Mat();
      cv.medianBlur(gray, blur, 5);

      // gradients
      const gx = new cv.Mat(), gy = new cv.Mat(), mag = new cv.Mat();
      cv.Sobel(blur, gx, cv.CV_32F, 1, 0, 3);
      cv.Sobel(blur, gy, cv.CV_32F, 0, 1, 3);
      cv.magnitude(gx, gy, mag);

      // mag threshold: v2보다 약간 관대하게 (공 경계가 약해도 잡히게)
      const mean = new cv.Mat(), std = new cv.Mat();
      cv.meanStdDev(mag, mean, std);
      const mMean = mean.data64F[0] || 0;
      const mStd  = std.data64F[0]  || 0;
      mean.delete(); std.delete();

      const magThr = clamp(mMean + mStd*0.45, 8, 60);

      // HoughCircles: v2 유지 + 후보 더 확보(하나 더)
      const circles1 = new cv.Mat();
      const circles2 = new cv.Mat();
      const circles3 = new cv.Mat();

      const minDim = Math.min(procW, procH);
      const minR = Math.max(10, Math.round(minDim * 0.03));
      const maxR = Math.round(minDim * 0.48);
      const minDist = Math.max(22, Math.round(procH / 6));

      cv.HoughCircles(blur, circles1, cv.HOUGH_GRADIENT, 1.2, minDist, 100, 40, minR, maxR);
      cv.HoughCircles(blur, circles2, cv.HOUGH_GRADIENT, 1.2, minDist, 100, 30, minR, maxR);
      // ✅ 더 느슨하게 후보 확보(점수로 거름)
      cv.HoughCircles(blur, circles3, cv.HOUGH_GRADIENT, 1.1, minDist, 90,  24, minR, maxR);

      const cand = [];
      mergeCircleList(cand, circles1);
      mergeCircleList(cand, circles2);
      mergeCircleList(cand, circles3);

      let best = null;              // 색필터 적용 후 best
      let bestIgnoreColor = null;   // 색필터 무시 시 best(보험)
      let bestCf = null;
      let usedFallback = false;

      for(const c of cand){
        const s = scoreCircleByRing(gx, gy, mag, blur, c.x, c.y, c.r, magThr);
        if(!s) continue;

        // 이전 위치 힌트(약하게)
        let bonusNear = 0;
        if(lastCircle){
          const dx = c.x - lastCircle.x;
          const dy = c.y - lastCircle.y;
          const d = Math.hypot(dx,dy);
          const near = clamp(1 - d/(minDim*0.40), 0, 1);
          bonusNear = 0.02 * near;
        }

        const baseScore = s.score + bonusNear;

        if(!bestIgnoreColor || baseScore > bestIgnoreColor.score){
          bestIgnoreColor = {
            x:c.x, y:c.y, r:c.r,
            score: baseScore,
            baseScore,
            s, cf:null
          };
        }

        const cf = colorFilterForCircle(rgba, procW, procH, c.x, c.y, c.r);
        if(cf.reject) continue; // ✅ 강하게 다색일 때만 reject

        const finalScore = baseScore + cf.boost;

        if(!best || finalScore > best.score){
          best = {
            x:c.x, y:c.y, r:c.r,
            score: finalScore,
            baseScore,
            s, cf
          };
          bestCf = cf;
        }
      }

      // cleanup
      src.delete(); gray.delete(); blur.delete();
      gx.delete(); gy.delete(); mag.delete();
      circles1.delete(); circles2.delete(); circles3.delete();

      // 색필터 때문에 best가 하나도 없으면(또는 후보가 거의 없으면) v2 방식으로 fallback
      if(!best && bestIgnoreColor){
        best = bestIgnoreColor;
        usedFallback = true;
      }

      // ✅ “아예 표시 안 함” 임계값을 조금 낮춤(공 경계가 약한 환경 대응)
      if(!best || best.score < 0.32){
        lastCircle = null;
        pendingZone = null; pendingCount = 0;
        render(null, null, cand.length ? '원 후보가 있으나 점수가 낮아 표시 안 함' : 'Hough 원 후보 없음');
        return;
      }

      lastCircle = {x:best.x, y:best.y, r:best.r};

      const z = zoneFromPoint(best.x, best.y).zone;

      // 안정화(2회 연속 같은 존이면 확정)
      if(stableZone == null){
        stableZone = z;
        pendingZone = null; pendingCount = 0;
      }else if(z === stableZone){
        pendingZone = null; pendingCount = 0;
      }else{
        if(pendingZone === z) pendingCount++;
        else { pendingZone = z; pendingCount = 1; }

        if(pendingCount >= 2){
          stableZone = z;
          pendingZone = null;
          pendingCount = 0;
        }
      }

      const s = best.s;
      let dbg =
        `cand ${cand.length} · score ${(best.score*100).toFixed(1)}% (base ${(best.baseScore*100).toFixed(1)}%) · ` +
        `완전도 ${(s.hitRatio*100).toFixed(0)}% · 방향 ${(s.alignAvg*100).toFixed(0)}% · 일관 ${(s.consScore*100).toFixed(0)}%` +
        (s.brightBonus>0 ? ` · 밝기보너스 ${(s.brightBonus*100).toFixed(0)}%` : '');

      if(COLOR_FILTER.enabled){
        if(usedFallback){
          dbg += ` · CF fallback(색필터로 통과 후보 없음)`;
        }else if(best.cf){
          const inn = best.cf.inner;
          dbg += ` · CF ok (bins ${inn?.uniqueBins ?? '-'}, std ${inn?.chromaStd?.toFixed?.(3) ?? '-'}, Δ ${best.cf.delta?.toFixed?.(3) ?? '-'}, +${(best.cf.boost*100).toFixed(1)}%)`;
        }
      }

      render(best, stableZone, dbg);

    }catch(e){
      console.error(e);
      render(null, null, '오류: ' + e);
    }finally{
      busy = false;
    }
  }

  async function startCam(){
    if(camOn) return;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 640 },
          height:{ ideal: 480 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');

      stableZone = null; pendingZone = null; pendingCount = 0;
      lastCircle = null;

      render(null, null, '');

      if(timer) clearInterval(timer);
      timer = setInterval(detectOnce, DETECT_MS);

      resizeOverlay();
      window.addEventListener('resize', () => {
        resizeOverlay();
        render(lastCircle, stableZone, debugText.textContent || '');
      });

      setStatus(cvReady ? 'OpenCV 준비완료' : 'OpenCV 준비중...');
    }catch(e){
      setStatus('카메라 실패: ' + e);
    }
  }

  function stopCam(){
    if(!camOn) return;
    try{
      if(timer){ clearInterval(timer); timer = null; }
      try{ video.pause(); }catch(_e){}
      if(video.srcObject){
        try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(_e){}
        video.srcObject = null;
      }
      stream = null;
      camOn = false;

      camBtn.textContent = '캠 켜기';
      camBtn.classList.remove('off');

      stableZone = null; pendingZone = null; pendingCount = 0;
      lastCircle = null;

      resultText.textContent = '—';
      debugText.textContent = '';

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
    }catch(_e){}
  }

  camBtn.addEventListener('click', () => {
    if(camOn) stopCam();
    else startCam();
  });

  resizeOverlay();
})();
</script>
