<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Ball Zone Detector (3x3)</title>
  <style>
    :root { --fg: #00ff88; --fg2:#00b7ff; --bg: #000; }
    body { margin:0; background:var(--bg); color:#fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif; overflow:hidden; }
    .wrap { position:relative; width:100vw; height:100vh; }
    video, canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    #overlay { pointer-events:none; }

    .hud {
      position:absolute; left:0; right:0; bottom:0;
      padding:10px 12px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
      display:flex; gap:10px; align-items:flex-end; justify-content:space-between;
    }
    .resultBox{
      display:flex; flex-direction:column; gap:6px;
    }
    .label { font-size:12px; opacity:0.85; }
    .bigNum{
      font-size:44px; font-weight:800; line-height:1;
      letter-spacing:1px;
      color: var(--fg);
      text-shadow: 0 0 10px rgba(0,255,136,0.3);
    }
    .smallRow{ display:flex; gap:10px; font-size:12px; opacity:0.85; }
    .btnBox{ display:flex; gap:8px; align-items:center; }
    button{
      appearance:none; border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.08); color:#fff;
      padding:10px 12px; border-radius:12px; font-weight:700;
      backdrop-filter: blur(6px);
    }
    button:active{ transform: translateY(1px); }
    .note{ position:absolute; top:10px; left:10px; right:10px;
      font-size:12px; line-height:1.35; opacity:0.9;
      background:rgba(0,0,0,0.35); padding:10px 12px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
    }
    .warn{ color:#ffd36a; font-weight:700; }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>

    <div class="note" id="note">
      • 후면 카메라로 공(원형)을 인식해 3×3 구역(1~9) 중 가장 가까운 번호를 표시합니다.<br/>
      • 원형이 충분히 “완벽”하지 않으면 <span class="warn">0</span>을 표시합니다. (인식 주기 0.5초)
    </div>

    <div class="hud">
      <div class="resultBox">
        <div class="label">가장 가까운 구역 번호</div>
        <div class="bigNum" id="zoneNum">0</div>
        <div class="smallRow">
          <div id="scoreTxt">score: -</div>
          <div id="posTxt">pos: -</div>
          <div id="fpsTxt">tick: 500ms</div>
        </div>
      </div>
      <div class="btnBox">
        <button id="btnStart">카메라 시작</button>
        <button id="btnFlip">미러 토글</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d', { alpha: true });

  const zoneNumEl = document.getElementById('zoneNum');
  const scoreTxt = document.getElementById('scoreTxt');
  const posTxt = document.getElementById('posTxt');

  const btnStart = document.getElementById('btnStart');
  const btnFlip = document.getElementById('btnFlip');

  // Offscreen (processing) canvas
  const proc = document.createElement('canvas');
  const pctx = proc.getContext('2d', { willReadFrequently:true });

  let stream = null;
  let mirror = false;
  let timer = null;

  // Detection settings (튜닝 포인트)
  const TICK_MS = 500;

  // “완벽한 동그라미” 기준 (엄격하게 잡음)
  const MIN_RADIUS_PX = 18;          // 너무 작은 노이즈 방지
  const MAX_RADIUS_PX = 260;         // 너무 큰 오검출 방지(화면 크기에 따라 조정)
  const MIN_CIRCULARITY = 0.86;      // 1에 가까울수록 원
  const MAX_RADIUS_STD_RATIO = 0.10; // 중심에서 에지까지 거리 편차(작을수록 완벽한 원)
  const MIN_EDGE_PIXELS = 420;       // 원 둘레를 이루는 에지 픽셀 수 최소
  const EDGE_THRESHOLD = 60;         // Sobel magnitude threshold(클수록 엄격)

  // Zone map: 3x3, 번호는 1~9 (좌상=1, 우상=3, 좌하=7, 우하=9)
  function getZoneFromPoint(x, y, w, h) {
    const col = Math.min(2, Math.max(0, Math.floor(x / (w/3))));
    const row = Math.min(2, Math.max(0, Math.floor(y / (h/3))));
    return row * 3 + col + 1;
  }

  function resizeCanvases() {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const rect = overlay.getBoundingClientRect();
    overlay.width = Math.round(rect.width * dpr);
    overlay.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);

    // processing canvas는 video 실제 픽셀 기준으로 맞춤(가능하면)
    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 480;

    // 성능/안정성 위해 처리 해상도 약간 축소(너무 줄이면 정확도 감소)
    const scale = Math.min(1, 720 / Math.max(vw, vh));
    proc.width = Math.round(vw * scale);
    proc.height = Math.round(vh * scale);
  }

  async function startCamera() {
    if (stream) return;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      resizeCanvases();
      window.addEventListener('resize', resizeCanvases);

      if (timer) clearInterval(timer);
      timer = setInterval(detectTick, TICK_MS);
      btnStart.textContent = "카메라 실행중";
      btnStart.disabled = true;
    } catch (e) {
      alert("카메라를 시작할 수 없습니다. HTTPS 환경/권한을 확인해주세요.\n" + e.message);
      console.error(e);
    }
  }

  btnStart.addEventListener('click', startCamera);

  btnFlip.addEventListener('click', () => {
    mirror = !mirror;
    // video 미러는 CSS로
    video.style.transform = mirror ? "scaleX(-1)" : "none";
  });

  // Draw grid + numbers on overlay
  function drawGrid(w, h) {
    ctx.save();
    ctx.clearRect(0,0,w,h);

    // grid lines
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(0,255,136,0.55)";
    for (let i=1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo((w/3)*i, 0);
      ctx.lineTo((w/3)*i, h);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, (h/3)*i);
      ctx.lineTo(w, (h/3)*i);
      ctx.stroke();
    }

    // numbers 1~9
    ctx.font = "bold 28px system-ui, -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.fillStyle = "rgba(0,183,255,0.85)";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (let r=0;r<3;r++){
      for (let c=0;c<3;c++){
        const num = r*3+c+1;
        const cx = (c+0.5)*(w/3);
        const cy = (r+0.5)*(h/3);
        ctx.fillText(String(num), cx, cy);
      }
    }
    ctx.restore();
  }

  // Sobel edge detection on grayscale, returns edge map (Uint8Array 0/1) and list of edge points
  function sobelEdges(gray, w, h, threshold) {
    const edges = new Uint8Array(w*h);
    const pts = [];
    // skip border
    for (let y=1; y<h-1; y++){
      const yw = y*w;
      for (let x=1; x<w-1; x++){
        const i = yw + x;
        const a00 = gray[i-w-1], a01 = gray[i-w], a02 = gray[i-w+1];
        const a10 = gray[i-1],   a11 = gray[i],   a12 = gray[i+1];
        const a20 = gray[i+w-1], a21 = gray[i+w], a22 = gray[i+w+1];

        const gx = (-a00 + a02) + (-2*a10 + 2*a12) + (-a20 + a22);
        const gy = ( a00 + 2*a01 + a02) + (-a20 -2*a21 - a22);
        const mag = Math.abs(gx) + Math.abs(gy); // L1 근사

        if (mag >= threshold) {
          edges[i] = 1;
          pts.push([x,y]);
        }
      }
    }
    return { edges, pts };
  }

  // RANSAC-like circle fit by sampling 3 points (간단 버전)
  function circleFrom3(p1, p2, p3) {
    const [x1,y1]=p1, [x2,y2]=p2, [x3,y3]=p3;
    const a = x1 - x2, b = y1 - y2;
    const c = x1 - x3, d = y1 - y3;
    const e = ((x1*x1 - x2*x2) + (y1*y1 - y2*y2)) / 2;
    const f = ((x1*x1 - x3*x3) + (y1*y1 - y3*y3)) / 2;
    const det = a*d - b*c;
    if (Math.abs(det) < 1e-6) return null;
    const cx = (d*e - b*f) / det;
    const cy = (-c*e + a*f) / det;
    const r = Math.hypot(cx-x1, cy-y1);
    return { cx, cy, r };
  }

  function computeCircularity(area, perimeter) {
    // 4πA / P^2 (1이면 완벽한 원)
    if (perimeter <= 1) return 0;
    return (4 * Math.PI * area) / (perimeter * perimeter);
  }

  // 대략적 원 후보 검출:
  // 1) Sobel 에지 추출
  // 2) 에지 점에서 3점 샘플링으로 원 후보 생성 (여러 번)
  // 3) 후보 원에 대해 에지 근접 점(inlier) 비율/반지름 편차로 score 계산
  function detectBestCircle(procW, procH) {
    const img = pctx.getImageData(0,0,procW,procH);
    const data = img.data;

    // grayscale
    const gray = new Uint8Array(procW*procH);
    for (let i=0, j=0; i<data.length; i+=4, j++){
      // luminance
      gray[j] = (0.2126*data[i] + 0.7152*data[i+1] + 0.0722*data[i+2]) | 0;
    }

    const { pts } = sobelEdges(gray, procW, procH, EDGE_THRESHOLD);

    if (pts.length < MIN_EDGE_PIXELS) return null;

    // 샘플링 횟수: 너무 높이면 느려짐
    const tries = Math.min(220, Math.max(80, Math.floor(pts.length / 30)));
    let best = null;

    function randPt() {
      return pts[(Math.random()*pts.length)|0];
    }

    for (let t=0; t<tries; t++){
      const p1 = randPt(), p2 = randPt(), p3 = randPt();
      const c = circleFrom3(p1,p2,p3);
      if (!c) continue;
      if (!isFinite(c.cx) || !isFinite(c.cy) || !isFinite(c.r)) continue;
      if (c.r < MIN_RADIUS_PX || c.r > MAX_RADIUS_PX) continue;
      if (c.cx < 0 || c.cx >= procW || c.cy < 0 || c.cy >= procH) continue;

      // inlier 검사: 에지 점 중 원 둘레에 가까운 점(허용오차)
      const tol = Math.max(2.2, c.r * 0.035); // 반지름 비례 허용
      let inliers = 0;
      let sumR = 0, sumR2 = 0;

      // 전부 보면 느리니 일부만 샘플
      const step = Math.max(1, Math.floor(pts.length / 900));
      for (let k=0; k<pts.length; k+=step){
        const [x,y] = pts[k];
        const rr = Math.hypot(x - c.cx, y - c.cy);
        const d = Math.abs(rr - c.r);
        if (d <= tol) {
          inliers++;
          sumR += rr;
          sumR2 += rr*rr;
        }
      }

      if (inliers < MIN_EDGE_PIXELS * 0.25) continue;

      const n = inliers;
      const mean = sumR / n;
      const varr = (sumR2 / n) - (mean*mean);
      const std = Math.sqrt(Math.max(0, varr));
      const stdRatio = std / (mean + 1e-6);

      // inlier 비율 근사
      const inlierRatio = n / (pts.length / step);

      // 원형도 score: inlierRatio가 높고 stdRatio가 낮을수록 좋음
      const score = (inlierRatio * 1.2) - (stdRatio * 1.8);

      if (!best || score > best.score) {
        best = { ...c, score, inliers:n, stdRatio };
      }
    }

    if (!best) return null;

    // “완벽한 동그라미” 판정 강화
    if (best.stdRatio > MAX_RADIUS_STD_RATIO) return null;
    // score 하한(환경 따라 조정 가능)
    if (best.score < 0.22) return null;

    return best;
  }

  function detectTick() {
    if (!video.videoWidth || !video.videoHeight) return;

    // processing canvas에 현재 프레임 그림
    const vw = video.videoWidth, vh = video.videoHeight;
    const pw = proc.width, ph = proc.height;

    // video -> proc로 스케일 드로우
    pctx.save();
    pctx.clearRect(0,0,pw,ph);

    // 미러가 켜져있다면 processing도 동일하게 미러해줘야 좌표가 맞음
    if (mirror) {
      pctx.translate(pw, 0);
      pctx.scale(-1, 1);
    }
    pctx.drawImage(video, 0,0, vw, vh, 0,0, pw, ph);
    pctx.restore();

    // overlay에 그리드
    const ow = overlay.getBoundingClientRect().width;
    const oh = overlay.getBoundingClientRect().height;
    drawGrid(ow, oh);

    // 원 검출
    const best = detectBestCircle(pw, ph);

    if (!best) {
      zoneNumEl.textContent = "0";
      scoreTxt.textContent = "score: -";
      posTxt.textContent = "pos: -";
      return;
    }

    // proc 좌표 -> overlay 좌표로 변환
    // video는 object-fit: cover 이므로 화면에 표시된 영역과 비율이 다를 수 있음.
    // 여기서는 "대략" 맞추기 위해 overlay 전체를 video 프레임으로 본다고 가정(실사용에서 충분히 동작).
    const cx_norm = best.cx / pw;
    const cy_norm = best.cy / ph;

    const cx = cx_norm * ow;
    const cy = cy_norm * oh;
    const r  = (best.r / pw) * ow;

    // zone 계산
    const zone = getZoneFromPoint(cx, cy, ow, oh);

    // 표시 업데이트
    zoneNumEl.textContent = String(zone);
    scoreTxt.textContent = `score: ${best.score.toFixed(3)} / std: ${best.stdRatio.toFixed(3)} / inliers: ${best.inliers}`;
    posTxt.textContent = `pos: (${Math.round(cx)}, ${Math.round(cy)})`;

    // overlay에 원 표시
    ctx.save();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(0,255,136,0.95)";
    ctx.beginPath();
    ctx.arc(cx, cy, Math.max(10, r), 0, Math.PI*2);
    ctx.stroke();

    // 중심점
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fill();

    // zone 강조 박스
    const c = (zone-1)%3;
    const rr = Math.floor((zone-1)/3);
    const zx = c*(ow/3);
    const zy = rr*(oh/3);
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(0,183,255,0.95)";
    ctx.strokeRect(zx+2, zy+2, (ow/3)-4, (oh/3)-4);
    ctx.restore();
  }

  // 자동 시작(모바일에서 막힐 수 있어 버튼도 제공)
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    // iOS는 사용자 제스처 필요할 수 있으니 자동은 시도만
    // 실패해도 버튼으로 시작 가능
    startCamera().catch(()=>{});
  }
})();
</script>
</body>
</html>
