<style>

/* === 전체화면 실행 시: 영상 크게, 로그 조금 작게 === */
#playOverlay .body{
  display:grid;
  grid-template-columns: minmax(0, 2.6fr) minmax(260px, 1fr);
  gap:0;
  height:100%;
}

/* 전체화면 카메라 래퍼 */
#playOverlay #ovCamWrap{
  position:relative;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 전체화면 카메라 영상 */
#playOverlay #ovCamWrap video#eyesCam{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  transform: scaleX(-1);
}

/* 오른쪽 전체화면 로그 패널 */
#playOverlay .ov-right-panel{
  display:flex;
  flex-direction:column;
  min-width:0;
  background:#0b0f14;
  border-left:1px solid #123;
}
#playOverlay .ov-header{
  padding:10px 12px;
  font-weight:600;
  color:#b7d7ff;
  border-bottom:1px solid #123;
}
#playOverlay .ov-log{
  flex:1 1 auto;
  overflow:auto;
  padding:10px 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size:13px;
  line-height:1.4;
  color:#d3e6ff;
  background:#0b0f14;
}

/* 전체화면 배지 (캠 화면 아래쪽) */
#ovCamWrap #overlayDigitBadge{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:12px;
  z-index:2;
  display:inline-flex;
  align-items:center;
  gap:.55rem;
  font: 800 13px/1 system-ui;
  color:#fff;
  padding:.48rem .8rem;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.35);
  backdrop-filter: blur(6px);
}
#overlayDigitBadge .label{
  opacity:.7;
  font-size:12px;
}
#overlayDigitBadge .value{
  font: 900 18px/1.1 ui-monospace, Menlo, Consolas, monospace;
  padding: 2px 8px;
  border-radius:8px;
  background: rgba(255,255,255,.12);
  box-shadow: 0 0 0 2px rgba(255,255,255,.18) inset;
}

@media (max-width:880px){
  #playOverlay .body{
    grid-template-columns: 1fr;
    grid-template-rows: minmax(0, 1.7fr) minmax(180px, .9fr);
  }
  #playOverlay .ov-right-panel{
    border-left:none;
    border-top:1px solid #123;
  }
}

/* 눈동자 애니메이션은 숨기고 구조 유지 */
#eyesStage{display:none !important;}

  :root{
    --pad:10px;
    --uiScale: 1;
    --headerH: 64px;
    --btnH: 36px;
    --gap: 8px;
    --headerBgTop: #fff7ed;
    --headerBgBottom: #fffbeb;
    --headerBorder: #fed7aa;
    --logH: 180px;
    --blue: #1d4ed8;

    --handleWBase: 22;
    --handleHBase: 28;
    --triWBase:   14;
    --triHBase:   12;

    --handleW: calc(var(--handleWBase) * var(--uiScale) * 1px);
    --handleH: calc(var(--handleHBase) * var(--uiScale) * 1px);
    --triW:    calc(var(--triWBase)    * var(--uiScale) * 1px);
    --triH:    calc(var(--triHBase)    * var(--uiScale) * 1px);
    --linkBar: calc(3 * var(--uiScale) * 1px);

    --keyW: clamp(52px, 8vmin, 92px);
    --keyH: calc(var(--keyW) * 2.7);
    --keyGap: 6px;
    --keyFont: 14px;

    --eyesGap: 8vmin;
    --eyeSize: 42vmin;
    --pupilSize: 16vmin;
    --blinkSpeed: 180ms;
  }
  @media (max-width: 480px){
    :root{ --keyGap: 4px; --keyFont: 13px; }
  }

  *{ box-sizing:border-box; }
  html, body{ height:100%; }
  body{ margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#fff; }

  /* ── 헤더 ───────────────────────────────── */
  header{
    padding: 8px 12px;
    background: linear-gradient(180deg, var(--headerBgTop), var(--headerBgBottom));
    border-bottom: 1px solid var(--headerBorder);
    position:relative; z-index:10;
  }
  #topbar{
    display:flex;
    align-items:center;
    gap: calc(var(--gap) * var(--uiScale));
    flex-wrap: wrap;
  }
  .title{
    font-weight: 800;
    letter-spacing: .2px;
    color:#7c2d12;
    margin-right: 12px;
    font-size: calc(18px * var(--uiScale));
  }
  .spacer{ flex: 1 1 auto; }

  .btn{
    height: calc(var(--btnH) * var(--uiScale));
    padding: 0 calc(12px * var(--uiScale));
    border:0;
    border-radius: calc(10px * var(--uiScale));
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size: calc(14px * var(--uiScale));
    font-weight:600;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    background:#f3f4f6;
    color:#111827;
    cursor:pointer;
    user-select:none;
  }
  .btn.small{
    height: calc(var(--btnH) * var(--uiScale) * .85);
    padding: 0 calc(10px * var(--uiScale));
    font-size: calc(12px * var(--uiScale));
  }
  #connectToggle{ background:#2563eb; color:#fff; }
  #testBtn{ background:#0ea5e9; color:#fff; }
  #runToggle{ background:#16a34a; color:#fff; }
  #fsBtn{ background:#111827; color:#fff; }

  .state{
    display:inline-flex;
    align-items:center;
    gap:calc(6px * var(--uiScale));
    height: calc(var(--btnH) * var(--uiScale));
    padding: 0 calc(6px * var(--uiScale));
    font-size: calc(12px * var(--uiScale));
  }
  .badgeDot{
    width: calc(22px * var(--uiScale));
    height: calc(22px * var(--uiScale));
    border-radius: 50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size: calc(11px * var(--uiScale));
    font-weight:800;
    color:#fff;
    box-shadow: 0 0 0 calc(4px * var(--uiScale)) rgba(0,0,0,.06) inset;
  }
  .badgeDot.on{ background:#3b82f6; }
  .badgeDot.off{ background:#ef4444; }

  /* ── 레이아웃 ─────────────────────────── */
  #main{
    display:flex;
    width:100%;
    height: calc(100vh - var(--headerH));
  }
  #left{
    position:relative;
    flex:1 1 auto;
    min-width:0;
    height:100%;
    display:flex;
    overflow:visible;
  }
  #blocklyDiv{
    flex:1 1 auto;
    min-width:0;
    height:100%;
    width:100%;
  }

  #right{
    flex:0 0 40%;
    display:flex;
    flex-direction:column;
    background:#fff;
    margin:8px 8px 8px 0;
    border:1px solid #e5e7eb;
    border-left:3px solid var(--blue);
    border-radius:12px 0 0 12px;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
    overflow:hidden;
    position:relative;
  }

  /* ── 우측 상단: 카메라 프리뷰 ── */
  #rightTop{
    flex:1 1 auto;
    border-bottom:1px solid #e5e7eb;
    min-height: 120px;
    background:#0b0f14;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 0;
    overflow:hidden;
  }
  .camWrap{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
  }
  #camVideo{
    width:100%;
    height:100%;
    object-fit:contain; /* 라인과 영상 정렬 */
    transform: scaleX(-1);
    background:#000;
  }
  .camUi{
    position:absolute;
    right:12px;
    top:12px;
    display:flex;
    gap:8px;
    align-items:center;
    z-index:3;
  }
  .camBadge{
    font: 700 12px/1 system-ui;
    color:#fff;
    padding:.35rem .6rem;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.3);
    background:rgba(0,0,0,.35);
    backdrop-filter: blur(6px)
  }

  /* 기존 중심 사각형(ROI) 제거 */
  #focusBox{ display:none !important; }
  #ovFocusBox{ display:none !important; }

  /* ===== 9분할(3x3) 라인 오버레이 ===== */
  /* 숨기려면 opacity:0 으로 변경 */
  .gridOverlay{
    position:absolute;
    left:0; top:0; width:100%; height:100%;
    pointer-events:none;
    z-index:2;
    opacity:1;
  }
  .gridOverlay .gridLine{
    position:absolute;
    background: rgba(255,255,255,.9); /* 흰색 얇은 라인 */
  }
  .gridOverlay .v1{ left:33.3333%; top:0; width:1px; height:100%; transform: translateX(-0.5px); }
  .gridOverlay .v2{ left:66.6666%; top:0; width:1px; height:100%; transform: translateX(-0.5px); }
  .gridOverlay .h1{ top:33.3333%; left:0; height:1px; width:100%; transform: translateY(-0.5px); }
  .gridOverlay .h2{ top:66.6666%; left:0; height:1px; width:100%; transform: translateY(-0.5px); }

  /* 카메라 인식 읽기 배지(우측 패널) */
  #digitReadout{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:12px;
    z-index:3;
    display:inline-flex;
    align-items:center;
    gap:.55rem;
    font: 800 13px/1 system-ui;
    color:#fff;
    padding:.48rem .8rem;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(0,0,0,.35);
    backdrop-filter: blur(6px);
  }
  #digitReadout .value{
    font: 900 18px/1.1 ui-monospace, Menlo, Consolas, monospace;
    padding: 2px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,.12);
    box-shadow: 0 0 0 2px rgba(255,255,255,.18) inset;
  }

  /* 리사이저 바 */
  #rightDivider{
    flex:0 0 6px;
    cursor: row-resize;
    background: repeating-linear-gradient(90deg, #d1d5db 0, #d1d5db 6px, #e5e7eb 6px, #e5e7eb 12px);
  }

  /* 로그 패널 */
  #rightBottom{
    flex: 0 0 var(--logH);
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
    padding: calc(10px * var(--uiScale));
    background:#0b0f14;
    color:#d1e4ff;
    border-top:1px solid #1f2937;
  }
  #log{
    flex:1 1 0;
    min-height:0;
    overflow:auto;
    white-space:pre-wrap;
    background:#0b0f14;
    border:1px solid #1f2937;
    border-radius: calc(8px * var(--uiScale));
    padding: calc(10px * var(--uiScale));
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: calc(12px * var(--uiScale));
    color:#d1e4ff;
  }

  /* 실행창 토글 핸들 (슬라이더만 사용 – 숨김 상태) */
  #panelHandle{
    position:absolute;
    top: calc(12px * var(--uiScale));
    right: 0;
    z-index:999;
    width: var(--handleW);
    height: var(--handleH);
    background: var(--blue);
    border: 0;
    border-radius: calc(6px * var(--uiScale));
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    cursor: pointer;
    padding: 0;
  }
  #panelHandle::before{
    content:'';
    position:absolute;
    top:0;
    right: calc(0px - var(--linkBar));
    width: var(--linkBar);
    height:100%;
    background: var(--blue);
    border-top-right-radius: calc(6px * var(--uiScale));
    border-bottom-right-radius: calc(6px * var(--uiScale));
  }
  #panelHandle::after{
    content:'';
    position:absolute;
    top:50%;
    transform: translateY(-50%);
    width:0;
    height:0;
    border-style: solid;
  }
  #panelHandle.open::after{
    left: calc((var(--handleW) - var(--triW)) / 2);
    border-width: var(--triH) 0 var(--triH) var(--triW);
    border-color: transparent transparent transparent white;
  }
  #panelHandle.closed::after{
    left: calc((var(--handleW) - var(--triW)) / 2);
    border-width: var(--triH) var(--triW) var(--triH) 0;
    border-color: transparent white transparent transparent;
  }
  .blocklyZoom,.blocklyTrash{ display:block !important; }
  .blocklyTrashLid, .blocklyTrashcanLid, .blocklyTrashCanLid { display:none !important; }

  body.fs-active #main{ height: calc(100vh - var(--headerH)); }
  body.panel-collapsed #right{ display:none; }
  body.panel-collapsed #left{ flex:1 1 100%; }

  /* ── 전체화면 오버레이 ───────────────── */
  #playOverlay{
    position:fixed;
    inset:0;
    background:#000;
    color:#fff;
    display:none;
    z-index:10000;
    touch-action:none;
    overscroll-behavior:contain;
    -webkit-tap-highlight-color:transparent;
    --eyesGap: 4.8vmin;
    --eyeSize: 25.2vmin;
    --pupilSize: 9.6vmin;
  }
  @media (orientation: landscape){
    #playOverlay{
      --eyesGap: calc(4.8vmin * 2);
      --eyeSize: calc(25.2vmin * 1.5);
      --pupilSize: calc(9.6vmin * 1.5);
    }
  }
  #playOverlay.show{
    display:flex;
    flex-direction:column;
  }
  #playOverlay .body{
    flex:1 1 auto;
    display:grid;
    grid-template-columns: minmax(0, 2.6fr) minmax(260px, 1fr);
    gap:0;
    background:#000;
    height:100%;
  }

  /* 눈동자 UI 구조 유지 */
  #eyesStage{
    width:100%;
    height:100%;
    display:grid;
    place-items:center;
    background:#000;
  }
  .eyes{
    display:grid;
    grid-auto-flow:column;
    align-items:center;
    gap: var(--eyesGap);
  }
  .eye{
    position:relative;
    width:var(--eyeSize);
    height:var(--eyeSize);
    border-radius: 50%;
    overflow:hidden;
    background: radial-gradient(ellipse at 40% 40%, #fff 0 70%, #e9e9e9 100%);
    box-shadow: 0 1.2vmin 3vmin rgba(0,0,0,.45),
                inset 0 -0.8vmin 1.6vmin rgba(0,0,0,.12);
  }
  .pupil{
    position:absolute;
    width:var(--pupilSize);
    height:var(--pupilSize);
    border-radius:50%;
    background: radial-gradient(circle at 40% 35%, #222 0 45%, #000 70%, #000 100%);
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    will-change: transform;
  }
  .shine{
    position:absolute;
    width: calc(var(--pupilSize)*.35);
    height: calc(var(--pupilSize)*.35);
    border-radius:50%;
    background: rgba(255,255,255,.85);
    left:25%;
    top:22%;
    filter: blur(0.2vmin);
  }
  .shine::after{
    content:"";
    position:absolute;
    width:55%;
    height:55%;
    left:150%;
    top:130%;
    border-radius:50%;
    background: rgba(255,255,255,.4);
    filter: blur(0.25vmin);
  }
  .eyelid{
    position:absolute;
    inset:0;
    background:#000;
    transform-origin:top center;
    transform:scaleY(0);
    pointer-events:none;
  }
  .blink .eyelid{
    animation: blink var(--blinkSpeed) ease-in-out forwards;
  }
  @keyframes blink{
    0%{transform:scaleY(0)}
    45%{transform:scaleY(1)}
    100%{transform:scaleY(0)}
  }

  /* === 파일 드롭다운 === */
  .dropdown{ position:relative; }
  .dropdown .menu{
    position:absolute;
    right:0;
    top:calc(100% + 4px);
    display:none;
    min-width:140px;
    background:#ffffff;
    border:1px solid #d1d5db;
    border-radius:8px;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
    padding:6px;
    z-index:1000;
  }
  .dropdown .menu.show{ display:block; }
  .dropdown .menu > button{
    width:100%;
    background:transparent;
    border:0;
    cursor:pointer;
    padding:8px 10px;
    border-radius:6px;
    font-size:calc(13px * var(--uiScale));
    text-align:left;
    color:#111827;
  }
  .dropdown .menu > button:hover{ background:#f3f4f6; }
  #fileBtn{ background:#6b7280; color:#ffffff; }
</style>

<!-- 좌우 크기 슬라이더 -->

<body>
  <!-- 헤더 -->
  <header id="appHeader">
    <div id="topbar">
      <div class="title">XROBO v5 — 공 따라가기</div>
      <div class="spacer"></div>

/* ================= 코드 빌더 ================= */
function numFromInput(parent, name, def){
  if (def===void 0) def=0;
  var raw = Blockly.JavaScript.valueToCode(parent, name, Blockly.JavaScript.ORDER_NONE);
  var n = Number(raw != null ? raw : '');
  return (isFinite(n) ? n : def);
}
function walkNode(b, list){
  if(!b) return;
  switch(b.type){
    case 'motor12_dd':{
      var v1=+b.getFieldValue('M1'),
          v2=+b.getFieldValue('M2'),
          ms=+b.getFieldValue('MS');
      list.push({type:'CMD',s:'M12 '+v1+' '+v2+' '+ms});
      if(ms>0) list.push({type:'W',args:[ms]});
      break;
    }
    case 'motor12_in':{
      var v1n=numFromInput(b,'M1',0),
          v2n=numFromInput(b,'M2',0),
          msn=numFromInput(b,'MS',0);
      list.push({type:'CMD',s:'M12 '+Math.round(v1n)+' '+Math.round(v2n)+' '+Math.round(msn)});
      if(msn>0) list.push({type:'W',args:[msn]});
      break;
    }
    case 'melody':{
      var p=b.getFieldValue('PITCH'),
          dur=numFromInput(b,'DUR',200),
          wait=numFromInput(b,'WAIT',0);
      list.push({type:'CMD',s:'MEL '+p+' '+Math.round(dur)+' '+Math.round(wait)});
      if(wait>0) list.push({type:'W',args:[wait]});
      break;
    }
    case 'led_ctrl':{
      var t=b.getFieldValue('TGT'),
          m=b.getFieldValue('MODE'),
          v=+b.getFieldValue('VAL');
      list.push({type:'CMD',s:'LED '+t+' '+m+' '+v});
      break;
    }
    case 'controls_repeat_ext':{
      var times=Math.max(0, numFromInput(b,'TIMES',1));
      var inner=[];
      var first=b.getInputTargetBlock('DO');
      walkChain(first, inner);
      list.push({type:'FOR',count:times,body:inner});
      break;
    }
    case 'wait_seconds':{
      var s=numFromInput(b,'SEC',1);
      if(s>0) list.push({type:'W',args:[s*1000]});
      break;
    }
  }
}
function walkChain(start, list){
  for(var n=start; n; n=n.getNextBlock()){
    walkNode(n, list);
  }
}
function normalizeProgram(list){
  var out=[];
  for(var i=0;i<list.length;i++){
    var ins=list[i];
    if(ins.type==='CMD'){
      var prev=out[out.length-1];
      if(prev && prev.type==='CMD' && prev.s===ins.s) continue;
    }else if(ins.type==='W'){
      if(!isFinite(ins.args && ins.args[0]) || ins.args[0]<=0) continue;
      var prevw=out[out.length-1];
      if(prevw && prevw.type==='W'){
        prevw.args[0]+=ins.args[0];
        continue;
      }
    }
    out.push(ins);
  }
  return out;
}
function buildEventPrograms(){
  const programs = {
    B_FAR_LEFT:[], B_FAR:[], B_FAR_RIGHT:[],
    B_LEFT:[], B_CENTER:[], B_RIGHT:[],
    B_LEFT_NEAR:[], B_NEAR:[], B_RIGHT_NEAR:[]
  };
  var evs = ws.getBlocksByType('xrobo_start', true);
  for(var i=0;i<evs.length;i++){
    var code = evs[i].getFieldValue('DIGIT') || 'B_CENTER';
    var chain = evs[i].getNextBlock();
    if(!chain) continue;
    var prog=[];
    walkChain(chain, prog);
    var norm = normalizeProgram(prog);
    if(!programs[code]) programs[code] = [];
    programs[code] = programs[code].concat(norm);
  }
  return programs;
}

/* BLE connect/disconnect */
function connectBLE(){
  if(!navigator.bluetooth){
    alert('이 브라우저는 Web Bluetooth 미지원입니다.');
    return;
  }
  (async function(){
    try{
      var dev = await navigator.bluetooth.requestDevice({
        filters:[{ namePrefix:'XROBO' }],
        optionalServices:[SERVICE_UUID, 0xFFF3, 0xFFF4]
      });
      try{
        if (bleDevice && bleDevice.removeEventListener){
          bleDevice.removeEventListener('gattserverdisconnected', onDisconnected);
        }
      }catch(e){}
      resetBleRefs();
      bleDevice=dev;
      if (bleDevice && bleDevice.addEventListener){
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      }

      bleServer=await bleDevice.gatt.connect();
      bleService=await bleServer.getPrimaryService(SERVICE_UUID);

      try{ writeChar=await bleService.getCharacteristic(0xFFF3);}catch(e){}
      try{ notifyChar=await bleService.getCharacteristic(0xFFF4);}catch(e){}
      if(!writeChar || notifyChar==null){
        var cs=await bleService.getCharacteristics();
        for(var i=0;i<cs.length;i++){
          var ch=cs[i], p=ch.properties||{};
          if(!writeChar && (p.write||p.writeWithoutResponse)) writeChar=ch;
          if(!notifyChar && p.notify) notifyChar=ch;
        }
      }
      if(!writeChar) throw new Error('write 특성을 찾지 못했습니다.');
      if(notifyChar){
        await notifyChar.startNotifications();
        if (notifyChar.addEventListener){
          notifyChar.addEventListener('characteristicvaluechanged',function(ev){
            try{
              var v=new TextDecoder().decode(ev.target.value||new Uint8Array());
              log('⬅️ '+v.trim());
            }catch(e){}
          });
        }
      }
      setConnected(true);
      log('✅ 연결: '+(dev.name||'(이름 없음)'));
    }catch(e){
      console.error(e);
      log('❌ 연결 실패: '+e);
      setConnected(false);
      resetBleRefs();
    }
  })();
}
function onDisconnected(){
  log('🔌 해제됨');
  setConnected(false);
  resetBleRefs();
}
function disconnectBLE(){
  try{
    if (bleDevice && bleDevice.gatt) bleDevice.gatt.disconnect();
  }catch(e){}
  setConnected(false);
  resetBleRefs();
}
btnConnect.onclick = ()=> isConnected ? disconnectBLE() : connectBLE();

function serializeProject(){
  var xmlDom = Blockly.Xml.workspaceToDom(ws);
  var xmlText = Blockly.Xml.domToText(xmlDom);
  return JSON.stringify({type:'xrobo_project_v1', xml: xmlText}, null, 2);
}
function saveProject(){
  var data = serializeProject();
  var suggestedName = 'xrobo_project.json';
  if(window.showSaveFilePicker){
    (async function(){
      try{
        var handle = await showSaveFilePicker({
          suggestedName,
          types:[{description:'XROBO Project', accept:{'application/json':['.json']}}]
        });
        var stream = await handle.createWritable();
        await stream.write(new Blob([data], {type:'application/json'}));
        await stream.close();
        log('💾 저장 완료');
      }catch(e){
        if(!(e && e.name==='AbortError')) log('⚠️ 저장 실패: '+e);
      }
    })();
  }else{
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([data], {type:'application/json'}));
    a.download=suggestedName;
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); }, 1000);
    log('💾 저장(다운로드) 완료');
  }
}
function loadProject(){
  (async function(){
    try{
      var text='';
      if(window.showOpenFilePicker){
        var arr = await showOpenFilePicker({
          types:[{description:'XROBO Project', accept:{'application/json':['.json']}}]
        });
        var handle = arr[0];
        var file = await handle.getFile();
        text = await file.text();
      }else{
        var input=document.createElement('input');
        input.type='file';
        input.accept='.json,application/json';
        var pick = new Promise((res,rej)=>{
          input.onchange=()=>{ res(input.files[0]||null); };
          input.onerror=rej;
        });
        input.click();
        var file = await pick;
        if(!file) return;
        text = await file.text();
      }
      var obj = JSON.parse(text);
      if(!obj || obj.type!=='xrobo_project_v1') throw new Error('알 수 없는 프로젝트 형식');
      ws.clear();
      var parser = new DOMParser();
      var xml = parser.parseFromString(obj.xml, 'text/xml');
      Blockly.Xml.domToWorkspace(xml.documentElement, ws);
      log('📂 불러오기 완료');
    }catch(e){
      if(!(e && e.name==='AbortError')) alert('불러오기 실패: '+e);
    }
  })();
}

    e.preventDefault();
    dragging=true;
    startY=('touches' in e ? e.touches[0].clientY : e.clientY);
    startH=pxToNum(getComputedStyle(root).getPropertyValue('--logH'));
    rightH=document.getElementById('right').clientHeight;
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, {passive:false});
    window.addEventListener('mouseup', onUp, {once:true});
    window.addEventListener('touchend', onUp, {once:true});
  }
  function onMove(e){
    if(!dragging) return;
    var y=('touches' in e ? e.touches[0].clientY : e.clientY);
    if('touches' in e) e.preventDefault();
    var delta = startY - y;
    var nh = startH + delta;
    var minH=90, maxH=Math.max(130, Math.floor(rightH*0.8));
    nh=Math.min(maxH, Math.max(minH, nh));
    root.style.setProperty('--logH', nh+'px');
  }
  function onUp(){
    dragging=false;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('touchmove', onMove);
  }
  divider.addEventListener('mousedown', onDown);
  divider.addEventListener('touchstart', onDown, {passive:false});
})();

var overlay=document.getElementById('playOverlay');
var eventPrograms = {};
var queue = [];
var queueBusy = false;
var cancelToken = 0;

function sendRaw(s){
  if(!writeChar){
    log('➡️(BLE 미연결) '+s);
    return Promise.resolve();
  }
  return writeChar.writeValue(enc(s+'\n'))
    .then(()=>{ log('➡️ '+s); })
    .catch(e=>{ log('⚠️ 전송 실패: '+e); });
}
async function runList(list, localToken){
  for(var i=0;i<list.length;i++){
    var ins=list[i];
    if(localToken !== cancelToken) return;
    if(ins.type==='CMD'){
      await sendRaw(ins.s);
    }else if(ins.type==='W'){
      var ms = (ins.args && ins.args[0]) ? ins.args[0] : 0;
      await new Promise(r=>setTimeout(r, ms));
    }else if(ins.type==='FOR'){
      for(var k=0;k<ins.count;k++){
        if(localToken !== cancelToken) return;
        await runList(ins.body, localToken);
      }
    }
  }
}
async function processQueue(localToken){
  if(queueBusy) return;
  queueBusy = true;
  try{
    while(queue.length && localToken === cancelToken){
      var item = queue.shift();
      await runList(item.list, localToken);
    }
  }finally{
    queueBusy = false;
  }
}

/* 공 위치 이벤트 코드 → 한글 라벨 */
function eventLabelFromCode(code){
  switch(code){
    case 'B_FAR_LEFT':   return '멀리 왼쪽';
    case 'B_FAR':        return '멀리 있음';
    case 'B_FAR_RIGHT':  return '멀리 오른쪽';
    case 'B_LEFT':       return '왼쪽에 있음';
    case 'B_CENTER':     return '중심에 있음';
    case 'B_RIGHT':      return '오른쪽에 있음';
    case 'B_LEFT_NEAR':  return '왼쪽 가까이';
    case 'B_NEAR':       return '가까이 있음';
    case 'B_RIGHT_NEAR': return '오른쪽 가까이';
    default:             return String(code||'');
  }
}

/* 이벤트 실행 + 로그 */
function triggerEvent(name, conf, source){
  var label = eventLabelFromCode(name);

  if(!isRunning){
    log(`⏸ 실행 중이 아니라 이벤트를 실행하지 않습니다. (${label})`);
    return;
  }

  if(!eventPrograms || !eventPrograms[name]){
    try{ eventPrograms = buildEventPrograms(); }catch(e){}
  }
  var seq = eventPrograms[name];
  if(!seq || !seq.length){
    log(`⚠️ 이벤트 ${label} 에 연결된 블록이 없습니다.`);
    return;
  }

  if(typeof conf === 'number'){
    log(`③ 이벤트 ${label} 실행 (${seq.length}개 명령, ${conf.toFixed(1)}%)`);
  }else{
    log(`③ 이벤트 ${label} 실행 (${seq.length}개 명령)`);
  }

  queue.push({list: seq.slice()});
  var myToken = cancelToken;
  processQueue(myToken);
}

function syncGridOverlayToVideo(videoEl, wrapEl, gridEl){
  try{
    if(!gridEl || !wrapEl || !videoEl) return;
    const vw = videoEl.videoWidth || 0;
    const vh = videoEl.videoHeight || 0;
    const ww = wrapEl.clientWidth || 0;
    const wh = wrapEl.clientHeight || 0;
    if(vw<=0 || vh<=0 || ww<=0 || wh<=0) return;

    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;

    gridEl.style.left = left + 'px';
    gridEl.style.top = top + 'px';
    gridEl.style.width = dw + 'px';
    gridEl.style.height = dh + 'px';
  }catch(_e){}
}

/* Otsu threshold */
function otsuThreshold(hist, total){
  let sum = 0;
  for(let t=0;t<256;t++) sum += t * hist[t];

  let sumB = 0;
  let wB = 0;
  let wF = 0;
  let varMax = -1;
  let thr = 0;

  for(let t=0;t<256;t++){
    wB += hist[t];
    if(wB === 0) continue;
    wF = total - wB;
    if(wF === 0) break;

    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;

    const diff = (mB - mF);
    const between = wB * wF * diff * diff;
    if(between > varMax){
      varMax = between;
      thr = t;
    }
  }
  return thr;
}

function clamp01(v){ return Math.max(0, Math.min(1, v)); }

/* saliency 기반 마스크: 색상 무관 + (개선) 경계(gradient) 성분 추가 */
function buildCircleMask(img, w, h){
  const d = img.data;
  const n = w*h;

  // 1) grayscale + mean
  const yArr = new Uint8Array(n);
  let sumY = 0;
  for(let i=0,p=0;i<n;i++,p+=4){
    const r=d[p], g=d[p+1], b=d[p+2];
    const y = (r*0.299 + g*0.587 + b*0.114) | 0;
    yArr[i] = y;
    sumY += y;
  }
  const meanY = sumY / Math.max(1,n);

  // 2) saliency + histogram
  const sal = new Uint8Array(n);
  const hist = new Uint32Array(256);

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const i = y*w + x;
      const p = i*4;

      const r=d[p], g=d[p+1], b=d[p+2];
      const mx = (r>g? (r>b?r:b) : (g>b?g:b));
      const mn = (r<g? (r<b?r:b) : (g<b?g:b));
      const diff = mx - mn;

      const yy = yArr[i];
      const dy = Math.abs(yy - meanY);

      // (개선) 간단 gradient (경계)
      let grad = 0;
      if(x>0 && x<w-1 && y>0 && y<h-1){
        const gx = (yArr[i+1] - yArr[i-1]);
        const gy = (yArr[i+w] - yArr[i-w]);
        grad = Math.abs(gx) + Math.abs(gy);
        if(grad > 255) grad = 255;
      }
      const gScore = grad * 0.60; // 너무 강하면 배경 엣지에 묻힘 → 가중치 절제

      let s = dy;
      if(diff > s) s = diff;
      if(gScore > s) s = gScore;

      let si = s|0;
      if(si<0) si=0; else if(si>255) si=255;
      sal[i]=si;
      hist[si]++;
    }
  }

  // 3) threshold
  let thr = otsuThreshold(hist, n);
  thr = Math.max(18, thr);

  let mask = new Uint8Array(n);
  let cnt = 0;
  for(let i=0;i<n;i++){
    if(sal[i] >= thr){
      mask[i]=1; cnt++;
    }
  }

  // 너무 많이 잡히면 기준을 올림 (복잡 배경 억제)
  if(cnt > n * 0.40){
    thr = Math.min(255, thr + 18);
    cnt = 0;
    mask = new Uint8Array(n);
    for(let i=0;i<n;i++){
      if(sal[i] >= thr){
        mask[i]=1; cnt++;
      }
    }
  }

  // 4) dilation (1회)
  const dil = new Uint8Array(n);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const idx = y*w + x;
      if(mask[idx] ||
         (x>0 && mask[idx-1]) ||
         (x<w-1 && mask[idx+1]) ||
         (y>0 && mask[idx-w]) ||
         (y<h-1 && mask[idx+w])){
        dil[idx]=1;
      }
    }
  }

  // 5) 간단 노이즈 제거
  const out = dil.slice();
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const idx = y*w + x;
      if(!dil[idx]) continue;
      let c=0;
      c += dil[idx-1]; c += dil[idx+1];
      c += dil[idx-w]; c += dil[idx+w];
      c += dil[idx-w-1]; c += dil[idx-w+1];
      c += dil[idx+w-1]; c += dil[idx+w+1];
      if(c < 2) out[idx]=0;
    }
  }

  return out;
}

/* 연결요소 분석 → (개선) 원형도(circularity) 강화 + (개선) 작은 공 2-pass + (개선) 가장자리 보정 */
function analyzeCandidates(mask, w, h){
  const n = w*h;
  const frameArea = n;
  const MAX_AREA = Math.floor(frameArea * 0.55);

  const passes = [
    // pass0: 기본 탐색
    {
      minArea: Math.max(42, Math.floor(frameArea * 0.00095)),
      minDim: 8,
      minFill: 0.12,
      minFillEdge: 0.07,
      aspectLimit: 3.2,
      aspectLimitEdge: 4.2,
      minCirc: 0.18,
      minCircEdge: 0.14,
      circLo: 0.14,
      circLoEdge: 0.10,
      circHi: 0.92
    },
    // pass1: 작은 공(멀리) 탐색 — minArea 낮추되 원형도 조건 조금 강화
    {
      minArea: Math.max(18, Math.floor(frameArea * 0.00035)),
      minDim: 6,
      minFill: 0.10,
      minFillEdge: 0.06,
      aspectLimit: 3.6,
      aspectLimitEdge: 4.6,
      minCirc: 0.24,
      minCircEdge: 0.18,
      circLo: 0.16,
      circLoEdge: 0.12,
      circHi: 0.92
    }
  ];

  function runPass(pcfg){
    const visited = new Uint8Array(n);
    const stack = [];
    const cand = [];

    for(let i=0;i<n;i++){
      if(!mask[i] || visited[i]) continue;

      let area=0, sumX=0, sumY=0;
      let minX=1e9, minY=1e9, maxX=-1e9, maxY=-1e9;
      let touchesEdge=false;
      let perimeter=0; // (개선) boundary edge count 기반 perimeter

      stack.length=0;
      stack.push(i);
      visited[i]=1;

      while(stack.length){
        const idx = stack.pop();
        const x = idx % w;
        const y = (idx / w) | 0;

        area++;
        sumX += x;
        sumY += y;

        if(x<minX) minX=x;
        if(y<minY) minY=y;
        if(x>maxX) maxX=x;
        if(y>maxY) maxY=y;

        if(x===0 || y===0 || x===w-1 || y===h-1) touchesEdge=true;

        // up
        if(y===0 || !mask[idx-w]){
          perimeter++;
        }else{
          const up = idx-w;
          if(!visited[up]){ visited[up]=1; stack.push(up); }
        }
        // down
        if(y===h-1 || !mask[idx+w]){
          perimeter++;
        }else{
          const dn = idx+w;
          if(!visited[dn]){ visited[dn]=1; stack.push(dn); }
        }
        // left
        if(x===0 || !mask[idx-1]){
          perimeter++;
        }else{
          const lf = idx-1;
          if(!visited[lf]){ visited[lf]=1; stack.push(lf); }
        }
        // right
        if(x===w-1 || !mask[idx+1]){
          perimeter++;
        }else{
          const rt = idx+1;
          if(!visited[rt]){ visited[rt]=1; stack.push(rt); }
        }
      }

      if(area < pcfg.minArea || area > MAX_AREA) continue;

      const bw = (maxX - minX + 1);
      const bh = (maxY - minY + 1);
      const minDim = pcfg.minDim;
      if(bw < minDim || bh < minDim) continue;

      const aspect = bw / Math.max(1, bh);
      const aspectLim = touchesEdge ? pcfg.aspectLimitEdge : pcfg.aspectLimit;
      if(aspect > aspectLim || aspect < 1/aspectLim) continue;

      const fill = area / (bw * bh);

      const minFill = touchesEdge ? pcfg.minFillEdge : pcfg.minFill;
      if(fill < minFill || fill > 0.98) continue;

      if(perimeter < 8) continue;

      // (개선) circularity
      let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
      if(!isFinite(circularity) || circularity < 0) circularity = 0;
      if(circularity > 1.2) circularity = 1.2;

      const minCirc = touchesEdge ? pcfg.minCircEdge : pcfg.minCirc;
      if(circularity < minCirc) continue;

      // fill scores (원/반원)
      const fillScoreFull = clamp01(1 - (Math.abs(fill - 0.785) / 0.785));
      const fillScoreHalf = clamp01(1 - (Math.abs(fill - 0.392) / 0.392));
      const fillScore = touchesEdge
        ? Math.max(fillScoreHalf, fillScoreFull * 0.85)
        : Math.max(fillScoreFull, fillScoreHalf * 0.70);

      // aspect score
      const aspectDen = touchesEdge ? 1.60 : 1.20;
      const aspectScore = clamp01(1 - (Math.abs(aspect - 1) / aspectDen));

      // circularity score (강하게)
      const cLo = touchesEdge ? pcfg.circLoEdge : pcfg.circLo;
      const cHi = pcfg.circHi;
      const circScore = clamp01((circularity - cLo) / Math.max(1e-6, (cHi - cLo)));

      // (개선) shapeScore에서 원형도 비중 강화
      let shapeScore = touchesEdge
        ? (0.45*circScore + 0.30*fillScore + 0.25*aspectScore)
        : (0.55*circScore + 0.25*fillScore + 0.20*aspectScore);

      // (개선) 반원(가장자리) 보정: 반원 fill이 잘 맞으면 가산
      if(touchesEdge && fillScoreHalf > fillScoreFull){
        shapeScore = Math.min(1, shapeScore + 0.06);
      }
      // (보너스) 완전원 쪽이 더 맞으면 약간 가산
      if(!touchesEdge && fillScoreFull > fillScoreHalf){
        shapeScore = Math.min(1, shapeScore + 0.03);
      }

      // (개선) score에서 area 영향 완화 + shape 영향 강화 → 작은 공도 살아남게
      const score = Math.pow(area, 0.72) * Math.pow(0.20 + 0.80*shapeScore, 2.25);

      cand.push({
        area,
        cx: (sumX / area),
        cy: (sumY / area),
        minX, minY, maxX, maxY,
        bw, bh, aspect, fill,
        perimeter,
        circularity,
        circScore,
        fillScoreFull,
        fillScoreHalf,
        shapeScore,
        touchesEdge,
        score
      });
    }

    if(!cand.length) return null;
    cand.sort((a,b)=>b.score-a.score);

    const best = cand[0];
    const bestNonEdge = cand.find(c=>!c.touchesEdge) || null;

    // (개선) edge 후보를 “너무 쉽게” 버리지 않도록 조건 강화
    if(bestNonEdge && best.touchesEdge){
      const ratio = bestNonEdge.score / Math.max(1e-9, best.score);
      if(ratio >= 0.92 && bestNonEdge.shapeScore >= best.shapeScore * 0.94){
        return bestNonEdge;
      }
    }
    return best;
  }

  // (개선) 2-pass: 기본 탐색 실패하면 작은 공 탐색 자동 실행
  for(let pi=0; pi<passes.length; pi++){
    const r = runPass(passes[pi]);
    if(r){
      r.pass = pi;
      return r;
    }
  }
  return null;
}

function computeBallConfidence(ball, w, h){
  const frameArea = w*h;

  const areaNorm = clamp01(ball.area / Math.max(1, frameArea * 0.03)); // 3%에서 포화
  const sizeScore = clamp01(Math.sqrt(areaNorm));

  const shapeScore = clamp01(ball.shapeScore || 0);
  const circScore  = clamp01(ball.circScore || clamp01((ball.circularity - 0.10) / (0.92 - 0.10)));

  // (개선) 원형도/shape 비중 강화 + edge 감점 제거
  let conf = 0.08
           + 0.60*shapeScore
           + 0.18*circScore
           + 0.20*sizeScore;

  // (개선) 가장자리(반원)일 때 보정: 반원 fill 점수가 좋으면 약간 가산
  if(ball.touchesEdge){
    conf += 0.03 * clamp01(ball.fillScoreHalf || 0);
  }

  // pass1(작은 공 탐색) 결과는 노이즈 가능성이 있으니 아주 미세하게만 보정(거의 영향 없음)
  if(ball.pass === 1){
    conf -= 0.01;
  }

  return clamp01(conf) * 100;
}

/* ★ 9분할(3x3) 분류 */
function classifyGrid9(ball, w, h){
  const cxN = (ball.cx + 0.5) / w;
  const cyN = (ball.cy + 0.5) / h;

  const col = Math.max(0, Math.min(2, Math.floor(cxN * 3)));
  const row = Math.max(0, Math.min(2, Math.floor(cyN * 3)));

  const idx = row*3 + col;

  switch(idx){
    case 0: return {code:'B_FAR_LEFT',   label:'멀리 왼쪽',   cxN, cyN, row, col};
    case 1: return {code:'B_FAR',        label:'멀리 있음',   cxN, cyN, row, col};
    case 2: return {code:'B_FAR_RIGHT',  label:'멀리 오른쪽', cxN, cyN, row, col};
    case 3: return {code:'B_LEFT',       label:'왼쪽에 있음', cxN, cyN, row, col};
    case 4: return {code:'B_CENTER',     label:'중심에 있음', cxN, cyN, row, col};
    case 5: return {code:'B_RIGHT',      label:'오른쪽에 있음', cxN, cyN, row, col};
    case 6: return {code:'B_LEFT_NEAR',  label:'왼쪽 가까이', cxN, cyN, row, col};
    case 7: return {code:'B_NEAR',       label:'가까이 있음', cxN, cyN, row, col};
    case 8: return {code:'B_RIGHT_NEAR', label:'오른쪽 가까이', cxN, cyN, row, col};
    default: return {code:'B_CENTER', label:'중심에 있음', cxN, cyN, row, col};
  }
}

/* 공(원형) 인식 한 번 수행 (함수명 runOcrOnVideo 유지) */
async function runOcrOnVideo(video){
  if(!ocrReady) return {status:'not-ready'};
  if(!video || !video.videoWidth || !video.videoHeight) return {status:'no-frame'};
  if(ocrBusy) return {status:'busy'};

  ocrBusy = true;
  try{
    preprocessToOcrCanvas(video);
    const img = ocrCtx.getImageData(0,0, OCR_W, OCR_H);

    const mask = buildCircleMask(img, OCR_W, OCR_H);
    const ball = analyzeCandidates(mask, OCR_W, OCR_H);

    ocrBusy = false;

    if(!ball){
      return {status:'no-ball'};
    }

    const conf = computeBallConfidence(ball, OCR_W, OCR_H);
    const pos = classifyGrid9(ball, OCR_W, OCR_H);

    return {
      status:'ok',
      digit: pos.label,
      conf: conf,
      gesture: pos.code,
      cell: {row:pos.row, col:pos.col},
      ball: { cx:pos.cxN, cy:pos.cyN, edge:ball.touchesEdge, pass: ball.pass }
    };
  }catch(e){
    ocrBusy = false;
    return {status:'error', error:e};
  }
}

function describeNoDigitReason(res){
  if(!res || typeof res.status!=='string') return '인식 실패';
  switch(res.status){
    case 'no-ball': return '원형 물체가 보이지 않음';
    case 'no-frame': return '카메라 프레임 없음';
    case 'not-ready': return '원형 인식 준비중';
    case 'busy': return '이전 인식 처리중';
    case 'error': return '원형 인식 오류';
    default: return '인식 실패';
  }
}

/* 1초 파이프라인 */
let panelLastDetectTs = 0;
let overlayLastDetectTs = 0;
let lastStateKey = null;

/* 변화가 있을 때만 로그 */
function handleDigitPipeline(res, source){
  const prefix = (source === 'overlay') ? '[전체화면]' : '[카메라]';

  if(!res || res.status==='busy' || res.status==='not-ready' || res.status==='no-frame'){
    return;
  }

  let currentKey;
  if(res.status !== 'ok' || !res.gesture){
    currentKey = 'NONE';
  }else{
    currentKey = String(res.gesture);
  }

  if(currentKey === lastStateKey){
    return;
  }
  lastStateKey = currentKey;

  if(res.status !== 'ok' || !res.gesture){
    if(source === 'panel'){
      updateDigitReadout(null);
    }
    const reason = describeNoDigitReason(res);
    log(`${prefix} ① 공 위치 인식: 없음 (${reason})`);
    return;
  }

  const label = (res.digit != null ? String(res.digit) : eventLabelFromCode(res.gesture));
  const conf  = typeof res.conf === 'number' ? res.conf : 0;

  if(source === 'panel'){
    updateDigitReadout(label);
  }

  log(`${prefix} ① 공 위치 인식: ${label} (${conf.toFixed(1)}%)`);
  log(`${prefix} ② 이벤트 확인중: ${label}`);

  if(conf < EVENT_CONF_MIN){
    log(`${prefix} ⚠️ 신뢰도 ${conf.toFixed(1)}% 로 ${EVENT_CONF_MIN}% 미만이라 이벤트를 실행하지 않습니다.`);
    return;
  }

  triggerEvent(String(res.gesture), conf, source);
}

/* 패널 감지 루프 */
function startDetectLoop(){
  panelLastDetectTs = 0;

  const step = async ()=>{
    if(!camOn || camVideo.readyState < 2){
      camRAF = requestAnimationFrame(step);
      return;
    }

    const allowPanelOcr = !isFullscreenRun;
    if(allowPanelOcr){
      const now = performance.now();
      if(now - panelLastDetectTs >= DETECT_PERIOD_MS){
        panelLastDetectTs = now;

        syncGridOverlayToVideo(camVideo, camWrap, gridOverlayPanel);

        const res = await runOcrOnVideo(camVideo);
        handleDigitPipeline(res, 'panel');
      }
    }

    camRAF = requestAnimationFrame(step);
  };

  camRAF = requestAnimationFrame(step);
}

/* ================= 전체화면 인식 ================= */
const overlayEl = document.getElementById('playOverlay');
const overlayDigitBadge = document.getElementById('overlayDigitBadge');
const overlayDigitVal   = overlayDigitBadge.querySelector('.value');
const eyesCam = document.getElementById('eyesCam');

const ovEyes   = [...document.querySelectorAll('#playOverlay .eye')];
const ovPupils = [...document.querySelectorAll('#playOverlay .pupil')];

let eyesRAF = null;
let overlayBlinkTimer = null;

let ovCurrent = {x:0, y:0};
let ovTarget  = {x:0, y:0};

function scheduleOverlayBlink(){
  clearTimeout(overlayBlinkTimer);
  const t = 2200 + Math.random()*3300;
  overlayBlinkTimer = setTimeout(()=>{
    ovEyes.forEach(e=>{
      e.classList.add('blink');
      setTimeout(()=> e.classList.remove('blink'),
        parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--blinkSpeed')) + 40);
    });
    scheduleOverlayBlink();
  }, t);
}

function renderPupils(nx, ny){
  ovEyes.forEach((eye, i) => {
    const rect = eye.getBoundingClientRect();
    const rEye = Math.min(rect.width, rect.height)/2;
    const limit = rEye * 0.32;
    let dx = nx * limit, dy = ny * limit;
    const dist = Math.hypot(dx,dy);
    if (dist>limit){
      const r = limit/dist;
      dx*=r; dy*=r;
    }
    ovPupils[i].style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  });
}

function overlayShowDigit(d){
  if(!overlayDigitBadge) return;
  overlayDigitVal.textContent = (d==null || d==='') ? '—' : String(d);
  overlayDigitBadge.style.display = 'inline-flex';
}

let overlayPointerIdleTimer = null;
function setOverlayTarget(nx,ny){
  ovTarget.x = Math.max(-1, Math.min(1,nx));
  ovTarget.y = Math.max(-1, Math.min(1,ny));
}
function handleOverlayPointer(e){
  const pt = ('touches' in e && e.touches[0]) ? e.touches[0] : e;
  const cx = innerWidth/2, cy = innerHeight/2;
  const dx = pt.clientX - cx, dy = pt.clientY - cy;
  const d = Math.hypot(innerWidth, innerHeight) || 1;
  setOverlayTarget(dx/(d*0.25), dy/(d*0.25));
  clearTimeout(overlayPointerIdleTimer);
  overlayPointerIdleTimer = setTimeout(()=> { setOverlayTarget(0,0); }, 900);
}

let lastTap=0;
function onOverlayPointerDown(e){
  const now = e.timeStamp || Date.now();
  if (now - lastTap <= 300){
    stopRun();
    lastTap = 0;
  }else{
    lastTap = now;
  }
}
function onOverlayDblClick(){ stopRun(); }

async function startOverlayEyes(){
  if(eyesRAF){ cancelAnimationFrame(eyesRAF); eyesRAF = null; }
  overlayShowDigit(null);
  overlayLastDetectTs = 0;

  try{
    if(camStream){
      eyesCam.srcObject = camStream;
      const p = eyesCam.play();
      if(p && typeof p.then==='function') await p;
    }
  }catch(e){}

  scheduleOverlayBlink();
  overlayEl.addEventListener('pointermove', handleOverlayPointer);
  overlayEl.addEventListener('pointerdown', handleOverlayPointer);
  overlayEl.addEventListener('pointerdown', onOverlayPointerDown);
  overlayEl.addEventListener('dblclick', onOverlayDblClick);

  const loop = async ()=>{
    if(!isRunning || !isFullscreenRun){
      eyesRAF = requestAnimationFrame(loop);
      return;
    }
    if(!eyesCam || eyesCam.readyState < 2){
      eyesRAF = requestAnimationFrame(loop);
      return;
    }

    const now = performance.now();
    if(now - overlayLastDetectTs >= DETECT_PERIOD_MS){
      overlayLastDetectTs = now;

      syncGridOverlayToVideo(eyesCam, document.getElementById('ovCamWrap'), gridOverlayOverlay);

      const res = await runOcrOnVideo(eyesCam);
      handleDigitPipeline(res, 'overlay');

      if(res && res.status==='ok' && res.digit!=null){
        overlayShowDigit(res.digit);
      }else{
        overlayShowDigit(null);
      }
    }

    ovCurrent.x += (ovTarget.x - ovCurrent.x) * 0.08;
    ovCurrent.y += (ovTarget.y - ovCurrent.y) * 0.08;
    renderPupils(ovCurrent.x, ovCurrent.y);

    eyesRAF = requestAnimationFrame(loop);
  };
  eyesRAF = requestAnimationFrame(loop);
}

function stopOverlayEyes(){
  if(eyesRAF){ cancelAnimationFrame(eyesRAF); eyesRAF=null; }
  overlayShowDigit(null);
  clearTimeout(overlayBlinkTimer);
  overlayEl.removeEventListener('pointermove', handleOverlayPointer);
  overlayEl.removeEventListener('pointerdown', handleOverlayPointer);
  overlayEl.removeEventListener('pointerdown', onOverlayPointerDown);
  overlayEl.removeEventListener('dblclick', onOverlayDblClick);
}
</script>

<!-- 좌우 슬라이더 / 파일 메뉴 -->
<script id="xrobo-hsplit-script">
(function(){
  var res = document.getElementById('hResizer');
  var main = document.getElementById('main');
  var right = document.getElementById('right');
  if(!res || !main || !right) return;

  var dragging = false;
  var startX = 0;
  var startW = 0;
  var rafId = 0;
  var maxW = 0;

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function computeMax(){
    var rect = main.getBoundingClientRect();
    var barW = res.getBoundingClientRect().width || 8;
    maxW = Math.max(0, rect.width - barW);
    return maxW;
  }

  function onDown(clientX){
    dragging = true;
    startX = clientX;
    startW = right.getBoundingClientRect().width;
    computeMax();
    document.body.classList.add('hs-resizing');
  }

  function applyWidth(newW){
    newW = clamp(newW, 0, maxW);
    document.documentElement.style.setProperty('--rightW', newW + 'px');
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(function(){
      try{
        if (window.Blockly && typeof Blockly.svgResize==='function' && window.ws){
          Blockly.svgResize(ws);
        }
      }catch(e){}
    });
  }

  function onMove(clientX){
    if(!dragging) return;
    var dx = clientX - startX;
    var newW = startW - dx;
    applyWidth(newW);
  }

  function onUp(){
    dragging = false;
    document.body.classList.remove('hs-resizing');
  }

  res.addEventListener('mousedown', function(e){
    e.preventDefault();
    onDown(e.clientX);
  });
  window.addEventListener('mousemove', function(e){ onMove(e.clientX); });
  window.addEventListener('mouseup', onUp);

  res.addEventListener('touchstart', function(e){
    if(!e.touches || !e.touches[0]) return;
    e.preventDefault();
    onDown(e.touches[0].clientX);
  }, {passive:false});
  window.addEventListener('touchmove', function(e){
    if(!e.touches || !e.touches[0]) return;
    onMove(e.touches[0].clientX);
  }, {passive:false});
  window.addEventListener('touchend', onUp);

  document.body.classList.remove('panel-collapsed');

  window.addEventListener('resize', function(){
    var cur = right.getBoundingClientRect().width;
    var mx = computeMax();
    if(cur > mx) applyWidth(mx);
  });
})();

<!-- 안드로이드 숫자 키패드 (원본 유지) -->
<script id="xrobo-kp4x4-v14-script">
(function(){
  if(!/Android/i.test(navigator.userAgent||'')) { return; }

  'use strict';
  const isAndroid = /Android/i.test(navigator.userAgent||'');
  if(!isAndroid){ return; }
  const hasPointer = 'PointerEvent' in window;

  let pad, disp, grid;
  let activeInput = null;
  let activeField = null;
  let promptCallback = null;
  let buffer = '';
  let rafId = 0;
  let lastAnchor = {x: window.innerWidth/2, y: 140};
  let outsideBound = false;
  let committing = false;

  let lastPressLabel = '';
  let lastPressTime = 0;
  const PRESS_DEBOUNCE_MS = 160;

  function safeEval(expr){
    if(typeof expr!=='string') return NaN;
    expr = expr.replace(/[^0-9+\-*/\s]/g,'').trim();
    if(!expr) return NaN;
    const tokens = expr.match(/(\d+|[+\-*/])/g) || [];
    if(tokens.length===0) return NaN;
    const values=[], ops=[]; let expectNum=true, unary=null;
    function prec(op){ return (op==='*'||op==='/')?2:1; }
    function apply(){
      const op=ops.pop(), b=values.pop(), a=values.pop();
      values.push(op==='+'?a+b: op==='-'?a-b: op==='*'?a*b: (b===0?0:Math.trunc(a/b)));
    }
    for(const tk of tokens){
      if(/^\d+$/.test(tk)){
        let v=parseInt(tk,10);
        if(unary==='-') v=-v;
        unary=null;
        values.push(v);
        expectNum=false;
      }else{
        if(expectNum){
          if(tk==='+'||tk==='-') unary=tk;
        }else{
          while(ops.length && prec(ops[ops.length-1])>=prec(tk)) apply();
          ops.push(tk);
          expectNum=true;
        }
      }
    }
    while(ops.length) apply();
    return values.length? values[0]:NaN;
  }
  function dispatch(el, type){
    try{ el.dispatchEvent(new Event(type, {bubbles:true})); }catch(_){}
  }

  function buildPad(){
    if(pad) return pad;
    pad = document.createElement('div');
    pad.id = 'xrobo-kp4x4-v14';
    pad.innerHTML = '<div class="display" aria-live="polite"></div><div class="grid" role="group" aria-label="숫자패드"></div>';
    document.body.appendChild(pad);
    disp = pad.querySelector('.display');
    grid = pad.querySelector('.grid');

    const layout = [
      {t:'1'},{t:'2'},{t:'3'},{t:'←',cls:'back'},
      {t:'4'},{t:'5'},{t:'6'},{t:'C',cls:'clear'},
      {t:'7'},{t:'8'},{t:'9'},{t:'+',cls:'op'},
      {t:'*',cls:'op'},{t:'0'},{t:'/',cls:'op'},{t:'-',cls:'op'},
      {t:'확인',cls:'wide ok'},{t:'취소',cls:'wide cancel'}
    ];
    layout.forEach(k=>{
      const b=document.createElement('button');
      b.type='button';
      b.textContent=k.t;
      if(k.cls) k.cls.split(' ').forEach(c=>b.classList.add(c));
      grid.appendChild(b);
    });

    const press = (label)=>{
      const now = performance.now();
      if(label === lastPressLabel && (now - lastPressTime) < PRESS_DEBOUNCE_MS){
        return;
      }
      lastPressLabel = label;
      lastPressTime = now;

      if(label==='확인'){ commit(); return; }
      if(label==='취소'){ cancel(); return; }
      if(label==='C'){ buffer=''; sync(); return; }
      if(label==='←'){ buffer = buffer.slice(0, buffer.length-1); sync(); return; }
      if(/^[0-9+\-*/]$/.test(label)){ buffer += label; sync(); return; }
    };

    function getButtonFromEvent(e){
      if(e.type==='touchstart' && e.touches && e.touches[0]){
        const t=e.touches[0];
        const el=document.elementFromPoint(t.clientX, t.clientY);
        return el && el.closest && el.closest('button');
      }
      return e.target && e.target.closest && e.target.closest('button');
    }

    const onPress = (e)=>{
      const btn = getButtonFromEvent(e);
      if(!btn) return;
      e.preventDefault();
      e.stopPropagation();
      press(btn.textContent);
    };

    if(!grid.dataset.bound){
      if(hasPointer){
        grid.addEventListener('pointerdown', onPress, true);
      }else if('ontouchstart' in window){
        grid.addEventListener('touchstart', onPress, {passive:false, capture:true});
      }else{
        grid.addEventListener('mousedown', onPress, true);
      }
      grid.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
      }, true);
      grid.dataset.bound = '1';
    }

    const outside = (e)=>{
      if(!pad.classList.contains('show')) return;
      if(pad.contains(e.target)) return;
      if(activeInput && e.target===activeInput) return;
      commit();
    };
    if(!outsideBound){
      if(hasPointer){
        document.addEventListener('pointerdown', outside, true);
      }else if('ontouchstart' in window){
        document.addEventListener('touchstart', outside, {passive:false, capture:true});
      }else{
        document.addEventListener('mousedown', outside, true);
      }
      outsideBound = true;
    }

    return pad;
  }

  function showPad(){ buildPad().classList.add('show'); }
  function hidePad(){ if(pad) pad.classList.remove('show'); }

  function positionNearRect(r){
    const br = pad.getBoundingClientRect();
    const pw=br.width, ph=br.height;
    const gap=8, vx=window.scrollX||0, vy=window.scrollY||0;
    let left=r.right + gap + vx, top=r.top + vy;
    if(left + pw > vx + innerWidth - 6){
      left = r.left + vx - pw - gap;
    }
    if(top + ph > vy + innerHeight - 6){
      top = Math.max(vy+6, vy + innerHeight - ph - 6);
    }
    if(top < vy + 6) top = vy + 6;
    pad.style.left = left + 'px';
    pad.style.top = top + 'px';
  }
  function positionNearInput(input){ positionNearRect(input.getBoundingClientRect()); }
  function positionNearPoint(x,y){ positionNearRect({left:x, right:x, top:y, bottom:y, width:0, height:0}); }
  function positionNearField(field){
    try{
      const root = field && field.getClickTarget_ ? field.getClickTarget_() :
                   (field && field.getSvgRoot && field.getSvgRoot());
      if(root && root.getBoundingClientRect){
        positionNearRect(root.getBoundingClientRect());
        return true;
      }
    }catch(_){}
    return false;
  }

  function startFollowInput(input){
    cancelAnimationFrame(rafId);
    const tick=()=>{
      if(activeInput){
        positionNearInput(input);
        rafId=requestAnimationFrame(tick);
      }
    };
    tick();
  }
  function stopFollow(){
    cancelAnimationFrame(rafId);
    rafId=0;
  }

  function sync(){
    if(disp) disp.textContent = buffer;
    if(activeInput){
      activeInput.value = buffer;
      dispatch(activeInput,'input');
    }
  }

  function evaluateAndClamp(raw, inputEl){
    let num = safeEval(String(raw||'').trim());
    if(!Number.isFinite(num)) return { ok:false, val:String(raw||'') };
    const min = Number(inputEl?.getAttribute('min'));
    const max = Number(inputEl?.getAttribute('max'));
    if(Number.isFinite(min)) num = Math.max(min, num);
    if(Number.isFinite(max)) num = Math.min(max, num);
    return { ok:true, val:String(num) };
  }

  function commit(){
    if(committing) return;
    committing = true;
    try{
      if(activeField && !activeInput){
        const { ok, val } = evaluateAndClamp(buffer, null);
        try{ activeField.setValue(ok ? val : buffer); }catch(_){}
        activeField = null;
      }else if(activeField && activeInput){
        const { ok, val } = evaluateAndClamp(buffer, activeInput);
        try{ activeField.setValue(ok ? val : buffer); }catch(_){}
        activeField = null;
      }else if(typeof promptCallback === 'function'){
        const n = safeEval(buffer);
        const v = Number.isFinite(n) ? String(n) : buffer;
        try{ promptCallback(v); }catch(_){}
        promptCallback = null;
      }else if(activeInput){
        const { ok, val } = evaluateAndClamp(buffer, activeInput);
        activeInput.value = val;
        dispatch(activeInput,'input');
        dispatch(activeInput,'change');
      }
      try{
        if(window.Blockly && Blockly.WidgetDiv &&
           typeof Blockly.WidgetDiv.hide==='function'){
          Blockly.WidgetDiv.hide();
        }
      }catch(_){}
      activeInput = null;
      stopFollow();
      hidePad();
    }finally{
      committing = false;
    }
  }

  function cancel(){
    activeField = null;
    promptCallback = null;
    activeInput = null;
    stopFollow();
    hidePad();
  }

  function findBlocklyInput(){
    try{
      if(window.Blockly){
        if(Blockly.FieldTextInput && Blockly.FieldTextInput.htmlInput_){
          return Blockly.FieldTextInput.htmlInput_;
        }
        if(Blockly.WidgetDiv && Blockly.WidgetDiv.DIV){
          const el = Blockly.WidgetDiv.DIV.querySelector('input,textarea');
          if(el) return el;
        }
      }
      const q = document.querySelector('.blocklyHtmlInput, .blocklyHtmlTextInput, input.blocklyHtmlInput');
      if(q) return q;
    }catch(_){}
    return null;
  }

  function setupInputPlatform(input){
    if(isAndroid){
      input.setAttribute('readonly', 'readonly');
      input.setAttribute('inputmode','none');
      input.addEventListener('touchstart', ev=>{
        ev.preventDefault();
        ev.stopPropagation();
      }, {capture:true, passive:false});
      setTimeout(()=>{ try{ input.blur(); }catch(_){ } }, 0);
    }else{
      input.removeAttribute('readonly');
      input.setAttribute('inputmode','numeric');
      try{ input.focus(); }catch(_){}
      input.addEventListener('keydown', function(e){
        if(e.key==='Enter'){ e.preventDefault(); commit(); }
        else if(e.key==='Escape'){ e.preventDefault(); cancel(); }
      }, {once:true, capture:true});
    }
    input.setAttribute('pattern','[0-9+\\-*/]*');
    input.setAttribute('autocomplete','off');
    input.setAttribute('autocorrect','off');
    input.setAttribute('autocapitalize','off');
    input.setAttribute('spellcheck','false');
  }

  function openForInput(input, field){
    activeInput = input;
    activeField = field || null;
    promptCallback = null;
    setupInputPlatform(input);
    buffer = String(input.value||'');
    showPad();
    positionNearInput(input);
    startFollowInput(input);
    sync();
  }

  function openForField(field){
    activeField = field || null;
    activeInput = null;
    promptCallback = null;
    buffer = (field && typeof field.getValue==='function') ? String(field.getValue()||'') : '';
    showPad();
    if(!positionNearField(field)){
      positionNearPoint(lastAnchor.x, lastAnchor.y);
    }
    sync();
  }

  function openForPrompt(defVal, anchor){
    activeInput = null;
    activeField = null;
    buffer = String(defVal||'');
    showPad();
    positionNearPoint(anchor.x, anchor.y);
    sync();
  }

  function afterEditorOpened(field){
    const adopt = ()=>{
      const input = findBlocklyInput();
      if(input){
        if(!pad || !pad.classList.contains('show')) showPad();
        openForInput(input, field);
        return true;
      }
      return false;
    };
    if(adopt()) return;
    openForField(field);
    let tries = 0;
    const iv=setInterval(()=>{
      if(adopt() || ++tries>8) clearInterval(iv);
    },50);
  }

  function patchFieldNumber(){
    try{
      if(!window.Blockly || !Blockly.FieldNumber || Blockly.FieldNumber.__xrobo_v14) return;
      function wrap(name){
        const orig = Blockly.FieldNumber.prototype[name];
        if(!orig) return false;
        Blockly.FieldNumber.prototype[name] = function(){
          const rv = orig.apply(this, arguments);
          const self = this;
          setTimeout(()=> afterEditorOpened(self), 0);
          return rv;
        };
        return true;
      }
      wrap('showEditor_') || wrap('showEditor');
      Blockly.FieldNumber.__xrobo_v14 = true;
    }catch(_){}
  }

  function patchFieldTextInput(){
    try{
      if(!window.Blockly || !Blockly.FieldTextInput || Blockly.FieldTextInput.__xrobo_v14) return;
      const proto = Blockly.FieldTextInput.prototype;
      const origShow = proto.showEditor_;
      proto.showEditor_ = function(opt_e){
        const rv = origShow ? origShow.apply(this, arguments) : undefined;
        if((typeof Blockly.FieldNumber!=='undefined') && (this instanceof Blockly.FieldNumber)){
          const self = this;
          setTimeout(()=> afterEditorOpened(self), 0);
        }
        return rv;
      };
      Blockly.FieldTextInput.__xrobo_v14 = true;
    }catch(_){}
  }

  function patchPrompt(){
    try{
      if(!window.Blockly) return;
      const numLike = v => /^[\s]*[+\-]?\d+(?:[\s]*[+\-*/][\s]*[+\-]?\d+)*[\s]*$/.test(String(v||''));
      if(Blockly.dialog && typeof Blockly.dialog.setPrompt==='function' && !Blockly.dialog.__xrobo_v14){
        Blockly.dialog.setPrompt(function(msg, defVal, cb){
          const looksNumeric = numLike(defVal) || /value|값|number|숫자/i.test(String(msg||''));
          if(looksNumeric){
            promptCallback = v => { try{ cb(v); }catch(_){ } };
            openForPrompt(defVal, lastAnchor);
          }else{
            const ans = window.prompt(String(msg||''), String(defVal||''));
            try{ cb(ans); }catch(_){}
          }
        });
        Blockly.dialog.__xrobo_v14 = true;
      }
    }catch(_){}
  }

  document.addEventListener('focusin', function(e){
    const t = e.target;
    if(!t) return;
    if(t.classList && (t.classList.contains('blocklyHtmlInput') ||
                       t.classList.contains('blocklyHtmlTextInput'))){
      openForInput(t, null);
      const onBlur = ()=>{ try{ commit(); }catch(_){ cancel(); } t.removeEventListener('blur', onBlur); };
      t.addEventListener('blur', onBlur);
    }
  }, true);

  (function(){
    if(!/Android/i.test(navigator.userAgent||'')) { return; }
    const root = document.getElementById('blocklyDiv') || document.body;
    const savePt = (e)=>{ lastAnchor = {x:e.clientX, y:e.clientY}; };
    if(hasPointer){
      root.addEventListener('pointerdown', savePt, true);
    }else{
      root.addEventListener('mousedown', savePt, true);
      root.addEventListener('touchstart', (e)=>{
        if(e.touches&&e.touches[0]) lastAnchor={x:e.touches[0].clientX, y:e.touches[0].clientY};
      }, {capture:true, passive:true});
    }
  })();

  function tryPatch(){ patchFieldNumber(); patchFieldTextInput(); patchPrompt(); }
  if(document.readyState==='complete' || document.readyState==='interactive'){
    tryPatch();
  }else{
    window.addEventListener('DOMContentLoaded', tryPatch);
  }
  let tries=0;
  const iv=setInterval(()=>{ tryPatch(); if(++tries>12) clearInterval(iv); }, 300);
})();
</script>
</body>
</html>
