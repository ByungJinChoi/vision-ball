<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>9분할 공 탐지 테스트 v3 (COCO-SSD)</title>

  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
      --blue:#2563eb;
      --red:#ef4444;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{ font-weight:900; letter-spacing:.2px; }
    header .spacer{ flex:1 1 auto; }

    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      background:var(--blue);
      color:white;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:var(--red); }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.25);
      font: 800 13px/1 system-ui;
      white-space:nowrap;
    }
    .pill .muted{ color:var(--muted); font-weight:700; }

    main{
      height: calc(100vh - 64px);
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    label{ font-size:12px; color:var(--muted); font-weight:800; }
    input[type="range"]{ width: 180px; }
    code{
      color:#d1fae5;
      background: rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:900;
    }

    .stage{
      flex:1 1 auto;
      min-height: 260px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit: contain;
      background:#000;
    }
    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      white-space:pre-wrap;
    }
  </style>

  <!-- TensorFlow.js (Core) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <!-- WASM backend (WebGL 안되면 fallback 용) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm@4.22.0/dist/tf-backend-wasm.min.js"></script>
  <!-- COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
</head>

<body>
  <header>
    <div class="title">🎥 9분할 공(sports ball) 탐지 테스트 v3 (COCO‑SSD)</div>
    <div class="spacer"></div>

    <button id="camBtn" class="btn">캠 켜기</button>

    <span class="pill"><span class="muted">모델</span> <span id="modelStatus">로딩중…</span></span>
    <span class="pill"><span class="muted">탐지</span> <span id="detCount">—</span></span>
    <span class="pill"><span class="muted">선택</span> <span id="pickText">—</span></span>
    <span class="pill"><span class="muted">밝기</span> <span id="lightText">—</span></span>
  </header>

  <main>
    <div class="row">
      <label>탐지 주기(ms)</label>
      <input id="period" type="range" min="200" max="1200" step="50" value="500">
      <code id="periodVal">500</code>

      <label>최소 신뢰도</label>
      <input id="thr" type="range" min="0.15" max="0.80" step="0.05" value="0.35">
      <code id="thrVal">0.35</code>

      <label>최대 후보</label>
      <input id="topk" type="range" min="5" max="30" step="1" value="20">
      <code id="topkVal">20</code>
    </div>

    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">
- 라이브러리: <code>TensorFlow.js + COCO‑SSD</code> / 클래스: <code>sports ball</code>
- 표시: 공 후보 여러 개면 모두 박스 표시, 가장 높은 점수 1개를 선택(하이라이트)
- 9분할: <code>1~9</code> 번호 + 선택된 공의 칸 하이라이트
- 밝기/그림자: 공 ROI 평균 밝기 vs 주변(확장 박스) 평균 대비로 <code>밝음/보통/어두움</code>
      </div>
      <div class="small" id="debug"></div>
    </div>
  </main>

<script>
(() => {
  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');

  const modelStatus = document.getElementById('modelStatus');
  const detCount = document.getElementById('detCount');
  const pickText = document.getElementById('pickText');
  const lightText = document.getElementById('lightText');
  const debug = document.getElementById('debug');

  const period = document.getElementById('period');
  const periodVal = document.getElementById('periodVal');
  const thr = document.getElementById('thr');
  const thrVal = document.getElementById('thrVal');
  const topk = document.getElementById('topk');
  const topkVal = document.getElementById('topkVal');

  period.addEventListener('input', ()=> periodVal.textContent = period.value);
  thr.addEventListener('input', ()=> thrVal.textContent = Number(thr.value).toFixed(2));
  topk.addEventListener('input', ()=> topkVal.textContent = topk.value);

  let stream = null;
  let camOn = false;

  let model = null;
  let busy = false;
  let lastDetectAt = 0;

  // 밝기 측정용(작게)
  const snap = document.createElement('canvas');
  const sctx = snap.getContext('2d', { willReadFrequently:true });

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr,0,0,dpr,0,0);
  }

  // object-fit: contain 영역
  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0) return {left:0, top:0, width:ww, height:wh, scaleX:1, scaleY:1};

    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;
    return {left, top, width:dw, height:dh, scaleX:s, scaleY:s};
  }

  function zoneFromPoint(cx, cy, vw, vh){
    const cw = vw / 3;
    const ch = vh / 3;
    let col = Math.floor(cx / cw);
    let row = Math.floor(cy / ch);
    col = clamp(col, 0, 2);
    row = clamp(row, 0, 2);
    return row * 3 + col + 1;
  }

  function drawGrid(rect){
    const x0 = rect.left, y0 = rect.top, w = rect.width, h = rect.height;

    // lines
    octx.strokeStyle = 'rgba(255,255,255,0.9)';
    octx.lineWidth = 1;
    octx.beginPath();
    octx.moveTo(x0 + w/3, y0);      octx.lineTo(x0 + w/3, y0 + h);
    octx.moveTo(x0 + 2*w/3, y0);    octx.lineTo(x0 + 2*w/3, y0 + h);
    octx.moveTo(x0, y0 + h/3);      octx.lineTo(x0 + w, y0 + h/3);
    octx.moveTo(x0, y0 + 2*h/3);    octx.lineTo(x0 + w, y0 + 2*h/3);
    octx.stroke();

    // numbers
    octx.font = '900 16px system-ui';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const n = r*3 + c + 1;
        const cx = x0 + (c+0.5)*(w/3);
        const cy = y0 + (r+0.5)*(h/3);

        octx.fillStyle = 'rgba(0,0,0,0.28)';
        octx.strokeStyle = 'rgba(255,255,255,0.22)';
        octx.lineWidth = 1;
        octx.beginPath();
        octx.arc(cx, cy, 14, 0, Math.PI*2);
        octx.fill();
        octx.stroke();

        octx.fillStyle = 'rgba(255,255,255,0.95)';
        octx.fillText(String(n), cx, cy);
      }
    }
  }

  function drawZoneHighlight(rect, zone){
    if(!zone) return;
    const z = zone - 1;
    const row = Math.floor(z / 3);
    const col = z % 3;

    const x0 = rect.left + col*(rect.width/3);
    const y0 = rect.top  + row*(rect.height/3);
    const w = rect.width/3;
    const h = rect.height/3;

    octx.fillStyle = 'rgba(255,255,255,0.08)';
    octx.strokeStyle = 'rgba(255,255,255,0.35)';
    octx.lineWidth = 2;
    octx.fillRect(x0, y0, w, h);
    octx.strokeRect(x0, y0, w, h);
  }

  function drawBox(rect, bbox, isBest, label){
    const [x,y,w,h] = bbox;
    const rx = rect.left + x * rect.scaleX;
    const ry = rect.top  + y * rect.scaleY;
    const rw = w * rect.scaleX;
    const rh = h * rect.scaleY;

    octx.strokeStyle = isBest ? 'rgba(0,255,220,0.95)' : 'rgba(255,255,255,0.65)';
    octx.lineWidth = isBest ? 3 : 2;
    octx.strokeRect(rx, ry, rw, rh);

    if(label){
      octx.font = '800 12px system-ui';
      octx.textAlign = 'left';
      octx.textBaseline = 'top';
      const pad = 4;
      const tw = octx.measureText(label).width;
      octx.fillStyle = isBest ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.35)';
      octx.fillRect(rx, ry, tw + pad*2, 16 + pad);
      octx.fillStyle = 'rgba(255,255,255,0.95)';
      octx.fillText(label, rx + pad, ry + 2);
    }
  }

  function meanLuma(imgData){
    const d = imgData.data;
    let sum = 0;
    const n = d.length / 4;
    for(let i=0;i<d.length;i+=4){
      const r=d[i], g=d[i+1], b=d[i+2];
      sum += (0.299*r + 0.587*g + 0.114*b);
    }
    return n ? (sum / n) : 0;
  }

  function brightnessLabel(roiMean, bgMean){
    const diff = roiMean - bgMean;
    if(diff > 18) return {label:'밝음', diff};
    if(diff < -18) return {label:'어두움', diff};
    return {label:'보통', diff};
  }

  function computeBrightness(vw, vh, bbox){
    // 작은 캔버스에 프레임 복사
    const targetW = 320;
    const sc = targetW / Math.max(1, vw);
    const targetH = Math.max(1, Math.round(vh * sc));
    if(snap.width !== targetW || snap.height !== targetH){
      snap.width = targetW;
      snap.height = targetH;
    }
    sctx.drawImage(video, 0, 0, targetW, targetH);

    const [x,y,w,h] = bbox;

    const sx = clamp(Math.round(x * sc), 0, targetW-1);
    const sy = clamp(Math.round(y * sc), 0, targetH-1);
    const sw = clamp(Math.round(w * sc), 1, targetW - sx);
    const sh = clamp(Math.round(h * sc), 1, targetH - sy);

    const roi = sctx.getImageData(sx, sy, sw, sh);
    const roiMean = meanLuma(roi);

    // 주변 배경(확장 영역)
    const ex = clamp(Math.round(sx - sw*0.18), 0, targetW-1);
    const ey = clamp(Math.round(sy - sh*0.18), 0, targetH-1);
    const ew = clamp(Math.round(sw*1.36), 1, targetW - ex);
    const eh = clamp(Math.round(sh*1.36), 1, targetH - ey);

    const bg = sctx.getImageData(ex, ey, ew, eh);
    const bgMean = meanLuma(bg);

    const r = brightnessLabel(roiMean, bgMean);
    return {roiMean, bgMean, diff:r.diff, label:r.label};
  }

  async function loadModel(){
    try{
      modelStatus.textContent = 'TF 준비중…';

      // 1) WebGL 우선 시도
      let backend = null;
      try{
        await tf.setBackend('webgl');
        await tf.ready();
        backend = tf.getBackend();
      }catch(_e){}

      // 2) WebGL이 안되면 WASM fallback
      if(backend !== 'webgl'){
        try{
          // wasm 파일 경로 지정(필수)
          if(tf && tf.wasm && tf.wasm.setWasmPaths){
            tf.wasm.setWasmPaths('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm@4.22.0/dist/');
          }
          await tf.setBackend('wasm');
          await tf.ready();
          backend = tf.getBackend();
        }catch(_e){}
      }

      modelStatus.textContent = '모델 로딩중…';
      // lite_mobilenet_v2: 모바일에서 빠른 편
      model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });

      modelStatus.textContent = `준비완료(${backend || 'unknown'})`;
    }catch(e){
      console.error(e);
      modelStatus.textContent = '로딩 실패';
      debug.textContent = '모델 로딩 오류: ' + e;
    }
  }

  async function detectOnce(){
    if(!camOn || !model) return;
    if(video.readyState < 2) return;
    if(busy) return;

    busy = true;
    const t0 = performance.now();
    try{
      const vw = video.videoWidth || 0;
      const vh = video.videoHeight || 0;
      if(vw<=0 || vh<=0) return;

      const minScore = Number(thr.value);
      const maxK = Number(topk.value);

      // detect(video) 결과 bbox는 video 픽셀 좌표 기준
      const preds = await model.detect(video, maxK);

      // sports ball만
      const balls = preds
        .filter(p => p && p.class === 'sports ball' && (p.score || 0) >= minScore)
        .map(p => ({ score: p.score || 0, bbox: p.bbox }))
        .sort((a,b)=>b.score-a.score);

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);

      const rect = getDisplayRect();
      drawGrid(rect);

      detCount.textContent = balls.length ? `${balls.length}개` : '0개';

      if(!balls.length){
        pickText.textContent = '—';
        lightText.textContent = '—';
        const t1 = performance.now();
        debug.textContent = `detect ${(t1-t0).toFixed(0)}ms · 후보 0개 (thr ${minScore.toFixed(2)})`;
        return;
      }

      // 여러 개 표시 + 1개 선택
      let best = balls[0];
      const [bx,by,bw,bh] = best.bbox;
      const bcx = bx + bw/2;
      const bcy = by + bh/2;
      const bestZone = zoneFromPoint(bcx, bcy, vw, vh);

      // 선택 존 하이라이트
      drawZoneHighlight(rect, bestZone);

      for(let i=0;i<balls.length;i++){
        const b = balls[i];
        const [x,y,w,h] = b.bbox;
        const cx = x + w/2;
        const cy = y + h/2;
        const z = zoneFromPoint(cx, cy, vw, vh);
        const isBest = (i===0);
        const label = `ball ${(b.score*100).toFixed(0)}% · ${z}번`;
        drawBox(rect, b.bbox, isBest, label);

        // 선택 공 중심표시
        if(isBest){
          const px = rect.left + cx*rect.scaleX;
          const py = rect.top  + cy*rect.scaleY;
          octx.strokeStyle = 'rgba(0,255,220,0.95)';
          octx.lineWidth = 2;
          octx.beginPath();
          octx.moveTo(px-10, py); octx.lineTo(px+10, py);
          octx.moveTo(px, py-10); octx.lineTo(px, py+10);
          octx.stroke();
        }
      }

      pickText.textContent = `${bestZone}번 · ${(best.score*100).toFixed(0)}%`;

      const light = computeBrightness(vw, vh, best.bbox);
      lightText.textContent = `${light.label} (Δ${light.diff.toFixed(0)})`;

      const t1 = performance.now();
      debug.textContent =
        `detect ${(t1-t0).toFixed(0)}ms · period ${period.value}ms · thr ${minScore.toFixed(2)} · topK ${maxK}\n` +
        `ROI ${light.roiMean.toFixed(0)} / BG ${light.bgMean.toFixed(0)} / Δ${light.diff.toFixed(0)} · zone ${bestZone}`;

    }catch(e){
      console.error(e);
      debug.textContent = '오류: ' + e;
    }finally{
      busy = false;
    }
  }

  function loop(ts){
    if(!camOn){
      requestAnimationFrame(loop);
      return;
    }
    const p = Number(period.value);
    if(ts - lastDetectAt >= p){
      lastDetectAt = ts;
      detectOnce();
    }
    requestAnimationFrame(loop);
  }

  async function startCam(){
    if(camOn) return;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height:{ ideal: 720 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');

      lastDetectAt = 0;
      resizeOverlay();
    }catch(e){
      debug.textContent = '카메라 실패: ' + e + '\n(HTTPS/localhost에서 실행 중인지 확인하세요)';
    }
  }

  function stopCam(){
    if(!camOn) return;
    try{
      if(video.srcObject){
        try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(_e){}
        video.srcObject = null;
      }
      stream = null;
      camOn = false;

      camBtn.textContent = '캠 켜기';
      camBtn.classList.remove('off');

      detCount.textContent = '—';
      pickText.textContent = '—';
      lightText.textContent = '—';
      debug.textContent = '';

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
    }catch(_e){}
  }

  camBtn.addEventListener('click', () => camOn ? stopCam() : startCam());
  window.addEventListener('resize', resizeOverlay);

  // 시작: 모델 로드 + 루프 시작
  resizeOverlay();
  loadModel();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
