<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>9분할 동그라미(원) 위치 인식 테스트</title>

  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
      --line: rgba(255,255,255,.9);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }

    header{
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{
      font-weight:900;
      letter-spacing:.2px;
    }
    header .spacer{ flex:1 1 auto; }
    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      background:#2563eb;
      color:white;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:#ef4444; }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.25);
      font: 800 13px/1 system-ui;
    }
    .pill .muted{ color:var(--muted); font-weight:700; }

    main{
      height: calc(100vh - 64px);
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }

    .stage{
      flex:1 1 auto;
      min-height: 260px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit: contain;
      background:#000;
    }
    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }
    code{
      color:#d1fae5;
      background: rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:800;
    }
  </style>

  <script>
    // ---- OpenCV 로딩 상태 ----
    let cvReady = false;
    function setStatus(msg){
      const el = document.getElementById('statusText');
      if(el) el.textContent = msg;
    }
    function onOpenCvScriptLoaded(){
      if(typeof cv === 'undefined'){
        setStatus('OpenCV 로딩 실패(네트워크/차단 확인)');
        return;
      }
      cv['onRuntimeInitialized'] = () => {
        cvReady = true;
        setStatus('OpenCV 준비완료');
      };
      setStatus('OpenCV 런타임 초기화중...');
    }
  </script>
  <!-- OpenCV.js (원형 검출 정확도 향상용) -->
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvScriptLoaded()"></script>
</head>

<body>
  <header>
    <div class="title">🎥 9분할 동그라미(원) 위치 인식 테스트</div>
    <div class="spacer"></div>
    <button id="camBtn" class="btn">캠 켜기</button>
    <span class="pill"><span class="muted">상태</span> <span id="statusText">OpenCV 로딩중...</span></span>
    <span class="pill"><span class="muted">인식</span> <span id="resultText">—</span></span>
  </header>

  <main>
    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">
        인식 주기: <code>0.5초</code> / 원 검출: <code>HoughCircles + 점수(에지/균일도/대비)</code><br/>
        팁: 공이 잘 안 잡히면 <code>조명 반사</code>를 줄이고, 공과 배경의 <code>경계(에지)</code>가 보이게 해주세요.
      </div>
      <div class="small" id="debugText"></div>
    </div>
  </main>

<script>
(() => {
  const DETECT_MS = 500;

  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');
  const resultText = document.getElementById('resultText');
  const debugText = document.getElementById('debugText');

  let stream = null;
  let camOn = false;

  // 처리용 캔버스(원본 프레임을 축소해서 OpenCV에 넣음)
  const proc = document.createElement('canvas');
  const pctx = proc.getContext('2d', { willReadFrequently:true });
  let procW = 360, procH = 240;

  // 흔들림 완화(2번 연속 같은 존이면 확정)
  let stableZone = null;      // 확정 존(1~9)
  let pendingZone = null;
  let pendingCount = 0;

  // 마지막 원(근처 후보 선호)
  let lastCircle = null; // {x,y,r}

  // 인식 중복 방지
  let busy = false;
  let timer = null;

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0) return {left:0, top:0, width:ww, height:wh, scale:1};

    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;
    return {left, top, width:dw, height:dh, scale:s};
  }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr,0,0,dpr,0,0);
  }

  function ensureProcSize(){
    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 480;

    // 목표 폭(360)을 유지하되, 영상 비율에 맞춰 높이 설정
    let w = 360;
    let h = Math.round(w * (vh / vw));

    // 너무 작아지지 않게
    w = Math.max(280, w);
    h = Math.max(200, h);

    // 3의 배수로 (9분할 경계 정밀)
    w = w - (w % 3);
    h = h - (h % 3);

    if(procW !== w || procH !== h){
      procW = w; procH = h;
      proc.width = procW;
      proc.height = procH;
    }
  }

  function zoneFromPoint(x, y){
    const cw = procW / 3;
    const ch = procH / 3;
    let col = Math.floor(x / cw);
    let row = Math.floor(y / ch);
    col = clamp(col, 0, 2);
    row = clamp(row, 0, 2);
    const zone = row * 3 + col + 1;
    return {zone, row, col};
  }

  function drawGridAndNumbers(rect){
    // rect: 실제 영상이 stage에 표시되는 영역
    const x0 = rect.left, y0 = rect.top, w = rect.width, h = rect.height;

    // grid
    octx.strokeStyle = 'rgba(255,255,255,0.9)';
    octx.lineWidth = 1;

    // 세로 2줄
    octx.beginPath();
    octx.moveTo(x0 + w/3, y0);      octx.lineTo(x0 + w/3, y0 + h);
    octx.moveTo(x0 + 2*w/3, y0);    octx.lineTo(x0 + 2*w/3, y0 + h);
    // 가로 2줄
    octx.moveTo(x0, y0 + h/3);      octx.lineTo(x0 + w, y0 + h/3);
    octx.moveTo(x0, y0 + 2*h/3);    octx.lineTo(x0 + w, y0 + 2*h/3);
    octx.stroke();

    // numbers 1..9
    octx.font = '900 16px system-ui';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const n = r*3 + c + 1;
        const cx = x0 + (c+0.5)*(w/3);
        const cy = y0 + (r+0.5)*(h/3);

        // bubble
        octx.fillStyle = 'rgba(0,0,0,0.28)';
        octx.strokeStyle = 'rgba(255,255,255,0.22)';
        octx.lineWidth = 1;
        octx.beginPath();
        octx.arc(cx, cy, 14, 0, Math.PI*2);
        octx.fill();
        octx.stroke();

        octx.fillStyle = 'rgba(255,255,255,0.95)';
        octx.fillText(String(n), cx, cy);
      }
    }
  }

  function drawZoneHighlight(rect, zone){
    if(!zone) return;
    const z = zone - 1;
    const row = Math.floor(z / 3);
    const col = z % 3;

    const x0 = rect.left + col*(rect.width/3);
    const y0 = rect.top  + row*(rect.height/3);
    const w = rect.width/3;
    const h = rect.height/3;

    octx.fillStyle = 'rgba(255,255,255,0.08)';
    octx.strokeStyle = 'rgba(255,255,255,0.35)';
    octx.lineWidth = 2;
    octx.fillRect(x0, y0, w, h);
    octx.strokeRect(x0, y0, w, h);
  }

  function drawCircle(rect, circle){
    if(!circle) return;

    const sx = rect.width / procW;
    const sy = rect.height / procH;

    const cx = rect.left + circle.x * sx;
    const cy = rect.top  + circle.y * sy;
    const r  = Math.max(2, circle.r * ((sx+sy)*0.5));

    octx.strokeStyle = 'rgba(0,255,220,0.95)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.arc(cx, cy, r, 0, Math.PI*2);
    octx.stroke();

    // center cross
    octx.strokeStyle = 'rgba(0,255,220,0.85)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.moveTo(cx-8, cy); octx.lineTo(cx+8, cy);
    octx.moveTo(cx, cy-8); octx.lineTo(cx, cy+8);
    octx.stroke();
  }

  function render(circle, zone, score, extra){
    resizeOverlay();
    octx.clearRect(0,0, overlay.width, overlay.height);

    const rect = getDisplayRect();
    drawGridAndNumbers(rect);

    // 확정된 구역 강조
    drawZoneHighlight(rect, zone);

    // 원 표시
    drawCircle(rect, circle);

    if(zone){
      resultText.textContent = `${zone}번`;
    }else{
      resultText.textContent = '—';
    }

    debugText.textContent = extra || '';
  }

  // ---- 점수 계산(배경 false positive 줄이기) ----
  function edgeSupport(edges, x, y, r){
    const w = edges.cols, h = edges.rows;
    const data = edges.data; // Uint8Array
    const N = 72;
    let hit = 0;
    for(let i=0;i<N;i++){
      const a = (i / N) * Math.PI * 2;
      const px = Math.round(x + r * Math.cos(a));
      const py = Math.round(y + r * Math.sin(a));
      let found = false;
      for(let dy=-1; dy<=1 && !found; dy++){
        const yy = py + dy;
        if(yy < 0 || yy >= h) continue;
        for(let dx=-1; dx<=1; dx++){
          const xx = px + dx;
          if(xx < 0 || xx >= w) continue;
          if(data[yy*w + xx] > 0){
            found = true; break;
          }
        }
      }
      if(found) hit++;
    }
    return hit / N;
  }

  function sampleInsideStats(gray, x, y, r){
    const w = gray.cols, h = gray.rows;
    const g = gray.data;
    const rings = [0.25, 0.55, 0.80];
    const per = 18;

    let vals = [];
    for(const s of rings){
      const rr = r * s;
      for(let i=0;i<per;i++){
        const a = (i / per) * Math.PI * 2;
        const px = Math.round(x + rr * Math.cos(a));
        const py = Math.round(y + rr * Math.sin(a));
        if(px<0||py<0||px>=w||py>=h) continue;
        vals.push(g[py*w + px]);
      }
    }
    if(vals.length < 10) return null;

    let mean = 0;
    for(const v of vals) mean += v;
    mean /= vals.length;

    let varSum = 0;
    for(const v of vals){
      const d = v - mean;
      varSum += d*d;
    }
    const std = Math.sqrt(varSum / vals.length);
    return {mean, std, n: vals.length};
  }

  function sampleOutsideMean(gray, x, y, r){
    const w = gray.cols, h = gray.rows;
    const g = gray.data;
    const N = 48;
    const rr = r * 1.15;
    let sum=0, cnt=0;
    for(let i=0;i<N;i++){
      const a = (i / N) * Math.PI * 2;
      const px = Math.round(x + rr * Math.cos(a));
      const py = Math.round(y + rr * Math.sin(a));
      if(px<0||py<0||px>=w||py>=h) continue;
      sum += g[py*w + px];
      cnt++;
    }
    if(cnt < 20) return null;
    return sum / cnt;
  }

  function dist2(a,b){
    const dx=a.x-b.x, dy=a.y-b.y;
    return dx*dx + dy*dy;
  }

  async function detectOnce(){
    if(!camOn) return;
    if(!cvReady) { render(null, stableZone, 0, 'OpenCV 준비중...'); return; }
    if(video.readyState < 2) return;
    if(busy) return;

    busy = true;
    try{
      ensureProcSize();

      // 현재 프레임 -> 처리 캔버스
      pctx.drawImage(video, 0, 0, procW, procH);

      // OpenCV 파이프라인
      const src = cv.imread(proc);               // RGBA
      const gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      const blur = new cv.Mat();
      cv.GaussianBlur(gray, blur, new cv.Size(9,9), 2, 2, cv.BORDER_DEFAULT);

      const edges = new cv.Mat();
      cv.Canny(blur, edges, 70, 140);

      const circles = new cv.Mat();

      const minDim = Math.min(procW, procH);

      // 반경 범위: 크기 상관없이(너무 작은 노이즈/너무 큰 배경을 배제하는 정도만)
      const minR = Math.max(10, Math.round(minDim * 0.03));
      const maxR = Math.round(minDim * 0.48);

      // HoughCircles 파라미터(배경 복잡 대응)
      // dp=1.2, minDist=rows/6, param1=100, param2=35(엄격), minR/maxR
      cv.HoughCircles(
        blur, circles,
        cv.HOUGH_GRADIENT,
        1.2,
        Math.max(20, Math.round(procH / 6)),
        100,
        35,
        minR,
        maxR
      );

      let best = null;

      if(circles.cols > 0){
        for(let i=0;i<circles.cols;i++){
          const x = circles.data32F[i*3 + 0];
          const y = circles.data32F[i*3 + 1];
          const r = circles.data32F[i*3 + 2];

          // 화면 밖/너무 가장자리 근접한 원은 배제(오검출 감소)
          const margin = Math.max(6, r * 0.15);
          if(x < margin || y < margin || x > (procW - margin) || y > (procH - margin)) continue;

          const es = edgeSupport(edges, x, y, r);              // 0~1
          const inside = sampleInsideStats(blur, x, y, r);     // mean,std
          const outMean = sampleOutsideMean(blur, x, y, r);

          if(!inside) continue;

          const uniform = clamp(1 - (inside.std / 70), 0, 1); // std 낮을수록 좋음
          let contrast = 0;
          if(outMean != null){
            contrast = clamp(Math.abs(inside.mean - outMean) / 90, 0, 1);
          }

          // 점수(배경 복잡 대응): 에지 지지도를 가장 크게
          let score = 0.58*es + 0.24*uniform + 0.18*contrast;

          // 이전 원 근처를 살짝 선호(깜빡임/점프 감소)
          if(lastCircle){
            const d = Math.sqrt(dist2({x,y},{x:lastCircle.x,y:lastCircle.y}));
            const near = clamp(1 - (d / (minDim*0.45)), 0, 1);
            score = score * (0.88 + 0.12*near);
          }

          // 최소 기준(너무 낮으면 오검출로 보고 버림)
          if(score < 0.28) continue;

          const cand = {x, y, r, score, es, uniform, contrast};
          if(!best || cand.score > best.score) best = cand;
        }
      }

      // 메모리 정리
      src.delete(); gray.delete(); blur.delete(); edges.delete(); circles.delete();

      if(!best){
        // 인식 실패 시: 확정존은 유지하되 표시만 —
        render(null, null, 0, '원 후보 없음(배경/조명/에지 확인)');
        pendingZone = null; pendingCount = 0;
        lastCircle = null;
        return;
      }

      lastCircle = {x: best.x, y: best.y, r: best.r};

      const z = zoneFromPoint(best.x, best.y).zone;

      // 2회 연속 같은 존이면 확정
      if(stableZone == null){
        stableZone = z;
        pendingZone = null; pendingCount = 0;
      }else if(z === stableZone){
        pendingZone = null; pendingCount = 0;
      }else{
        if(pendingZone === z){
          pendingCount++;
        }else{
          pendingZone = z;
          pendingCount = 1;
        }
        if(pendingCount >= 2){
          stableZone = z;
          pendingZone = null;
          pendingCount = 0;
        }
      }

      const extra =
        `score ${(best.score*100).toFixed(1)}% · edge ${(best.es*100).toFixed(0)}% · ` +
        `uniform ${(best.uniform*100).toFixed(0)}% · contrast ${(best.contrast*100).toFixed(0)}%`;

      render(best, stableZone, best.score, extra);

    }catch(e){
      console.error(e);
      render(null, null, 0, '오류: ' + e);
    }finally{
      busy = false;
    }
  }

  async function startCam(){
    if(camOn) return;
    try{
      // overhead/바닥 촬영은 보통 후면카메라(environment)가 유리
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 640 },
          height:{ ideal: 480 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');

      // 초기 렌더
      stableZone = null; pendingZone = null; pendingCount = 0; lastCircle=null;
      render(null, null, 0, '');

      // 0.5초 주기 인식
      if(timer) clearInterval(timer);
      timer = setInterval(detectOnce, DETECT_MS);

      // 리사이즈 대응
      resizeOverlay();
      window.addEventListener('resize', () => {
        resizeOverlay();
        render(lastCircle, stableZone, 0, debugText.textContent || '');
      });

      setStatus(cvReady ? 'OpenCV 준비완료' : 'OpenCV 준비중...');
    }catch(e){
      setStatus('카메라 실패: ' + e);
    }
  }

  function stopCam(){
    if(!camOn) return;
    try{
      if(timer){ clearInterval(timer); timer = null; }
      if(video) { try{ video.pause(); }catch(_e){} }
      if(video && video.srcObject){
        try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(_e){}
        video.srcObject = null;
      }
      stream = null;
      camOn = false;

      camBtn.textContent = '캠 켜기';
      camBtn.classList.remove('off');

      stableZone = null; pendingZone = null; pendingCount = 0; lastCircle=null;
      resultText.textContent = '—';
      debugText.textContent = '';
      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
    }catch(_e){}
  }

  camBtn.addEventListener('click', () => {
    if(camOn) stopCam();
    else startCam();
  });

  // 페이지 진입 시 초기 그리드만(카메라 없을 때는 빈 화면)
  resizeOverlay();
})();
</script>

</body>
</html>
