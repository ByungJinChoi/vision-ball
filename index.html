<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>흰색 공 찾기 · 공 확인 · 공 추적</title>
  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
      --blue:#2563eb;
      --red:#ef4444;
      --green:#16a34a;
      --yellow:#f59e0b;
      --panel:rgba(0,0,0,.28);
    }
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    header{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }
    .title{ font-weight:900; letter-spacing:.2px; }
    .spacer{ flex:1 1 auto; }
    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      color:white;
      background:var(--blue);
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:var(--red); }
    .btn.finding{ background:var(--yellow); color:#111827; }
    .btn.tracking{ background:var(--green); }
    .btn:disabled{ opacity:.45; cursor:not-allowed; }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:var(--panel);
      font:800 13px/1 system-ui;
      white-space:nowrap;
    }
    .muted{ color:var(--muted); font-weight:700; }
    main{
      height:calc(100vh - 68px);
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:12px;
    }
    .stage{
      flex:1 1 auto;
      min-height:280px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }
    #overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }
    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:flex-start;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
      white-space:pre-wrap;
    }
    code{
      color:#d1fae5;
      background:rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:900;
    }
  </style>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>
<body>
  <header>
    <div class="title">🎥 흰색 공 찾기 → 공 확인 → 공 추적</div>
    <div class="spacer"></div>
    <button id="camBtn" class="btn">캠 켜기</button>
    <button id="actionBtn" class="btn" disabled>공 찾기</button>
    <span class="pill"><span class="muted">OpenCV</span> <span id="cvStatus">로딩중…</span></span>
    <span class="pill"><span class="muted">상태</span> <span id="modeText">대기</span></span>
    <span class="pill"><span class="muted">위치</span> <span id="posText">—</span></span>
  </header>

  <main>
    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">사용 순서
1. <code>캠 켜기</code>
2. <code>공 찾기</code>를 누른 뒤 흰색 공 1개를 화면 중앙에 둡니다.
3. 공 둘레에 초록 원이 맞게 표시되면 <code>공 확인</code>을 누릅니다.
4. 그 뒤에는 공 위치를 계속 동그라미로 표시합니다.

설정은 모두 빼고, 흰색 공 1개만 찾도록 단순화했습니다.</div>
      <div class="small" id="debug"></div>
    </div>
  </main>

<script>
(() => {
  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');
  const actionBtn = document.getElementById('actionBtn');
  const cvStatus = document.getElementById('cvStatus');
  const modeText = document.getElementById('modeText');
  const posText = document.getElementById('posText');
  const debug = document.getElementById('debug');

  const PROCESS_MS = 100;

  let stream = null;
  let camOn = false;
  let cvReady = false;
  let mode = 'idle'; // idle | finding | tracking
  let busy = false;
  let lastAt = 0;

  let currentCandidate = null;
  let confirmedBall = null;
  let trackedBall = null;
  let lostCount = 0;

  const workCanvas = document.createElement('canvas');
  const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0) return { left:0, top:0, width:ww, height:wh, scale:1 };
    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    return { left:(ww - dw) / 2, top:(wh - dh) / 2, width:dw, height:dh, scale:s };
  }

  function toViewCircle(circle){
    const rect = getDisplayRect();
    return {
      x: rect.left + circle.x * rect.scale,
      y: rect.top + circle.y * rect.scale,
      r: circle.r * rect.scale
    };
  }

  function clearOverlay(){
    octx.clearRect(0, 0, stage.clientWidth, stage.clientHeight);
  }

  function drawCenterGuide(){
    const rect = getDisplayRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const guideR = Math.max(28, Math.min(rect.width, rect.height) * 0.10);

    octx.save();
    octx.strokeStyle = 'rgba(255,255,255,.45)';
    octx.lineWidth = 2;
    octx.setLineDash([8, 6]);
    octx.beginPath();
    octx.arc(cx, cy, guideR, 0, Math.PI * 2);
    octx.stroke();
    octx.setLineDash([]);

    octx.beginPath();
    octx.moveTo(cx - 16, cy);
    octx.lineTo(cx + 16, cy);
    octx.moveTo(cx, cy - 16);
    octx.lineTo(cx, cy + 16);
    octx.stroke();
    octx.restore();
  }

  function drawLabel(text, x, y){
    octx.font = '900 14px system-ui';
    const padX = 8;
    const boxW = octx.measureText(text).width + padX * 2;
    const boxH = 24;
    const drawX = clamp(x - boxW / 2, 6, stage.clientWidth - boxW - 6);
    const drawY = clamp(y, 6, stage.clientHeight - boxH - 6);
    octx.fillStyle = 'rgba(0,0,0,.72)';
    octx.fillRect(drawX, drawY, boxW, boxH);
    octx.fillStyle = '#ffffff';
    octx.fillText(text, drawX + padX, drawY + 16);
  }

  function drawCircle(circle, color, label){
    const v = toViewCircle(circle);
    const rr = Math.max(8, v.r);

    octx.strokeStyle = color;
    octx.lineWidth = 4;
    octx.beginPath();
    octx.arc(v.x, v.y, rr, 0, Math.PI * 2);
    octx.stroke();

    octx.fillStyle = color;
    octx.beginPath();
    octx.arc(v.x, v.y, 4, 0, Math.PI * 2);
    octx.fill();

    if(label) drawLabel(label, v.x, v.y - rr - 30);
  }

  function drawFindingOverlay(){
    clearOverlay();
    drawCenterGuide();
    if(currentCandidate){
      drawCircle(currentCandidate, '#22c55e', '공 후보');
      const v = toViewCircle(currentCandidate);
      octx.strokeStyle = 'rgba(34,197,94,.7)';
      octx.lineWidth = 1.5;
      octx.beginPath();
      octx.moveTo(v.x, v.y);
      const rect = getDisplayRect();
      octx.lineTo(rect.left + rect.width / 2, rect.top + rect.height / 2);
      octx.stroke();
    } else {
      drawLabel('공을 중앙에 맞춰 주세요', stage.clientWidth / 2, 16);
    }
  }

  function drawTrackingOverlay(lost = false){
    clearOverlay();
    if(trackedBall){
      drawCircle(trackedBall, lost ? '#f59e0b' : '#22c55e', lost ? '잠시 놓침' : '공 위치');
    }
  }

  function rgbToHsv(r, g, b){
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    const d = max - min;
    let h = 0;
    if(d !== 0){
      switch(max){
        case r: h = 60 * (((g - b) / d) % 6); break;
        case g: h = 60 * (((b - r) / d) + 2); break;
        case b: h = 60 * (((r - g) / d) + 4); break;
      }
    }
    if(h < 0) h += 360;
    const s = max === 0 ? 0 : d / max;
    return { h, s: s * 255, v: max * 255 };
  }

  function sampleBallInfo(cx, cy, r){
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if(!vw || !vh) return null;

    workCanvas.width = vw;
    workCanvas.height = vh;
    workCtx.drawImage(video, 0, 0, vw, vh);

    const x0 = Math.max(0, Math.floor(cx - r * 0.85));
    const y0 = Math.max(0, Math.floor(cy - r * 0.85));
    const w = Math.max(1, Math.floor(r * 1.7));
    const h = Math.max(1, Math.floor(r * 1.7));
    const img = workCtx.getImageData(x0, y0, Math.min(w, vw - x0), Math.min(h, vh - y0));

    const mx = img.width / 2;
    const my = img.height / 2;
    const rr = Math.min(mx, my) * 0.92;
    let n = 0;
    let sSum = 0;
    let vSum = 0;
    let brightSum = 0;
    let whiteCount = 0;

    for(let y = 0; y < img.height; y++){
      for(let x = 0; x < img.width; x++){
        const dx = x - mx;
        const dy = y - my;
        if(dx * dx + dy * dy > rr * rr) continue;
        const i = (y * img.width + x) * 4;
        const r0 = img.data[i];
        const g0 = img.data[i + 1];
        const b0 = img.data[i + 2];
        const hsv = rgbToHsv(r0, g0, b0);
        sSum += hsv.s;
        vSum += hsv.v;
        brightSum += (r0 + g0 + b0) / 3;
        if(hsv.s <= 90 && hsv.v >= 160) whiteCount++;
        n++;
      }
    }

    if(!n) return null;
    return {
      sMean: sSum / n,
      vMean: vSum / n,
      brightMean: brightSum / n,
      whiteRatio: whiteCount / n
    };
  }

  function getFrameMat(maxSide = 720){
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    let scale = 1;
    const maxDim = Math.max(vw, vh);
    if(maxDim > maxSide) scale = maxSide / maxDim;
    const w = Math.max(1, Math.round(vw * scale));
    const h = Math.max(1, Math.round(vh * scale));
    workCanvas.width = w;
    workCanvas.height = h;
    workCtx.drawImage(video, 0, 0, w, h);
    const src = cv.imread(workCanvas);
    return { src, scale, w, h };
  }

  function buildWhiteMask(src, satMax, valMin){
    const rgb = new cv.Mat();
    const hsv = new cv.Mat();
    const mask = new cv.Mat();
    const low = new cv.Mat(src.rows, src.cols, cv.CV_8UC3, [0, 0, valMin]);
    const high = new cv.Mat(src.rows, src.cols, cv.CV_8UC3, [179, satMax, 255]);

    cv.cvtColor(src, rgb, cv.COLOR_RGBA2RGB);
    cv.cvtColor(rgb, hsv, cv.COLOR_RGB2HSV);
    cv.inRange(hsv, low, high, mask);

    const kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(5, 5));
    cv.morphologyEx(mask, mask, cv.MORPH_OPEN, kernel);
    cv.morphologyEx(mask, mask, cv.MORPH_CLOSE, kernel);
    cv.GaussianBlur(mask, mask, new cv.Size(7, 7), 0, 0, cv.BORDER_DEFAULT);
    cv.threshold(mask, mask, 120, 255, cv.THRESH_BINARY);

    rgb.delete();
    hsv.delete();
    low.delete();
    high.delete();
    kernel.delete();

    return mask;
  }

  function contourToCircle(cnt){
    if(cv.minEnclosingCircle){
      const circle = cv.minEnclosingCircle(cnt);
      if(circle && circle.center && Number.isFinite(circle.radius)) {
        return { x: circle.center.x, y: circle.center.y, r: circle.radius };
      }
    }
    const rect = cv.boundingRect(cnt);
    return {
      x: rect.x + rect.width / 2,
      y: rect.y + rect.height / 2,
      r: Math.max(rect.width, rect.height) / 2
    };
  }

  function findBallInMask(mask, scale, searchRect, baseBall, opts = {}){
    const fullW = mask.cols;
    const fullH = mask.rows;
    const rect = new cv.Rect(
      clamp(Math.round(searchRect.x), 0, fullW - 1),
      clamp(Math.round(searchRect.y), 0, fullH - 1),
      clamp(Math.round(searchRect.w), 1, fullW),
      clamp(Math.round(searchRect.h), 1, fullH)
    );
    rect.width = Math.min(rect.width, fullW - rect.x);
    rect.height = Math.min(rect.height, fullH - rect.y);

    const roi = mask.roi(rect);
    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat();
    cv.findContours(roi, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    const cx0 = fullW / 2;
    const cy0 = fullH / 2;
    const minSide = Math.min(fullW, fullH);
    const minR = opts.minR || Math.max(8, minSide * 0.018);
    const maxR = opts.maxR || Math.max(minR + 6, minSide * 0.24);

    let best = null;

    for(let i = 0; i < contours.size(); i++){
      const cnt = contours.get(i);
      const area = cv.contourArea(cnt);
      if(area < Math.PI * minR * minR * 0.35){ cnt.delete(); continue; }

      const peri = cv.arcLength(cnt, true);
      if(peri <= 0){ cnt.delete(); continue; }

      const localCircle = contourToCircle(cnt);
      const rx = localCircle.x + rect.x;
      const ry = localCircle.y + rect.y;
      const rr = localCircle.r;

      if(rr < minR || rr > maxR){ cnt.delete(); continue; }

      const circularity = (4 * Math.PI * area) / (peri * peri);
      const fillRatio = area / (Math.PI * rr * rr);
      if(circularity < (opts.circularityMin || 0.55)){ cnt.delete(); continue; }
      if(fillRatio < (opts.fillMin || 0.50)){ cnt.delete(); continue; }

      const fullCircle = { x: rx / scale, y: ry / scale, r: rr / scale };
      const info = sampleBallInfo(fullCircle.x, fullCircle.y, fullCircle.r);
      if(!info){ cnt.delete(); continue; }
      if(info.sMean > (opts.sMeanMax || 95)){ cnt.delete(); continue; }
      if(info.vMean < (opts.vMeanMin || 150)){ cnt.delete(); continue; }
      if(info.whiteRatio < (opts.whiteRatioMin || 0.45)){ cnt.delete(); continue; }

      const distCenter = Math.hypot(rx - cx0, ry - cy0);
      const distBase = baseBall ? Math.hypot(fullCircle.x - baseBall.x, fullCircle.y - baseBall.y) : distCenter / scale;
      const radiusRatio = baseBall ? (fullCircle.r / Math.max(1, baseBall.r)) : 1;
      if(baseBall && distBase > (opts.maxDist || Math.max(baseBall.r * 6, 140))){ cnt.delete(); continue; }
      if(baseBall && (radiusRatio < (opts.minRadiusRatio || 0.55) || radiusRatio > (opts.maxRadiusRatio || 1.65))){ cnt.delete(); continue; }

      const score =
        circularity * 220 +
        fillRatio * 160 +
        info.whiteRatio * 120 -
        distBase * 0.9 -
        Math.abs(radiusRatio - 1) * 140 -
        distCenter * (opts.centerPenalty || 0);

      if(!best || score > best.score){
        best = {
          x: fullCircle.x,
          y: fullCircle.y,
          r: fullCircle.r,
          score,
          circularity,
          fillRatio,
          ...info
        };
      }

      cnt.delete();
    }

    roi.delete();
    contours.delete();
    hierarchy.delete();
    return best;
  }

  function findCenteredBall(){
    const { src, scale, w, h } = getFrameMat(720);
    const mask = buildWhiteMask(src, 80, 160);

    const side = Math.min(w, h);
    const roiSize = side * 0.56;
    const rect = {
      x: (w - roiSize) / 2,
      y: (h - roiSize) / 2,
      w: roiSize,
      h: roiSize
    };

    const best = findBallInMask(mask, scale, rect, null, {
      circularityMin: 0.58,
      fillMin: 0.54,
      sMeanMax: 90,
      vMeanMin: 165,
      whiteRatioMin: 0.55,
      centerPenalty: 1.0,
      minR: Math.max(10, side * 0.022),
      maxR: Math.max(28, side * 0.18)
    });

    src.delete();
    mask.delete();
    return best;
  }

  function trackConfirmedBall(){
    if(!confirmedBall) return null;

    const { src, scale, w, h } = getFrameMat(720);
    const satMax = clamp(Math.round(Math.max(70, confirmedBall.sMean + 30)), 50, 110);
    const valMin = clamp(Math.round(Math.min(230, Math.max(135, confirmedBall.vMean - 50))), 120, 235);
    const mask = buildWhiteMask(src, satMax, valMin);

    const base = trackedBall || confirmedBall;
    const px = base.x * scale;
    const py = base.y * scale;
    const pr = base.r * scale;

    const searchRects = [];
    const localHalf = Math.max(pr * 4.2, 70);
    searchRects.push({ x: px - localHalf, y: py - localHalf, w: localHalf * 2, h: localHalf * 2 });

    if(lostCount >= 1){
      const wideHalf = Math.max(pr * 7.0, 150);
      searchRects.push({ x: px - wideHalf, y: py - wideHalf, w: wideHalf * 2, h: wideHalf * 2 });
    }
    if(lostCount >= 3){
      searchRects.push({ x: 0, y: 0, w, h });
    }

    let best = null;
    for(const rect of searchRects){
      best = findBallInMask(mask, scale, rect, confirmedBall, {
        circularityMin: 0.45,
        fillMin: 0.40,
        sMeanMax: clamp(Math.round(confirmedBall.sMean + 45), 60, 115),
        vMeanMin: clamp(Math.round(confirmedBall.vMean - 65), 110, 230),
        whiteRatioMin: 0.35,
        maxDist: Math.max(base.r * (lostCount >= 1 ? 8 : 5), 160),
        minRadiusRatio: 0.50,
        maxRadiusRatio: 1.75,
        minR: Math.max(8, Math.min(w, h) * 0.016),
        maxR: Math.max(28, Math.min(w, h) * 0.22)
      });
      if(best) break;
    }

    src.delete();
    mask.delete();
    return best;
  }

  async function startCam(){
    if(camOn) return;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();
      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');
      if(cvReady) actionBtn.disabled = false;
      modeText.textContent = '캠 준비 완료';
      posText.textContent = '—';
      debug.textContent = '공을 찾으려면 공 찾기를 누르세요.';
      resizeOverlay();
    } catch (e) {
      debug.textContent = '카메라 실행 실패: ' + e + '\n(스마트폰에서는 HTTPS 또는 localhost 환경이 필요합니다.)';
    }
  }

  function stopCam(){
    if(video.srcObject){
      try{ video.srcObject.getTracks().forEach(track => track.stop()); } catch(_e){}
      video.srcObject = null;
    }
    stream = null;
    camOn = false;
    mode = 'idle';
    currentCandidate = null;
    confirmedBall = null;
    trackedBall = null;
    lostCount = 0;
    lastAt = 0;

    camBtn.textContent = '캠 켜기';
    camBtn.classList.remove('off');

    actionBtn.textContent = '공 찾기';
    actionBtn.classList.remove('finding', 'tracking');
    actionBtn.disabled = !cvReady;

    modeText.textContent = '대기';
    posText.textContent = '—';
    debug.textContent = '';
    clearOverlay();
  }

  function startFinding(){
    if(!camOn || !cvReady) return;
    mode = 'finding';
    currentCandidate = null;
    confirmedBall = null;
    trackedBall = null;
    lostCount = 0;
    actionBtn.textContent = '공 확인';
    actionBtn.classList.add('finding');
    actionBtn.classList.remove('tracking');
    modeText.textContent = '중앙의 공 찾는 중';
    posText.textContent = '—';
    debug.textContent = '흰색 공 1개를 화면 중앙에 두세요. 공 둘레에 초록 원이 맞으면 공 확인을 누르세요.';
    drawFindingOverlay();
  }

  function confirmBall(){
    if(!currentCandidate){
      debug.textContent = '아직 공 후보가 없습니다. 흰색 공을 화면 중앙에 조금 더 크게 보여 주세요.';
      return;
    }
    confirmedBall = { ...currentCandidate };
    trackedBall = { x: currentCandidate.x, y: currentCandidate.y, r: currentCandidate.r };
    lostCount = 0;
    mode = 'tracking';
    actionBtn.textContent = '다시 찾기';
    actionBtn.classList.remove('finding');
    actionBtn.classList.add('tracking');
    modeText.textContent = '공 추적 중';
    posText.textContent = `x ${trackedBall.x.toFixed(0)}, y ${trackedBall.y.toFixed(0)}`;
    debug.textContent = `공 확인 완료 · x ${trackedBall.x.toFixed(0)}, y ${trackedBall.y.toFixed(0)}, r ${trackedBall.r.toFixed(0)}`;
    drawTrackingOverlay(false);
  }

  function processFinding(){
    const t0 = performance.now();
    currentCandidate = findCenteredBall();
    drawFindingOverlay();
    const t1 = performance.now();
    if(currentCandidate){
      posText.textContent = `x ${currentCandidate.x.toFixed(0)}, y ${currentCandidate.y.toFixed(0)}`;
      debug.textContent = `중앙 후보 발견 · x ${currentCandidate.x.toFixed(0)}, y ${currentCandidate.y.toFixed(0)}, r ${currentCandidate.r.toFixed(0)} · ${(t1 - t0).toFixed(0)}ms`;
    } else {
      posText.textContent = '—';
      debug.textContent = `중앙에서 공 후보를 찾는 중 · ${(t1 - t0).toFixed(0)}ms`;
    }
  }

  function processTracking(){
    const t0 = performance.now();
    const found = trackConfirmedBall();
    const t1 = performance.now();

    if(found){
      trackedBall = found;
      lostCount = 0;
      posText.textContent = `x ${trackedBall.x.toFixed(0)}, y ${trackedBall.y.toFixed(0)}`;
      drawTrackingOverlay(false);
      debug.textContent = `추적 성공 · x ${trackedBall.x.toFixed(0)}, y ${trackedBall.y.toFixed(0)}, r ${trackedBall.r.toFixed(0)} · ${(t1 - t0).toFixed(0)}ms`;
    } else {
      lostCount += 1;
      drawTrackingOverlay(true);
      if(trackedBall){
        posText.textContent = `x ${trackedBall.x.toFixed(0)}, y ${trackedBall.y.toFixed(0)}`;
      } else {
        posText.textContent = '—';
      }
      debug.textContent = `추적 실패 · 마지막 위치 유지 · ${(t1 - t0).toFixed(0)}ms`;
    }
  }

  function loop(ts){
    requestAnimationFrame(loop);
    if(!camOn || !cvReady || busy) return;
    if(ts - lastAt < PROCESS_MS) return;
    lastAt = ts;
    busy = true;
    try{
      if(mode === 'finding') processFinding();
      else if(mode === 'tracking') processTracking();
      else clearOverlay();
    } catch (e) {
      console.error(e);
      debug.textContent = '처리 오류: ' + e;
    } finally {
      busy = false;
    }
  }

  function waitForCv(){
    if(window.cv && cv.Mat){
      cv['onRuntimeInitialized'] = () => {
        cvReady = true;
        cvStatus.textContent = '준비됨';
        if(camOn) actionBtn.disabled = false;
      };
      if(cv.getBuildInformation){
        cvReady = true;
        cvStatus.textContent = '준비됨';
        if(camOn) actionBtn.disabled = false;
      }
    } else {
      setTimeout(waitForCv, 100);
    }
  }

  camBtn.addEventListener('click', () => camOn ? stopCam() : startCam());
  actionBtn.addEventListener('click', () => {
    if(mode === 'finding') confirmBall();
    else startFinding();
  });
  window.addEventListener('resize', resizeOverlay);

  resizeOverlay();
  waitForCv();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
