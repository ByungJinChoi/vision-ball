<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>9분할 움직임 탐지 테스트 v4 (Motion Outline)</title>

  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
      --blue:#2563eb;
      --red:#ef4444;
      --green:#10b981;
      --yellow:#f59e0b;
    }
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);
      color:var(--fg);
    }

    header{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{ font-weight:900; letter-spacing:.2px; }
    header .spacer{ flex:1 1 auto; }

    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      background:var(--blue);
      color:white;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:var(--red); }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.25);
      font:800 13px/1 system-ui;
      white-space:nowrap;
    }
    .pill .muted{ color:var(--muted); font-weight:700; }

    main{
      height:calc(100vh - 64px);
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    label{ font-size:12px; color:var(--muted); font-weight:800; }
    input[type="range"]{ width:180px; }
    code{
      color:#d1fae5;
      background:rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:900;
    }

    .stage{
      flex:1 1 auto;
      min-height:260px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }
    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>
  <header>
    <div class="title">🎥 9분할 움직임 탐지 테스트 v4 (움직이는 물체 외곽 라인 표시)</div>
    <div class="spacer"></div>

    <button id="camBtn" class="btn">캠 켜기</button>

    <span class="pill"><span class="muted">모델</span> <span id="modelStatus">준비중…</span></span>
    <span class="pill"><span class="muted">탐지</span> <span id="detCount">—</span></span>
    <span class="pill"><span class="muted">선택</span> <span id="pickText">—</span></span>
    <span class="pill"><span class="muted">밝기</span> <span id="lightText">—</span></span>
  </header>

  <main>
    <div class="row">
      <label>탐지 주기(ms)</label>
      <input id="period" type="range" min="80" max="800" step="20" value="180">
      <code id="periodVal">180</code>

      <label>최소 변화 민감도</label>
      <input id="thr" type="range" min="10" max="80" step="2" value="28">
      <code id="thrVal">28</code>

      <label>최대 후보</label>
      <input id="topk" type="range" min="1" max="10" step="1" value="5">
      <code id="topkVal">5</code>
    </div>

    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">
- 인식 방식: <code>프레임 차분(움직임 감지)</code>
- 표시: 움직이는 물체 후보를 박스로 표시, 가장 큰 후보 1개를 선택
- 외곽선: 선택된 물체 주변 변화 영역에 라인/점 표시
- 9분할: <code>1~9</code> 번호 + 선택된 물체의 칸 하이라이트
- 밝기: 선택된 물체 ROI 평균 밝기 vs 주변(확장 박스) 평균 비교로 <code>밝음/보통/어두움</code>
      </div>
      <div class="small" id="debug"></div>
    </div>
  </main>

<script>
(() => {
  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');

  const modelStatus = document.getElementById('modelStatus');
  const detCount = document.getElementById('detCount');
  const pickText = document.getElementById('pickText');
  const lightText = document.getElementById('lightText');
  const debug = document.getElementById('debug');

  const period = document.getElementById('period');
  const periodVal = document.getElementById('periodVal');
  const thr = document.getElementById('thr');
  const thrVal = document.getElementById('thrVal');
  const topk = document.getElementById('topk');
  const topkVal = document.getElementById('topkVal');

  period.addEventListener('input', ()=> periodVal.textContent = period.value);
  thr.addEventListener('input', ()=> thrVal.textContent = thr.value);
  topk.addEventListener('input', ()=> topkVal.textContent = topk.value);

  let stream = null;
  let camOn = false;
  let busy = false;
  let lastDetectAt = 0;
  let motionReady = false;

  // 움직임 감지용 저해상도 캔버스
  const motionCanvas = document.createElement('canvas');
  const motionCtx = motionCanvas.getContext('2d', { willReadFrequently:true });

  // 밝기 측정용
  const snap = document.createElement('canvas');
  const sctx = snap.getContext('2d', { willReadFrequently:true });

  let prevGray = null;
  let prevW = 0;
  let prevH = 0;

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr,0,0,dpr,0,0);
  }

  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0){
      return {left:0, top:0, width:ww, height:wh, scaleX:1, scaleY:1};
    }
    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;
    return {left, top, width:dw, height:dh, scaleX:s, scaleY:s};
  }

  function zoneFromPoint(cx, cy, vw, vh){
    const cw = vw / 3;
    const ch = vh / 3;
    let col = Math.floor(cx / cw);
    let row = Math.floor(cy / ch);
    col = clamp(col, 0, 2);
    row = clamp(row, 0, 2);
    return row * 3 + col + 1;
  }

  function drawGrid(rect){
    const x0 = rect.left, y0 = rect.top, w = rect.width, h = rect.height;

    octx.strokeStyle = 'rgba(255,255,255,0.9)';
    octx.lineWidth = 1;
    octx.beginPath();
    octx.moveTo(x0 + w/3, y0);      octx.lineTo(x0 + w/3, y0 + h);
    octx.moveTo(x0 + 2*w/3, y0);    octx.lineTo(x0 + 2*w/3, y0 + h);
    octx.moveTo(x0, y0 + h/3);      octx.lineTo(x0 + w, y0 + h/3);
    octx.moveTo(x0, y0 + 2*h/3);    octx.lineTo(x0 + w, y0 + 2*h/3);
    octx.stroke();

    octx.font = '900 16px system-ui';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const n = r*3 + c + 1;
        const cx = x0 + (c+0.5)*(w/3);
        const cy = y0 + (r+0.5)*(h/3);

        octx.fillStyle = 'rgba(0,0,0,0.28)';
        octx.strokeStyle = 'rgba(255,255,255,0.22)';
        octx.lineWidth = 1;
        octx.beginPath();
        octx.arc(cx, cy, 14, 0, Math.PI*2);
        octx.fill();
        octx.stroke();

        octx.fillStyle = 'rgba(255,255,255,0.95)';
        octx.fillText(String(n), cx, cy);
      }
    }
  }

  function drawZoneHighlight(rect, zone){
    if(!zone) return;
    const z = zone - 1;
    const row = Math.floor(z / 3);
    const col = z % 3;

    const x0 = rect.left + col*(rect.width/3);
    const y0 = rect.top  + row*(rect.height/3);
    const w = rect.width/3;
    const h = rect.height/3;

    octx.fillStyle = 'rgba(255,255,255,0.08)';
    octx.strokeStyle = 'rgba(255,255,255,0.35)';
    octx.lineWidth = 2;
    octx.fillRect(x0, y0, w, h);
    octx.strokeRect(x0, y0, w, h);
  }

  function drawBox(rect, bbox, isBest, label){
    const [x,y,w,h] = bbox;
    const rx = rect.left + x * rect.scaleX;
    const ry = rect.top  + y * rect.scaleY;
    const rw = w * rect.scaleX;
    const rh = h * rect.scaleY;

    octx.strokeStyle = isBest ? 'rgba(0,255,220,0.95)' : 'rgba(255,255,255,0.65)';
    octx.lineWidth = isBest ? 3 : 2;
    octx.strokeRect(rx, ry, rw, rh);

    if(label){
      octx.font = '800 12px system-ui';
      octx.textAlign = 'left';
      octx.textBaseline = 'top';
      const pad = 4;
      const tw = octx.measureText(label).width;
      octx.fillStyle = isBest ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.35)';
      octx.fillRect(rx, ry, tw + pad*2, 16 + pad);
      octx.fillStyle = 'rgba(255,255,255,0.95)';
      octx.fillText(label, rx + pad, ry + 2);
    }
  }

  function meanLuma(imgData){
    const d = imgData.data;
    let sum = 0;
    const n = d.length / 4;
    for(let i=0;i<d.length;i+=4){
      const r=d[i], g=d[i+1], b=d[i+2];
      sum += (0.299*r + 0.587*g + 0.114*b);
    }
    return n ? (sum / n) : 0;
  }

  function brightnessLabel(roiMean, bgMean){
    const diff = roiMean - bgMean;
    if(diff > 18) return {label:'밝음', diff};
    if(diff < -18) return {label:'어두움', diff};
    return {label:'보통', diff};
  }

  function computeBrightness(vw, vh, bbox){
    const targetW = 320;
    const sc = targetW / Math.max(1, vw);
    const targetH = Math.max(1, Math.round(vh * sc));
    if(snap.width !== targetW || snap.height !== targetH){
      snap.width = targetW;
      snap.height = targetH;
    }
    sctx.drawImage(video, 0, 0, targetW, targetH);

    const [x,y,w,h] = bbox;

    const sx = clamp(Math.round(x * sc), 0, targetW-1);
    const sy = clamp(Math.round(y * sc), 0, targetH-1);
    const sw = clamp(Math.round(w * sc), 1, targetW - sx);
    const sh = clamp(Math.round(h * sc), 1, targetH - sy);

    const roi = sctx.getImageData(sx, sy, sw, sh);
    const roiMean = meanLuma(roi);

    const ex = clamp(Math.round(sx - sw*0.18), 0, targetW-1);
    const ey = clamp(Math.round(sy - sh*0.18), 0, targetH-1);
    const ew = clamp(Math.round(sw*1.36), 1, targetW - ex);
    const eh = clamp(Math.round(sh*1.36), 1, targetH - ey);

    const bg = sctx.getImageData(ex, ey, ew, eh);
    const bgMean = meanLuma(bg);

    const r = brightnessLabel(roiMean, bgMean);
    return {roiMean, bgMean, diff:r.diff, label:r.label};
  }

  function prepareMotionCanvas(vw, vh){
    const targetW = 192;
    const scale = targetW / Math.max(1, vw);
    const targetH = Math.max(1, Math.round(vh * scale));

    if(motionCanvas.width !== targetW || motionCanvas.height !== targetH){
      motionCanvas.width = targetW;
      motionCanvas.height = targetH;
      prevGray = null;
      prevW = targetW;
      prevH = targetH;
    }
    return {mw:targetW, mh:targetH, scaleX:vw / targetW, scaleY:vh / targetH};
  }

  function makeGrayFrame(imageData){
    const d = imageData.data;
    const gray = new Uint8Array(d.length / 4);
    for(let i=0, j=0; i<d.length; i+=4, j++){
      gray[j] = ((d[i]*30 + d[i+1]*59 + d[i+2]*11) / 100) | 0;
    }
    return gray;
  }

  function dilateMask(src, w, h){
    const out = new Uint8Array(src.length);
    for(let y=1; y<h-1; y++){
      for(let x=1; x<w-1; x++){
        let on = 0;
        for(let dy=-1; dy<=1 && !on; dy++){
          for(let dx=-1; dx<=1; dx++){
            if(src[(y+dy)*w + (x+dx)]){
              on = 1;
              break;
            }
          }
        }
        out[y*w + x] = on;
      }
    }
    return out;
  }

  function erodeMask(src, w, h){
    const out = new Uint8Array(src.length);
    for(let y=1; y<h-1; y++){
      for(let x=1; x<w-1; x++){
        let on = 1;
        for(let dy=-1; dy<=1 && on; dy++){
          for(let dx=-1; dx<=1; dx++){
            if(!src[(y+dy)*w + (x+dx)]){
              on = 0;
              break;
            }
          }
        }
        out[y*w + x] = on;
      }
    }
    return out;
  }

  function findConnectedComponents(mask, w, h, maxObjects){
    const visited = new Uint8Array(mask.length);
    const comps = [];
    const qx = new Int32Array(mask.length);
    const qy = new Int32Array(mask.length);

    for(let y=0; y<h; y++){
      for(let x=0; x<w; x++){
        const idx = y*w + x;
        if(!mask[idx] || visited[idx]) continue;

        let head = 0, tail = 0;
        qx[tail] = x;
        qy[tail] = y;
        tail++;
        visited[idx] = 1;

        let minX = x, minY = y, maxX = x, maxY = y;
        let area = 0;
        const points = [];

        while(head < tail){
          const cx = qx[head];
          const cy = qy[head];
          head++;

          area++;
          points.push([cx, cy]);

          if(cx < minX) minX = cx;
          if(cy < minY) minY = cy;
          if(cx > maxX) maxX = cx;
          if(cy > maxY) maxY = cy;

          for(let dy=-1; dy<=1; dy++){
            for(let dx=-1; dx<=1; dx++){
              if(dx === 0 && dy === 0) continue;
              const nx = cx + dx;
              const ny = cy + dy;
              if(nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
              const nidx = ny*w + nx;
              if(mask[nidx] && !visited[nidx]){
                visited[nidx] = 1;
                qx[tail] = nx;
                qy[tail] = ny;
                tail++;
              }
            }
          }
        }

        const bw = maxX - minX + 1;
        const bh = maxY - minY + 1;
        if(area >= 28 && bw >= 8 && bh >= 8){
          comps.push({ minX, minY, maxX, maxY, bw, bh, area, points });
        }
      }
    }

    comps.sort((a,b)=> b.area - a.area);
    return comps.slice(0, maxObjects);
  }

  function perimeterPointsFromMask(mask, w, h, comp){
    const out = [];
    const {minX, minY, maxX, maxY} = comp;
    for(let y=minY; y<=maxY; y++){
      for(let x=minX; x<=maxX; x++){
        const idx = y*w + x;
        if(!mask[idx]) continue;

        let edge = false;
        for(let dy=-1; dy<=1 && !edge; dy++){
          for(let dx=-1; dx<=1; dx++){
            if(dx===0 && dy===0) continue;
            const nx = x + dx;
            const ny = y + dy;
            if(nx < 0 || ny < 0 || nx >= w || ny >= h){
              edge = true;
              break;
            }
            if(!mask[ny*w + nx]){
              edge = true;
              break;
            }
          }
        }
        if(edge) out.push([x, y]);
      }
    }
    return out;
  }

  function motionDetect(vw, vh){
    const prep = prepareMotionCanvas(vw, vh);
    const {mw, mh, scaleX, scaleY} = prep;

    motionCtx.drawImage(video, 0, 0, mw, mh);
    const img = motionCtx.getImageData(0, 0, mw, mh);
    const gray = makeGrayFrame(img);

    if(!prevGray || prevW !== mw || prevH !== mh){
      prevGray = gray;
      prevW = mw;
      prevH = mh;
      return { candidates:[], mask:null, mw, mh, scaleX, scaleY };
    }

    const threshold = Number(thr.value);
    let rawMask = new Uint8Array(gray.length);

    for(let i=0; i<gray.length; i++){
      const diff = Math.abs(gray[i] - prevGray[i]);
      rawMask[i] = diff >= threshold ? 1 : 0;
    }

    // 노이즈 완화
    rawMask = dilateMask(rawMask, mw, mh);
    rawMask = erodeMask(rawMask, mw, mh);
    rawMask = dilateMask(rawMask, mw, mh);

    const comps = findConnectedComponents(rawMask, mw, mh, Number(topk.value));
    const candidates = comps.map(c => ({
      score: c.area,
      bbox: [
        Math.round(c.minX * scaleX),
        Math.round(c.minY * scaleY),
        Math.round(c.bw * scaleX),
        Math.round(c.bh * scaleY)
      ],
      comp: c
    }));

    prevGray = gray;
    return { candidates, mask:rawMask, mw, mh, scaleX, scaleY };
  }

  function drawMotionOutline(rect, perimeterPts, scaleX, scaleY){
    if(!perimeterPts || !perimeterPts.length) return;

    octx.save();
    octx.strokeStyle = 'rgba(255, 235, 59, 0.95)';
    octx.fillStyle = 'rgba(255, 235, 59, 0.85)';
    octx.lineWidth = 1.5;

    // 점을 너무 많이 그리면 무거워질 수 있어서 간격 샘플링
    const step = Math.max(1, Math.floor(perimeterPts.length / 260));

    octx.beginPath();
    let first = true;
    for(let i=0; i<perimeterPts.length; i += step){
      const [mx, my] = perimeterPts[i];
      const px = rect.left + (mx * scaleX) * rect.scaleX;
      const py = rect.top  + (my * scaleY) * rect.scaleY;

      if(first){
        octx.moveTo(px, py);
        first = false;
      }else{
        octx.lineTo(px, py);
      }
    }
    octx.stroke();

    for(let i=0; i<perimeterPts.length; i += step){
      const [mx, my] = perimeterPts[i];
      const px = rect.left + (mx * scaleX) * rect.scaleX;
      const py = rect.top  + (my * scaleY) * rect.scaleY;
      octx.beginPath();
      octx.arc(px, py, 1.6, 0, Math.PI*2);
      octx.fill();
    }

    octx.restore();
  }

  async function detectOnce(){
    if(!camOn) return;
    if(video.readyState < 2) return;
    if(busy) return;

    busy = true;
    const t0 = performance.now();

    try{
      const vw = video.videoWidth || 0;
      const vh = video.videoHeight || 0;
      if(vw <= 0 || vh <= 0) return;

      const result = motionDetect(vw, vh);

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);

      const rect = getDisplayRect();
      drawGrid(rect);

      const objects = result.candidates.sort((a,b)=> b.score - a.score);
      detCount.textContent = objects.length ? `${objects.length}개` : '0개';

      if(!objects.length){
        pickText.textContent = '—';
        lightText.textContent = '—';
        const t1 = performance.now();
        debug.textContent = `detect ${(t1-t0).toFixed(0)}ms · 후보 0개 · 민감도 ${thr.value}`;
        return;
      }

      const best = objects[0];
      const [bx, by, bw, bh] = best.bbox;
      const bcx = bx + bw/2;
      const bcy = by + bh/2;
      const bestZone = zoneFromPoint(bcx, bcy, vw, vh);

      drawZoneHighlight(rect, bestZone);

      for(let i=0;i<objects.length;i++){
        const b = objects[i];
        const [x,y,w,h] = b.bbox;
        const cx = x + w/2;
        const cy = y + h/2;
        const z = zoneFromPoint(cx, cy, vw, vh);
        const isBest = (i === 0);
        const label = `motion ${Math.round(b.score)} · ${z}번`;
        drawBox(rect, b.bbox, isBest, label);

        if(isBest){
          const px = rect.left + cx * rect.scaleX;
          const py = rect.top  + cy * rect.scaleY;
          octx.strokeStyle = 'rgba(0,255,220,0.95)';
          octx.lineWidth = 2;
          octx.beginPath();
          octx.moveTo(px-10, py); octx.lineTo(px+10, py);
          octx.moveTo(px, py-10); octx.lineTo(px, py+10);
          octx.stroke();
        }
      }

      if(result.mask && best.comp){
        const perimeter = perimeterPointsFromMask(result.mask, result.mw, result.mh, best.comp);
        drawMotionOutline(rect, perimeter, result.scaleX, result.scaleY);
      }

      pickText.textContent = `${bestZone}번 · 움직임 ${Math.round(best.score)}`;

      const light = computeBrightness(vw, vh, best.bbox);
      lightText.textContent = `${light.label} (Δ${light.diff.toFixed(0)})`;

      const t1 = performance.now();
      debug.textContent =
        `detect ${(t1-t0).toFixed(0)}ms · period ${period.value}ms · sensitivity ${thr.value} · topK ${topk.value}\n` +
        `ROI ${light.roiMean.toFixed(0)} / BG ${light.bgMean.toFixed(0)} / Δ${light.diff.toFixed(0)} · zone ${bestZone}`;
    }catch(e){
      console.error(e);
      debug.textContent = '오류: ' + e;
    }finally{
      busy = false;
    }
  }

  function loop(ts){
    if(!camOn){
      requestAnimationFrame(loop);
      return;
    }
    const p = Number(period.value);
    if(ts - lastDetectAt >= p){
      lastDetectAt = ts;
      detectOnce();
    }
    requestAnimationFrame(loop);
  }

  async function startCam(){
    if(camOn) return;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height:{ ideal: 720 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');

      prevGray = null;
      motionReady = true;
      lastDetectAt = 0;
      resizeOverlay();
    }catch(e){
      debug.textContent = '카메라 실패: ' + e + '\n(HTTPS/localhost에서 실행 중인지 확인하세요)';
    }
  }

  function stopCam(){
    if(!camOn) return;
    try{
      if(video.srcObject){
        try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(_e){}
        video.srcObject = null;
      }

      stream = null;
      camOn = false;
      prevGray = null;
      motionReady = false;

      camBtn.textContent = '캠 켜기';
      camBtn.classList.remove('off');

      detCount.textContent = '—';
      pickText.textContent = '—';
      lightText.textContent = '—';
      debug.textContent = '';

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
    }catch(_e){}
  }

  function init(){
    resizeOverlay();
    modelStatus.textContent = '준비완료(움직임 감지)';
    requestAnimationFrame(loop);
  }

  camBtn.addEventListener('click', () => camOn ? stopCam() : startCam());
  window.addEventListener('resize', resizeOverlay);

  init();
})();
</script>
</body>
</html>
