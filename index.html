<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>9분할 단색 공(원) 위치 인식 테스트 v4</title>

  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e5e7eb;
      --muted:#9ca3af;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header{
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{ font-weight:900; letter-spacing:.2px; }
    header .spacer{ flex:1 1 auto; }
    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      background:#2563eb;
      color:white;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }
    .btn.off{ background:#ef4444; }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.25);
      font: 800 13px/1 system-ui;
    }
    .pill .muted{ color:var(--muted); font-weight:700; }
    main{
      height: calc(100vh - 64px);
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:12px;
    }
    .stage{
      flex:1 1 auto;
      min-height: 260px;
      position:relative;
      background:#000;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    video{
      width:100%;
      height:100%;
      object-fit: contain;
      background:#000;
    }
    canvas#overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }
    .footer{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .small{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }
    code{
      color:#d1fae5;
      background: rgba(16,185,129,.12);
      border:1px solid rgba(16,185,129,.25);
      padding:2px 6px;
      border-radius:8px;
      font-weight:800;
    }
  </style>

  <script>
    let cvReady = false;
    function setStatus(msg){
      const el = document.getElementById('statusText');
      if(el) el.textContent = msg;
    }
    function onOpenCvScriptLoaded(){
      if(typeof cv === 'undefined'){
        setStatus('OpenCV 로딩 실패(네트워크/차단 확인)');
        return;
      }
      cv['onRuntimeInitialized'] = () => {
        cvReady = true;
        setStatus('OpenCV 준비완료');
      };
      setStatus('OpenCV 런타임 초기화중...');
    }
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvScriptLoaded()"></script>
</head>

<body>
  <header>
    <div class="title">🎥 9분할 단색 공(원) 위치 인식 테스트 v4</div>
    <div class="spacer"></div>
    <button id="camBtn" class="btn">캠 켜기</button>
    <span class="pill"><span class="muted">상태</span> <span id="statusText">OpenCV 로딩중...</span></span>
    <span class="pill"><span class="muted">인식</span> <span id="resultText">—</span></span>
  </header>

  <main>
    <div class="stage" id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="footer">
      <div class="small">
        인식 주기: <code>0.5초</code> / 목표: <code>단색 공은 통과</code>, <code>무늬/패턴 원은 탈락</code><br/>
        핵심: <code>원 둘레 품질 + 내부 단색성(a,b) + 내부 무늬(HF) 억제</code> (밝기 그라데이션은 허용)
      </div>
      <div class="small" id="debugText"></div>
    </div>
  </main>

<script>
(() => {
  const DETECT_MS = 500;

  // ---- “단색 공” 필터 (v4: 실사용 사진 조건 통과하도록 완화 + 무늬 억제 강화) ----
  const FILTER = {
    // (단색성) 원 내부에서 a,b 채널 분산이 너무 크면(여러 색 섞인 무늬) 탈락
    innerChromaStdMax: 42,     // v3(26)보다 완화

    // (단색성) 안쪽 vs (원 내부)테두리 색(a,b) 차이가 크면(테두리에 다른 색/무늬) 탈락
    innerEdgeABMax: 26,

    // (무늬 억제) 고주파 성분(HF)이 크면(격자/패턴) 탈락
    // HF = |gray - GaussianBlur(gray)|
    innerHFMeanMax: 18,

    // (무늬 억제) 내부 에지가 둘레 에지에 비해 너무 강하면(내부가 패턴) 탈락
    insideEdgeRatioMax: 0.92,

    // 배경과 너무 구분이 안 되면(가짜 원) 탈락(너무 엄격하게는 안 함)
    outerContrastLMin: 6,
    outerContrastABMin: 4
  };

  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');

  const camBtn = document.getElementById('camBtn');
  const resultText = document.getElementById('resultText');
  const debugText = document.getElementById('debugText');

  let stream = null;
  let camOn = false;

  // 처리용 캔버스(축소)
  const proc = document.createElement('canvas');
  const pctx = proc.getContext('2d', { willReadFrequently:true });
  let procW = 360, procH = 240;

  // 존 안정화
  let stableZone = null;
  let pendingZone = null;
  let pendingCount = 0;

  // 이전 원(아주 약한 힌트)
  let lastCircle = null;

  let busy = false;
  let timer = null;

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function resizeOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth || 1;
    const h = stage.clientHeight || 1;
    overlay.width = Math.round(w * dpr);
    overlay.height = Math.round(h * dpr);
    overlay.style.width = w + 'px';
    overlay.style.height = h + 'px';
    octx.setTransform(dpr,0,0,dpr,0,0);
  }

  function getDisplayRect(){
    const vw = video.videoWidth || 0;
    const vh = video.videoHeight || 0;
    const ww = stage.clientWidth || 1;
    const wh = stage.clientHeight || 1;
    if(vw <= 0 || vh <= 0) return {left:0, top:0, width:ww, height:wh};

    const s = Math.min(ww / vw, wh / vh);
    const dw = vw * s;
    const dh = vh * s;
    const left = (ww - dw) / 2;
    const top  = (wh - dh) / 2;
    return {left, top, width:dw, height:dh};
  }

  function ensureProcSize(){
    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 480;

    let w = 360;
    let h = Math.round(w * (vh / vw));
    w = Math.max(300, w);
    h = Math.max(220, h);

    w = w - (w % 3);
    h = h - (h % 3);

    if(procW !== w || procH !== h){
      procW = w; procH = h;
      proc.width = procW;
      proc.height = procH;
    }
  }

  function zoneFromPoint(x, y){
    const cw = procW / 3;
    const ch = procH / 3;
    let col = Math.floor(x / cw);
    let row = Math.floor(y / ch);
    col = clamp(col, 0, 2);
    row = clamp(row, 0, 2);
    return row * 3 + col + 1;
  }

  function drawGridAndNumbers(rect){
    const x0 = rect.left, y0 = rect.top, w = rect.width, h = rect.height;

    octx.strokeStyle = 'rgba(255,255,255,0.9)';
    octx.lineWidth = 1;
    octx.beginPath();
    octx.moveTo(x0 + w/3, y0);      octx.lineTo(x0 + w/3, y0 + h);
    octx.moveTo(x0 + 2*w/3, y0);    octx.lineTo(x0 + 2*w/3, y0 + h);
    octx.moveTo(x0, y0 + h/3);      octx.lineTo(x0 + w, y0 + h/3);
    octx.moveTo(x0, y0 + 2*h/3);    octx.lineTo(x0 + w, y0 + 2*h/3);
    octx.stroke();

    octx.font = '900 16px system-ui';
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const n = r*3 + c + 1;
        const cx = x0 + (c+0.5)*(w/3);
        const cy = y0 + (r+0.5)*(h/3);

        octx.fillStyle = 'rgba(0,0,0,0.28)';
        octx.strokeStyle = 'rgba(255,255,255,0.22)';
        octx.lineWidth = 1;
        octx.beginPath();
        octx.arc(cx, cy, 14, 0, Math.PI*2);
        octx.fill();
        octx.stroke();

        octx.fillStyle = 'rgba(255,255,255,0.95)';
        octx.fillText(String(n), cx, cy);
      }
    }
  }

  function drawZoneHighlight(rect, zone){
    if(!zone) return;
    const z = zone - 1;
    const row = Math.floor(z / 3);
    const col = z % 3;

    const x0 = rect.left + col*(rect.width/3);
    const y0 = rect.top  + row*(rect.height/3);
    const w = rect.width/3;
    const h = rect.height/3;

    octx.fillStyle = 'rgba(255,255,255,0.08)';
    octx.strokeStyle = 'rgba(255,255,255,0.35)';
    octx.lineWidth = 2;
    octx.fillRect(x0, y0, w, h);
    octx.strokeRect(x0, y0, w, h);
  }

  function drawCircle(rect, circle){
    if(!circle) return;
    const sx = rect.width / procW;
    const sy = rect.height / procH;

    const cx = rect.left + circle.x * sx;
    const cy = rect.top  + circle.y * sy;
    const r  = Math.max(2, circle.r * ((sx+sy)*0.5));

    octx.strokeStyle = 'rgba(0,255,220,0.95)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.arc(cx, cy, r, 0, Math.PI*2);
    octx.stroke();

    octx.strokeStyle = 'rgba(0,255,220,0.85)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.moveTo(cx-8, cy); octx.lineTo(cx+8, cy);
    octx.moveTo(cx, cy-8); octx.lineTo(cx, cy+8);
    octx.stroke();
  }

  function render(circle, zone, debugLine){
    resizeOverlay();
    octx.clearRect(0,0, overlay.width, overlay.height);

    const rect = getDisplayRect();
    drawGridAndNumbers(rect);
    drawZoneHighlight(rect, zone);
    drawCircle(rect, circle);

    resultText.textContent = zone ? `${zone}번` : '—';
    debugText.textContent = debugLine || '';
  }

  // ---------- 샘플링 유틸 ----------
  function sampleU8Mean(data, w, h, x, y, radii, perRing){
    let sum=0, cnt=0;
    const TWO_PI = Math.PI*2;
    for(const rr of radii){
      for(let i=0;i<perRing;i++){
        const a = (i/perRing) * TWO_PI;
        const px = Math.round(x + rr*Math.cos(a));
        const py = Math.round(y + rr*Math.sin(a));
        if(px<0||py<0||px>=w||py>=h) continue;
        sum += data[py*w + px];
        cnt++;
      }
    }
    if(cnt < Math.max(10, Math.floor(radii.length*perRing*0.35))) return null;
    return sum / cnt;
  }

  function sampleMagMean(mag32F, w, h, x, y, radii, perRing){
    let sum=0, cnt=0;
    const TWO_PI = Math.PI*2;
    for(const rr of radii){
      for(let i=0;i<perRing;i++){
        const a = (i/perRing) * TWO_PI;
        const px = Math.round(x + rr*Math.cos(a));
        const py = Math.round(y + rr*Math.sin(a));
        if(px<0||py<0||px>=w||py>=h) continue;
        sum += mag32F[py*w + px];
        cnt++;
      }
    }
    if(cnt < Math.max(10, Math.floor(radii.length*perRing*0.35))) return null;
    return sum / cnt;
  }

  function sampleLabStats(labData, w, h, x, y, radii, perRing){
    let sL=0,sA=0,sB=0, sL2=0,sA2=0,sB2=0, cnt=0;
    const TWO_PI = Math.PI*2;
    for(const rr of radii){
      for(let i=0;i<perRing;i++){
        const a = (i/perRing) * TWO_PI;
        const px = Math.round(x + rr*Math.cos(a));
        const py = Math.round(y + rr*Math.sin(a));
        if(px<0||py<0||px>=w||py>=h) continue;
        const idx = (py*w + px) * 3;
        const L = labData[idx];
        const A = labData[idx+1];
        const B = labData[idx+2];
        sL += L; sA += A; sB += B;
        sL2 += L*L; sA2 += A*A; sB2 += B*B;
        cnt++;
      }
    }
    if(cnt < Math.max(18, Math.floor(radii.length*perRing*0.40))) return null;

    const mL = sL/cnt, mA=sA/cnt, mB=sB/cnt;
    const vL = sL2/cnt - mL*mL;
    const vA = sA2/cnt - mA*mA;
    const vB = sB2/cnt - mB*mB;

    return {
      meanL:mL, meanA:mA, meanB:mB,
      stdL:Math.sqrt(Math.max(0,vL)),
      stdA:Math.sqrt(Math.max(0,vA)),
      stdB:Math.sqrt(Math.max(0,vB)),
      cnt
    };
  }

  // ---------- 링(둘레) 품질: Canny edge 기반 + 방향일치 ----------
  function ringFeatures(edges, gx, gy, mag, x, y, r){
    const w = mag.cols, h = mag.rows;
    const eD = edges.data;  // uint8
    const gxD = gx.data32F, gyD = gy.data32F, mD = mag.data32F;

    const N = 96;
    const band = 3; // 약간 넓힘(저대비 경계 대응)

    let hits = 0;
    let alignSum = 0;
    let alignCnt = 0;
    let radSum=0, radSum2=0;
    let ringMagSum=0;

    for(let i=0;i<N;i++){
      const a = (i/N)*Math.PI*2;
      const ux = Math.cos(a), uy = Math.sin(a);

      let bestPx=-1, bestPy=-1, bestRR=r;
      let bestM=0;
      let foundEdge = false;

      // 먼저 “edge 픽셀” 중에서 가장 mag 큰 걸 선택
      for(let dt=-band; dt<=band; dt++){
        const rr = r + dt;
        const px = Math.round(x + rr*ux);
        const py = Math.round(y + rr*uy);
        if(px<0||py<0||px>=w||py>=h) continue;
        if(eD[py*w + px] > 0){
          foundEdge = true;
          const mv = mD[py*w + px];
          if(mv > bestM){
            bestM = mv; bestPx = px; bestPy = py; bestRR = rr;
          }
        }
      }

      // edge가 전혀 없으면, mag 최대점이라도 선택(완전 실패 방지)
      if(!foundEdge){
        for(let dt=-band; dt<=band; dt++){
          const rr = r + dt;
          const px = Math.round(x + rr*ux);
          const py = Math.round(y + rr*uy);
          if(px<0||py<0||px>=w||py>=h) continue;
          const mv = mD[py*w + px];
          if(mv > bestM){
            bestM = mv; bestPx = px; bestPy = py; bestRR = rr;
          }
        }
      }

      // hit 판정: edge가 있거나, mag가 어느 정도 이상이면 hit
      if(foundEdge || bestM > 10){
        hits++;
        ringMagSum += bestM;
        radSum += bestRR; radSum2 += bestRR*bestRR;

        // 방향 일치(gradient가 반지름 방향과 비슷해야 “원”)
        if(bestM > 6){
          const gxx = gxD[bestPy*w + bestPx];
          const gyy = gyD[bestPy*w + bestPx];
          const gn = Math.hypot(gxx, gyy) || 1e-6;
          const dot = (gxx*ux + gyy*uy)/gn; // -1..1
          alignSum += Math.abs(dot);
          alignCnt++;
        }
      }
    }

    const hitRatio = hits / N;
    if(hitRatio < 0.28) return null; // 너무 부분적이면 탈락

    const alignAvg = alignSum / Math.max(1, alignCnt);
    if(alignAvg < 0.40) return null; // 패턴(수평/수직) 방지용 핵심

    const radMean = radSum / Math.max(1,hits);
    const radVar = (radSum2 / Math.max(1,hits)) - radMean*radMean;
    const radStd = Math.sqrt(Math.max(0,radVar));
    const consScore = clamp(1 - (radStd / Math.max(1, r*0.13)), 0, 1);

    const ringMagAvg = ringMagSum / Math.max(1,hits);

    const alignScore = clamp((alignAvg - 0.35)/0.65, 0, 1);
    const quality = 0.55*hitRatio + 0.25*alignScore + 0.20*consScore;

    return {quality, hitRatio, alignAvg, consScore, ringMagAvg};
  }

  // ---------- 단색 공 필터 ----------
  function monoBallFilter(labData, hfData, mag32F, w, h, x, y, r, ringMagAvg){
    // 내부/테두리/외부 샘플 반경
    const innerR  = Math.max(3, r*0.55);
    const edgeR1  = Math.max(4, r*0.80);
    const edgeR2  = Math.max(4, r*0.92);
    const outR1   = Math.max(4, r*1.08);
    const outR2   = Math.max(4, r*1.24);

    const inner = sampleLabStats(labData, w,h, x,y, [r*0.18, r*0.32, r*0.45, innerR], 18);
    const edge  = sampleLabStats(labData, w,h, x,y, [edgeR1, r*0.86, edgeR2], 24);
    const outer = sampleLabStats(labData, w,h, x,y, [outR1, r*1.16, outR2], 24);
    if(!inner || !edge || !outer) return null;

    // (1) 안쪽 vs 테두리: a,b 유사(단색성)
    const dAB_ie = Math.hypot(inner.meanA-edge.meanA, inner.meanB-edge.meanB);
    if(dAB_ie > FILTER.innerEdgeABMax) return null;

    // (2) 내부 단색성: a,b 분산이 크면(여러 색 섞인 무늬) 탈락
    const chromaStdInner = Math.hypot(inner.stdA, inner.stdB);
    if(chromaStdInner > FILTER.innerChromaStdMax) return null;

    // (3) 내부 무늬(HF) 억제: gray 고주파 평균이 크면(격자/패턴) 탈락
    const hfMean = sampleU8Mean(hfData, w,h, x,y, [r*0.18, r*0.32, r*0.45, innerR], 18);
    if(hfMean == null) return null;
    if(hfMean > FILTER.innerHFMeanMax) return null;

    // (4) 내부 에지 vs 링 에지 비율: 내부가 너무 복잡(패턴)하면 탈락
    const insideMagMean = sampleMagMean(mag32F, w,h, x,y, [r*0.18, r*0.32, r*0.45, innerR], 18);
    if(insideMagMean == null) return null;

    const denom = Math.max(12, ringMagAvg); // 링이 약할 때 분모 너무 작아지는 문제 방지
    const insideEdgeRatio = insideMagMean / denom;
    if(insideEdgeRatio > FILTER.insideEdgeRatioMax) return null;

    // (5) 바깥과 대비가 너무 없으면 가짜 원일 확률 ↑
    const dL_io  = Math.abs(inner.meanL - outer.meanL);
    const dAB_io = Math.hypot(inner.meanA-outer.meanA, inner.meanB-outer.meanB);
    if(dL_io < FILTER.outerContrastLMin && dAB_io < FILTER.outerContrastABMin) return null;

    // 점수(통과 후보 중 “더 단색/덜 무늬” 우선)
    const uniformScore =
      0.55*clamp(1 - chromaStdInner / FILTER.innerChromaStdMax, 0, 1) +
      0.45*clamp(1 - hfMean / FILTER.innerHFMeanMax, 0, 1);

    const edgeSimScore = clamp(1 - dAB_ie / FILTER.innerEdgeABMax, 0, 1);

    const textureScore = clamp(1 - insideEdgeRatio / FILTER.insideEdgeRatioMax, 0, 1);

    const colorScore = 0.55*uniformScore + 0.45*edgeSimScore;

    return {dAB_ie, chromaStdInner, hfMean, insideEdgeRatio, dL_io, dAB_io, colorScore, textureScore};
  }

  function mergeCircleList(out, mat, dupDist=10, dupRad=10){
    if(!mat || mat.cols<=0) return;
    for(let i=0;i<mat.cols;i++){
      const x = mat.data32F[i*3 + 0];
      const y = mat.data32F[i*3 + 1];
      const r = mat.data32F[i*3 + 2];
      if(!isFinite(x)||!isFinite(y)||!isFinite(r)) continue;

      const minDim = Math.min(procW, procH);
      const minR = Math.max(10, Math.round(minDim * 0.03));
      const maxR = Math.round(minDim * 0.48);
      if(r < minR || r > maxR) continue;

      let dup = false;
      for(const c of out){
        const dx = c.x-x, dy=c.y-y;
        if((dx*dx+dy*dy) < dupDist*dupDist && Math.abs(c.r-r) < dupRad){
          dup = true; break;
        }
      }
      if(!dup) out.push({x,y,r});
    }
  }

  async function detectOnce(){
    if(!camOn) return;
    if(!cvReady) { render(null, stableZone, 'OpenCV 준비중...'); return; }
    if(video.readyState < 2) return;
    if(busy) return;

    busy = true;
    try{
      ensureProcSize();
      pctx.drawImage(video, 0, 0, procW, procH);

      const src = cv.imread(proc); // RGBA

      // Lab(단색성 체크)
      const lab = new cv.Mat();
      cv.cvtColor(src, lab, cv.COLOR_RGBA2Lab);

      // Gray
      const gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      // HF = |gray - GaussianBlur(gray)|
      const g9 = new cv.Mat();
      cv.GaussianBlur(gray, g9, new cv.Size(9,9), 0, 0, cv.BORDER_DEFAULT);
      const hf = new cv.Mat();
      cv.absdiff(gray, g9, hf);

      // edge/gradient용 blur (너무 흐리면 원 경계가 약해짐 → 5x5 정도)
      const blur = new cv.Mat();
      cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0, 0, cv.BORDER_DEFAULT);

      // edges (낮은 임계값으로 저대비 경계도 잡기)
      const edges = new cv.Mat();
      cv.Canny(blur, edges, 35, 110);

      // gradients
      const gx = new cv.Mat(), gy = new cv.Mat(), mag = new cv.Mat();
      cv.Sobel(blur, gx, cv.CV_32F, 1, 0, 3);
      cv.Sobel(blur, gy, cv.CV_32F, 0, 1, 3);
      cv.magnitude(gx, gy, mag);

      // HoughCircles는 medianBlur가 안정적
      const med = new cv.Mat();
      cv.medianBlur(gray, med, 5);

      const circlesA = new cv.Mat();
      const circlesB = new cv.Mat();

      const minDim = Math.min(procW, procH);
      const minR = Math.max(10, Math.round(minDim * 0.03));
      const maxR = Math.round(minDim * 0.48);
      const minDist = Math.max(26, Math.round(procH / 6));

      // v3보다 “후보를 더 많이” 뽑고, 최종 필터로 거르는 방식
      cv.HoughCircles(med, circlesA, cv.HOUGH_GRADIENT, 1.2, minDist, 90,  22, minR, maxR);
      cv.HoughCircles(med, circlesB, cv.HOUGH_GRADIENT, 1.2, minDist, 100, 28, minR, maxR);

      const cand = [];
      mergeCircleList(cand, circlesA);
      mergeCircleList(cand, circlesB);

      // 후보 많으면 제한(모바일 성능)
      const MAX_CAND = 18;
      const candList = cand.slice(0, MAX_CAND);

      const labData = lab.data;            // Uint8Array (3ch)
      const hfData  = hf.data;             // Uint8Array (1ch)
      const mag32F  = mag.data32F;         // Float32Array

      let best = null;

      for(const c of candList){
        // (1) 링 품질
        const rf = ringFeatures(edges, gx, gy, mag, c.x, c.y, c.r);
        if(!rf) continue;

        // (2) 단색 공 필터(무늬 억제)
        const mono = monoBallFilter(labData, hfData, mag32F, procW, procH, c.x, c.y, c.r, rf.ringMagAvg);
        if(!mono) continue;

        // 최종 점수
        let score =
          rf.quality *
          (0.35 + 0.65*mono.colorScore) *
          (0.40 + 0.60*mono.textureScore);

        // 이전 위치 힌트는 약하게만(오검출 고착 방지)
        if(lastCircle){
          const dx = c.x - lastCircle.x, dy = c.y - lastCircle.y;
          const d = Math.hypot(dx,dy);
          const near = clamp(1 - d/(minDim*0.45), 0, 1);
          score *= (0.97 + 0.03*near);
        }

        const item = {x:c.x, y:c.y, r:c.r, score, rf, mono};
        if(!best || item.score > best.score) best = item;
      }

      // cleanup
      src.delete(); lab.delete();
      gray.delete(); g9.delete(); hf.delete();
      blur.delete(); edges.delete();
      gx.delete(); gy.delete(); mag.delete();
      med.delete();
      circlesA.delete(); circlesB.delete();

      if(!best || best.score < 0.30){
        lastCircle = null;
        pendingZone = null; pendingCount = 0;
        render(null, null, '단색 공 조건(무늬 억제)을 만족하는 원 후보 없음');
        return;
      }

      lastCircle = {x:best.x, y:best.y, r:best.r};

      const z = zoneFromPoint(best.x, best.y);

      // 안정화(2회 연속 같은 존이면 확정) — 첫 검출은 바로 표시
      if(stableZone == null){
        stableZone = z;
        pendingZone = null; pendingCount = 0;
      }else if(z === stableZone){
        pendingZone = null; pendingCount = 0;
      }else{
        if(pendingZone === z) pendingCount++;
        else { pendingZone = z; pendingCount = 1; }
        if(pendingCount >= 2){
          stableZone = z;
          pendingZone = null;
          pendingCount = 0;
        }
      }

      const rf = best.rf, m = best.mono;
      const dbg =
        `final ${(best.score*100).toFixed(1)}% · ring ${(rf.quality*100).toFixed(1)}% ` +
        `(hit ${(rf.hitRatio*100).toFixed(0)}%, dir ${(rf.alignAvg*100).toFixed(0)}%, cons ${(rf.consScore*100).toFixed(0)}%) ` +
        `| 단색 dAB ${m.dAB_ie.toFixed(1)}, chromaStd ${m.chromaStdInner.toFixed(1)} ` +
        `| HF ${m.hfMean.toFixed(1)}, insideRatio ${m.insideEdgeRatio.toFixed(2)}`;

      render(best, stableZone, dbg);

    }catch(e){
      console.error(e);
      render(null, null, '오류: ' + e);
    }finally{
      busy = false;
    }
  }

  async function startCam(){
    if(camOn) return;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 640 },
          height:{ ideal: 480 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      camOn = true;
      camBtn.textContent = '캠 끄기';
      camBtn.classList.add('off');

      stableZone = null; pendingZone = null; pendingCount = 0;
      lastCircle = null;

      render(null, null, '');

      if(timer) clearInterval(timer);
      timer = setInterval(detectOnce, DETECT_MS);

      resizeOverlay();
      window.addEventListener('resize', () => {
        resizeOverlay();
        render(lastCircle, stableZone, debugText.textContent || '');
      });

      setStatus(cvReady ? 'OpenCV 준비완료' : 'OpenCV 준비중...');
    }catch(e){
      setStatus('카메라 실패: ' + e);
    }
  }

  function stopCam(){
    if(!camOn) return;
    try{
      if(timer){ clearInterval(timer); timer = null; }
      try{ video.pause(); }catch(_e){}
      if(video.srcObject){
        try{ video.srcObject.getTracks().forEach(t=>t.stop()); }catch(_e){}
        video.srcObject = null;
      }
      stream = null;
      camOn = false;

      camBtn.textContent = '캠 켜기';
      camBtn.classList.remove('off');

      stableZone = null; pendingZone = null; pendingCount = 0;
      lastCircle = null;

      resultText.textContent = '—';
      debugText.textContent = '';

      resizeOverlay();
      octx.clearRect(0,0, overlay.width, overlay.height);
    }catch(_e){}
  }

  camBtn.addEventListener('click', () => {
    if(camOn) stopCam();
    else startCam();
  });

  resizeOverlay();
})();
</script>
